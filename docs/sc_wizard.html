                <nav class="centered"><h2><a href="wizard.html">Wizard</a></h2></nav>

                <h2>Scholar of Necromancy</h2>

                <h3>Level 3: Necromancy Savant</h3>
                <p>When you cast a necromancy spell with a Primary Spell Slot that would otherwise
                    cost 2 actions, the casting time is instead one action.</p>

                <h3>Level 3: Undead Familiar</h3>
                <p>The Find Familiar spell appears in your spellbook. When you cast the spell you
                    choose one of the normal forms for your familiar you can also choose one of the
                    following forms: Skeleton, Zombie, or Swarm of Rats (undead)</p>

                <h3>Level 6: Raise Horde</h3>
                <p>With two actions and a Secondary Spell Slot, you create bodies and raise them
                    from the ground, creating a swarm of undead. The swarm has the following
                    features:</p>
                <p>The creature is an ally to you and your allies. In combat, the creature shares
                    your Initiative count, but it takes its turn immediately after yours. It obeys
                    your verbal commands if you take an action on your turn to give it any. If you
                    don’t issue any, it takes the Deathly Claws attack action against an enemy
                    creature within its range. You can only have one horde active at a time, if you
                    use this feature or take a long rest, the horde disappears.</p>

                <h3>Level 10: Command Undead</h3>
                <p>If your horde misses their Deathly Claws attack, it still does half damage to the
                    target.</p>

                <h3>Level 14: Inured to Undeath</h3>
                <p>You gain resistance to necrotic damage, and your spells ignore resistance to
                    necrotic damage.</p>

                <h3>Level 20: Lichdom</h3>
                <p>Your soul has corroded enough to the point where you may undergo a ritual to
                    achieve Lichdom.</p>

                <details>
                    <summary><strong>Lichdom Ritual and Effects</strong></summary>
                    <p>This ritual requires the casting of the spell Circle of Death at 9th-level.
                        This spell must kill a total of 313 humanoids with souls with one cast, if
                        the required amount of humanoids do not die the ritual fails and you must
                        start again.</p>
                    <p>After a successful killing of these humanoids you must concentrate on the
                        soul transfer for the next hour. During this time you have the unconscious
                        condition but can still concentrate on the ritual as if you were
                        concentrating on a spell, damage breaks concentration as normal during this
                        time.</p>
                    <p>If concentration is broken during this time, the spell Circle of Death is
                        cast centered on you at 9th-level, the ritual fails, and you must start
                        again. Any creature who is reduced to 0 hit points by this spell has their
                        soul destroyed.</p>
                    <p>If the soul transfer is completed, your soul is stored inside of a now
                        magical object.</p>
                    <p>The object must be at minimum 1000gp in value, 10 grams, and 1 inch in
                        diameter. It cannot exceed 1 metric ton, or 15 feet in diameter. Your soul
                        is stored in that object. If you die, your body appears unharmed in an
                        unoccupied space within 10 feet of that object after 24 hours. If it is
                        destroyed, your soul is destroyed along with it and you die.</p>
                    <p>When you assume Lichdom, you gain the following properties:</p>
                    <ul>
                        <li><strong>Arcane Meditation.</strong> Liches do not sleep. Instead they
                            lightly meditate, remaining conscious, for 4 hours. Once 4 hours of
                            uninterrupted meditation is met, they gain the benefits of a long
                            rest.</li>
                        <li><strong>Arcane Mind.</strong> Your intelligence modifier increases to
                            7.</li>
                        <li><strong>Armor of Undeath.</strong> You have natural armor of AC 17.</li>
                        <li><strong>Undead Nature.</strong> A lich doesn’t require air, food, drink,
                            or sleep.</li>
                        <li><strong>Resilient Form.</strong> Your hit point maximum increases to 313
                            if it was not already higher.</li>
                        <li>Damage Resistances Cold, Lightning, Necrotic</li>
                        <li>Damage Immunities Poison; Physical.</li>
                        <li>Condition Immunities Charmed, Exhaustion, Frightened, Paralyzed,
                            Poisoned</li>
                        <li>Senses Truesight 120 ft</li>
                        <li><strong>Turn Resistance.</strong> The lich has advantage on saving
                            throws against any effect that turns undead.</li>
                        <li><strong>Spell Mastery.</strong> Casting a spell with a Tertiary Slot no
                            longer requires a charge and can be cast with two actions. Choose three
                            spells of any level from any spell list, they are wizard spells for you
                            and appear in your spell book.</li>
                    </ul>
                </details>
