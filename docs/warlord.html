                <h2>Hit Points</h2>
                <p><strong>Class Health Number:</strong> 5</p>
                <p><strong>Hit Points at 1st Level:</strong> 10 + your fighting style health
                    bonus</p>
                <p><strong>Hit Points at Higher Levels:</strong> 5 + your fighting style health
                    bonus per warlord level after 1st</p>

                <h2>Proficiencies</h2>
                <ul>
                    <li><strong>Armor:</strong> Light armor, medium armor, shields</li>
                    <li><strong>Weapons:</strong> Simple weapons</li>
                    <li><strong>Tools:</strong> None</li>
                    <li><strong>Saving Throws:</strong> Wisdom, Charisma</li>
                    <li><strong>Skills:</strong> Choose three from Athletics, Deception, History,
                        Insight, Intimidation, Investigation, Medicine, Performance, and
                        Persuasion</li>
                </ul>

                <h2>Physical and Mental Modifiers</h2>
                <p>Some of your abilities will require your Mental or Physical Modifier.</p>
                <p>Your Physical Modifier is your Strength or Dexterity Modifier.</p>
                <p>Your Mental Modifier is your Intelligence, Wisdom, or Charisma Modifier.</p>

                <h2>Fighting Style: 1</h2>
                <p>You adopt a particular style of fighting as your specialty. Choose one of the
                    following options. Each Fighting style grants you a bonus at level 1, you must
                    be wielding one of your fighting style’s respective item to gain this benefit.
                    At level 7, your fighting style provides a Martial Feat, this feat does not
                    count against your Feats known, and it does not require a slot when you use it.
                    You must be wielding one of your fighting style’s respective item to use this
                    feature, but you can use this feat regardless of your class.</p>

                <ul>
                    <li>Archery: +2 health per level</li>
                    <li>Dueling: +2 health per level</li>
                    <li>Skirmisher: +2 health per level</li>
                    <li>Polearm: +2 health per level</li>
                    <li>Thrown Weapon: +2 health per level</li>
                    <li>Unarmed: +2 health per level</li>
                    <li>Two-Weapon: +2 health per level</li>
                    <li>Priest: +2 health per level</li>
                    <li>Sage: +2 health per level</li>
                    <li>Arcanist: +2 health per level</li>
                    <li>Brawler: +3 health per level</li>
                    <li>Guardian: +3 health per level</li>
                    <li>Great Weapon: +3 health per level</li>
                </ul>

                <h2>Warlord Presence: 1</h2>
                <p>You choose the archetype of warlord you embody, called a Presence. Your choice
                    grants you features at 1st level, and then again at 3rd, 7th, 11th, 15th, and
                    18th level.</p>
                <ul>
                    <li>Commander</li>
                    <li>Chieftain</li>
                    <li>Noble</li>
                    <li>Packleader</li>
                    <li>Paragon</li>
                    <li>Tactician</li>
                </ul>

                <h2>Battlefield Presence: 1</h2>
                <p>When you take the Attack action on your turn, you can forgo one of your attacks
                    to grant a friendly creature that can see or hear you an additional attack. The
                    next time that creature takes the Attack action before the start of your next
                    turn, they can make one additional attack as part of that action.</p>
                <p>A creature can benefit from only one additional attack from this feature per
                    round.</p>

                <h2>Leadership Dice: 2</h2>
                <p>You have access to Leadership Dice, representing your ability to inspire and
                    direct your allies. Your Warlord level determines the number and size of these
                    dice, as shown in the Leadership Dice and Leadership Die columns of the Warlord
                    Features table.</p>

                <p>You can expend these dice to fuel various features. You start knowing three such
                    features: Rallying Mark, Urgent Orders, and Helpful Word.</p>

                <p><strong>Per Turn Limit:</strong> You can normally expend only one Leadership Die
                    per turn. At higher levels, you can expend more dice per turn, as shown in the
                    Leadership Die Limit feature at levels 6, 11, and 17.</p>

                <p>You regain all expended Leadership Dice when you finish a short rest or long
                    rest.</p>

                <h2>Rallying Mark</h2>
                <p>As an action, expend up to your per-turn limit of Leadership Dice and choose a
                    hostile creature within 60 feet. The next time an allied creature deals damage
                    to that target before the start of your next turn, that ally adds the total
                    rolled on the expended Leadership Dice to the damage roll and regains hit points
                    equal to the total rolled.</p>

                <h2>Urgent Orders</h2>
                <p>As an action, expend up to your per-turn limit of Leadership Dice and target an
                    allied creature within 60 feet that can see or hear you. That creature can
                    immediately use its reaction to move up to its speed (max 30 feet) without
                    provoking opportunity attacks. It gains temporary hit points equal to the total
                    rolled on the expended dice.</p>

                <h2>Helpful Word</h2>
                <p>As an action, expend one Leadership Die to take the Help action. When you use
                    this Help action to aid an ally in attacking a creature, the target of that
                    attack can be within 30 feet of you, rather than within 5 feet, provided your
                    ally can see or hear you.</p>

                <h2>Martial Feats: 2</h2>

                <p>You have trained in special techniques that give you an edge in combat and
                    beyond. You gain access to martial feats, as described in the Martial Feats
                    section. You may only use one Feat Slot per turn.</p>

                <p><strong>Primary Slots.</strong> You have 2 Primary Slots, which you expend to
                    activate your feats. You regain all expended slots when you finish a short rest.
                    Your number of Primary Slots increases as you gain levels, as shown in the Feats
                    Progression table.</p>

                <p><strong>Feats Known.</strong> You know 2 martial feats of your choice from your
                    feat list. The Feats Known column of the Feats Progression table shows when you
                    learn more feats. Additionally, when you gain a level in this class, you can
                    replace one feat you know with another feat of your choice from your class feat
                    list.</p>

                <p><strong>Feat Tier.</strong> You can learn feats of Tier 1 at level 2. At higher
                    levels you gain access to higher tiers, as shown in the table.</p>

                <h2>Warlord's Expertise: 3</h2>
                <p>Choose one skill: Investigation, Insight, Intimidation, or Persuasion. If not
                    proficient, you gain proficiency. If already proficient, double your proficiency
                    bonus for ability checks using that skill.</p>

                <h2>Ability Score Improvement</h2>
                <p>At 4th, 8th, 12th, 16th, and 19th level, you can increase an ability score by
                    1.</p>

                <h2>Martial Fatigue Resistance: 5</h2>
                <p>Taking the attack action does not inflict you with the fatigued condition.</p>

                <h2>Reactive Strikes: 5</h2>
                <p>Whenever you grant a creature an extra attack, that creature may use their
                    reaction to make that attack using their held weapon.</p>

                <h2>Prepare for Battle: 6</h2>
                <p>Spend 1 minute directing up to five friendly creatures (including yourself) that
                    can see or hear you. Expend up to your per-turn limit of Leadership Dice,
                    rolling them. Each chosen creature gains temporary hit points equal to the total
                    rolled. Once used, this feature can only be used again after a short or long
                    rest.</p>

                <h2>Leadership Die Limit</h2>
                <p>6th level: 2 per turn, 11th level: 3 per turn, 17th level: 4 per turn.</p>

                <h2>Press the Attack: 9</h2>
                <p>Enhances Rallying Mark, Urgent Orders, and Helpful Word for multiple targets and
                    additional effects using Leadership Dice.</p>
                
                
                <h2>Unbreakable Will: 10</h2>
                <p>You are immune to the frightened and charmed conditions.</p>

                <h2>Warlord's Intuition: 13</h2>
                <p>Before making a skill check in which you are proficient, you may treat the d20
                    roll as equal to your Warlord level. Usable once per long rest.</p>
                

                <h2>Shift the Field: 14</h2>
                <p>As an action, expend one Leadership Die to reposition up to five friendly
                    creatures, each moving up to half speed without provoking opportunity
                    attacks.</p>


                <h2>Tireless Leader: 20</h2>
                <p>When using Rallying Mark, Urgent Orders, Helpful Word, or Prepare for Battle, you
                    may roll a d4 instead of expending a Leadership Die. This works even if you have
                    no Leadership Dice remaining.</p>
