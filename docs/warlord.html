                <h2>Hit Points</h2>
                <p><strong>Class Health Number:</strong> 5</p>
                <p><strong>Hit Points at 1st Level:</strong> 10 + your fighting style health
                    bonus</p>
                <p><strong>Hit Points at Higher Levels:</strong> 5 + your fighting style health
                    bonus per warlord level after 1st</p>

                <h2>Proficiencies</h2>
                <ul>
                    <li><strong>Armor:</strong> Light armor, medium armor, shields</li>
                    <li><strong>Weapons:</strong> Simple weapons, Martial weapons</li>
                    <li><strong>Tools:</strong> None</li>
                    <li><strong>Saving Throws:</strong> Wisdom, Charisma</li>
                    <li><strong>Skills:</strong> Choose three from Athletics, Deception, History,
                        Insight, Intimidation, Investigation, Medicine, Performance, and
                        Persuasion</li>
                </ul>

                <h2>Physical and Mental Modifiers</h2>
                <p>Some of your abilities will require your Mental or Physical Modifier.</p>
                <p>Your Physical Modifier is your Strength or Dexterity Modifier.</p>
                <p>Your Mental Modifier is your Intelligence, Wisdom, or Charisma Modifier.</p>

                <h2>Fighting Style: 1</h2>
                <p>You adopt a particular style of fighting as your specialty. Choose one of the
                    following options. Each Fighting style grants you a bonus at level 1, you must
                    be wielding one of your fighting style’s respective item to gain this benefit.
                    At level 7, your fighting style provides a Martial Feat, this feat does not
                    count against your Feats known, and it does not require a slot when you use it.
                    You must be wielding one of your fighting style’s respective item to use this
                    feature, but you can use this feat regardless of your class.</p>

                <ul>
                    <li>Archery: +2 health per level</li>
                    <li>Dueling: +2 health per level</li>
                    <li>Skirmisher: +2 health per level</li>
                    <li>Polearm: +2 health per level</li>
                    <li>Thrown Weapon: +2 health per level</li>
                    <li>Unarmed: +2 health per level</li>
                    <li>Two-Weapon: +2 health per level</li>
                    <li>Priest: +2 health per level</li>
                    <li>Sage: +2 health per level</li>
                    <li>Arcanist: +2 health per level</li>
                    <li>Brawler: +3 health per level</li>
                    <li>Guardian: +3 health per level</li>
                    <li>Great Weapon: +3 health per level</li>
                </ul>

                <h2>Leadership Dice: 1</h2>
                <p>You possess Leadership Dice which represent your tactical advantage in combat. These dice start as
                    d6, and increase in size as according to the Warlord features table.</p>

                <p>You can hold a maximum number of Leadership Dice equal to your proficiency bonus, and these dice are
                    lost when you take a long or short rest.</p>

                <p>When a creature within 30 feet of you hits a target with an attack roll, you can spend one
                    Leadership Die and add it to their damage roll.</p>

                <h2>Tactical Orders: 1</h2>
                <p>As an action, you issue a Tactical Order to a creature within 60 feet that can see or hear you. The
                    Tactical Order lasts until the start of your next turn, and when the order's trigger occurs you gain
                    one Leadership Die. Below is the list of Tactical Orders</p>


                <h3>Reposition</h3>
                <p>The target gains the benefits of the Disengage action.</p>
                <p>Trigger: The target moves at least 10 feet.</p>

                <h3>Opportunistic Positioning</h3>
                <p>The target gains an additional reaction.</p>
                <p>Trigger: The target uses a reaction.</p>

                <h3>Brace</h3>
                <p>The target gains a bonus to two saving throws equal to your Mental Modifier. The saving throws they
                    gain bonuses for are your Physical and Mental Modifiers.</p>
                <p>Trigger: The target succeeds on any saving throw.</p>

                <h3>Hold the Line</h3>
                <p>The target gains the benefits of the Dodge action.</p>
                <p>Trigger: An attack misses the target or they succeed a Dexterity saving throw</p>

                <h2>Advanced Maneuvers: 2</h2>
                <p>You know how to push your advantages in combat. As an action you can declare an Advanced Maneuver for a creature within 60 feet that can see or hear you.
                    You expend one Leadership die, that creature gains one of the following benefits and regains hit
                    points equal to one roll of your Leadership Dice.</p>


                <h3>Directed Strike</h3>
                <p>Once on their next turn, the target creature can take the Attack action as a free action.</p>

                <h3>Martial Prowess</h3>
                <p>Until the end of their next turn, the target creature has access to all Martial Feats which you know.
                </p>

                <h3>Hold the Line</h3>
                <p>The target creature can immediately move up to half their speed. When the target creature starts
                    their next turn, one ally within 5 feet regains the same amount of hit points as the target creature
                    did from the Advanced Tactics healing.</p>

                    <h3>Helpful Words</h3>
                <p>The creature gains the benefit of the help action.</p>

                <h2>Martial Feats: 2</h2>

                <p>You have trained in special techniques that give you an edge in combat and
                    beyond. You gain access to martial feats, as described in the Martial Feats
                    section. You may only use one Feat Slot per turn.</p>

                <p><strong>Primary Slots.</strong> You have 2 Primary Slots, which you expend to
                    activate your feats. You regain all expended slots when you finish a short rest.
                    Your number of Primary Slots increases as you gain levels, as shown in the Feats
                    Progression table.</p>

                <p><strong>Feats Known.</strong> You know 2 martial feats of your choice from your
                    feat list. The Feats Known column of the Feats Progression table shows when you
                    learn more feats. Additionally, when you gain a level in this class, you can
                    replace one feat you know with another feat of your choice from your class feat
                    list.</p>

                <p><strong>Feat Tier.</strong> You can learn feats of Tier 1 at level 2. At higher
                    levels you gain access to higher tiers, as shown in the table.</p>

                <h2>Warlord's Expertise: 3</h2>
                <p>Choose one of your skill proficiencies to gain expertise in.</p>
                </p>

                <h2>Warlord Presence: 3</h2>
                <p>At 3rd level, you choose a <a href="sc_warlord.html">Warlord Presence</a> that emulates your approach
                    to roguery.
                    Your choice grants you features at 3rd level, and then again at 7th, 14th, and
                    20th level.</p>

                <h2>Ability Score Improvement</h2>
                <p>At 4th, 8th, 12th, 16th, and 19th level, you can increase an ability score by
                    1.</p>

                <h2>Martial Fatigue Resistance: 5</h2>
                <p>Taking the attack action does not inflict you with the fatigued condition.</p>

                <h2>Versitile Tactics: 5</h2>

                <strong>Choose one of the follwing benefits, you may swap your choice when you finish a short or long rest:</strong>

                <p>When you use Tactical Orders, you may spend one Leadership Die to target an additional creature.</p>

                <p>When you use Advanced Maneuver, you may spend one Leadership Die to target an additional creature.</p>

                <h2>Recuperate: 6</h2>
                <p>When you finish a short rest, all allies reduce their Exhaustion levels by 1 and regain additional
                    hit points equal to two rolls of your Leadership Dice.</p>

                <h2>Advanced Leadership: 9</h2>
                <p>When a Leadership Die is rolled, if the result is lower than your Mental Modifier, then that number
                    is used instead of the roll.</p>

                <h2>Unbreakable Will: 10</h2>
                <p>You have advantage on saving throws against the charmed and frightened conditions.</p>

                <h2>Improved Orders: 11</h2>
                <p>When you use Hold the Line or Reposition, the target creature's speed is increased by 10 feet while
                    the order is active.</p>

                <p>Additionally, when you restore hit points to a creature with a Warlord feature, the creature also
                    regains hit points equal to your Mental Modifier.</p>

                <h2>Battlefield Intuition: 13</h2>
                <p>Choose a Tier 1 Feat with the Social tag, learn this Feat and can use it without spending a Feat
                    Slot.</p>

                <h2>Shift the Field: 15</h2>
                <p>When you use Tactical Order, you can expend one Leadership Die to target an additional creature.</p>

                <h2>Tireless Leader: 17</h2>
                <p>When you roll initiative, you gain two Leadership Dice.</p>

                <h2>Advanced Leadership: 18</h2>
                <p>When a Leadership Die is rolled, the result is doubled.</p>
