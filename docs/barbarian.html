                <h2>Physical and Mental Modifiers</h2>
                <p>Your <strong>Physical Modifier</strong> is your Strength modifier.</p>
                <p>Your <strong>Mental Modifier</strong> is your Intelligence, Wisdom, or Charisma modifier.</p>

                <h2>Fighting Style: 1</h2>
                <p><em>Your combat training defines your approach to battle.</em> You adopt a particular style of
                    fighting as your specialty. Choose one of the following options. Each fighting style grants you a
                    bonus at level 1; you must be wielding one of your fighting style’s respective items to gain this
                    benefit. At level 7, your fighting style provides you with a bonus.</p>
                <ul>
                    <li>Dueling: You gain a +2 health bonus at each level.</li>
                    <li>Polearm: You gain a +2 health bonus at each level.</li>
                    <li>Sage: You gain a +2 health bonus at each level.</li>
                    <li>Skirmisher: You gain a +2 health bonus at each level.</li>
                    <li>Thrown Weapon: You gain a +2 health bonus at each level.</li>
                    <li>Two-Weapon: You gain a +2 health bonus at each level.</li>
                    <li>Unarmed: You gain a +2 health bonus at each level.</li>
                    <li>Brawler: You gain a +3 health bonus at each level.</li>
                    <li>Great Weapon: You gain a +3 health bonus at each level.</li>
                    <li>Guardian: You gain a +3 health bonus at each level.</li>
                </ul>
                <p>The health bonus is added to your hit point maximum at 1st level and whenever you gain a level in
                    this class.</p>

                <h2>Hit Points</h2>
                <p><strong>Hit Points at 1st Level:</strong> 14 + your fighting style health bonus</p>
                <p><strong>Hit Points at Higher Levels:</strong> 7 + your fighting style health bonus per level after
                    1st</p>

                <h2>Proficiencies</h2>
                <p><strong>Armor:</strong> Light armor, medium armor, shields</p>
                <p><strong>Weapons:</strong> Simple weapons, martial weapons</p>
                <p><strong>Saving Throws:</strong> Strength, Charisma</p>
                <p><strong>Skills:</strong> Choose two from Animal Handling, Athletics, Intimidation, Nature,
                    Perception, and Survival</p>





                <h2>Rage: 1</h2>
                <p><em>You can imbue yourself with a supernatural power called Rage.</em> You can enter your Rage by
                    expending a <strong>Feat Slot</strong> as an action, provided you aren’t wearing heavy armor.</p>

                <h3>Active Rage</h3>
                <p>While your Rage is active, you gain the following benefits:</p>
                <p><strong>Damage Resistance.</strong> You have Resistance to Physical damage.</p>
                <p><strong>Rage Damage.</strong> When you hit with a Strength‑based weapon attack or an Unarmed Strike,
                    you add the dice shown in the Rage Bonus column of the Barbarian Features table to the damage.</p>
                <p><strong>Strength Advantage.</strong> You have Advantage on Strength checks and Strength saving
                    throws.</p>
                <p><strong>Critical Range.</strong> Your attack rolls have a critical range. If the d20 rolls a number
                    within that range, you score a critical hit. The range starts at 20 and increases as your rage
                    builds (see below).</p>

                <h3>Building Rage</h3>
                <p>At the start of each of your turns while raging, your critical range increases by 1. Once per round,
                    when an allied creature you can see within 10 feet of you takes damage, your critical range
                    increases by 1. Your critical range cannot exceed <strong>20 − your Proficiency Bonus</strong> (for
                    example, 16–20 at level 10). When you score a critical hit, your critical range immediately resets
                    to 20.</p>

                <h3>Duration</h3>
                <p>Rage lasts 10 minutes. It ends early if you are incapacitated or you choose to end it as a free
                    action.</p>

                <h2>Unarmored Defense: 1</h2>
                <p>While you are not wearing any armor, your Armor Class equals 10 + your Dexterity modifier + your
                    Strength modifier. Wearing a shield negates this effect.</p>

                <h2>Martial Feats: 2</h2>
                <p>You have trained in special techniques that give you an edge in combat and beyond. You gain access to
                    martial feats, as described in the <strong>Martial Feats</strong> section. You may only use one
                    <strong>Feat Slot</strong> per turn.
                </p>
                <p><strong>Feat Slots.</strong> You have 2 <strong>Feat Slots</strong>, which you expend to
                    activate your feats. You regain all expended slots when you finish a short rest. Your number of
                    <strong>Feat Slots</strong> increases as you gain levels, as shown in the Feats Progression
                    table.
                </p>
                <p><strong>Feats Prepared.</strong> You prepare 2 martial feats of your choice from your feat list. The
                    Feats Prepared column of the Feats Progression table shows when you learn more feats. Additionally,
                    when you gain a level in this class, you can replace one feat you have prepared with another feat of
                    your choice from your class feat list.</p>
                <p><strong>Feat Tier.</strong> You can learn feats of Tier 1 at level 2. At higher levels you gain
                    access to higher tiers, as shown in the table.</p>

                <h2>Danger Sense: 2</h2>
                <p>You have advantage on Dexterity saving throws against effects you can see, such as traps and spells.
                    You can’t be blinded, deafened, or incapacitated to gain this benefit.</p>

                <h2>Primal Path: 3</h2>
                <p><em> You choose a <a href="sc_barbarian.html">Primal Path</a> that shapes the nature of your
                        rage.</em> Your choice grants you features at 3rd level, and then again at 7th, 14th, and 20th
                    level.</p>

                <h2>Primal Knowledge: 3</h2>
                <p>You gain proficiency in another skill of your choice from the Barbarian skill list. While your Rage
                    is active, you can make ability checks using the following skills as Strength checks: Acrobatics,
                    Intimidation, Perception, Stealth, or Survival. This represents primal power enhancing your agility,
                    bearing, and senses.</p>

                <h2>Ability Score Improvement</h2>
                <p>At 4th, 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 1. You
                    can't increase an ability score above 5 using this feature.</p>

                <h2>Martial Fatigue Resistance: 5</h2>
                <p>Taking the <strong>Attack action</strong> does not inflict you with the <strong>fatigued</strong>
                    condition.</p>

                <h2>Rage Action: 5</h2>
                <p>When you take the <strong>Attack action</strong> while raging, you can choose one of the following
                    benefits to apply to your melee attacks this turn:</p>
                <p><strong>Focused Fury.</strong> You gain advantage on all melee attack rolls this turn, but attack
                    rolls against you have advantage until the start of your next turn.</p>
                <p><strong>Reckless Abandon.</strong> When you hit a creature with a melee weapon attack, you can add a
                    d4 to the damage roll, but attack rolls against you have advantage until the start of your next
                    turn.</p>

                <h2>Fast Movement: 6</h2>
                <p>Your speed increases by 10 feet while you aren’t wearing heavy armor.</p>

                <h2>Brutal Critical: 9</h2>
                <p>The number of dice you add with Reckless Abandon increases by 1.</p>

                <h2>Insurmountable: 10</h2>
                <p>When you are hit with an attack that also applies an effect, you can expend a <strong>Feat
                        Slot</strong> to make a Strength saving throw. The DC equals 10 or half the damage taken,
                    whichever is higher. On a success, you take the damage but suffer none of the additional effect.</p>

                <h2>Relentless Rage: 11</h2>
                <p><em>You refuse to fall while your rage continues.</em> If you drop to 0 hit points while raging and
                    don’t die outright, you can make a DC 10 Strength saving throw to drop to 1 hit point instead. Each
                    subsequent use before a rest increases the DC by 5. The DC resets to 10 after a short or long rest.
                </p>

                <h2>Brutal Critical II: 13</h2>
                <p>The number of dice you add with Focused Fury increases by 1.</p>

                <h2>For the Fences: 15</h2>
                <p>When rolling with disadvantage, if either d20 falls within your critical range, you can use that roll
                    instead of the lower result.</p>

                <h2>Brutal Critical III: 17</h2>
                <p>The number of dice you add with Focused Fury increases by 1, and the die size increases to a d16.</p>

                <h2>Impeccable Guardian: 17</h2>
                <p>You gain the following benefits:</p>
                <ul>
                    <li>Your speed increases by an additional 15 feet while you aren’t wearing heavy armor.</li>
                    <li>When a creature within 30 feet of you makes a Strength saving throw, you can use your reaction
                        to move up to your speed into their space and become the target instead. The creature is shunted
                        up to 5 feet to an unoccupied space of their choice.</li>
                </ul>

                <h2>Indomitable Might: 18</h2>
                <p><em>Nothing can pin you down.</em> You count as Gargantuan for the purpose of grappling, being
                    grappled, and carrying other creatures.</p>
