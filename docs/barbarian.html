                <h2>Hit Points</h2>
                <p><strong>Class Health Number:</strong> 7 </p>
                <p><strong>Hit Points at 1st Level:</strong> 14 + your fighting style health
                    bonus</p>
                <p><strong>Hit Points at Higher Levels:</strong> 7 + your fighting style health
                    bonus per level after 1st</p>
                <h2>Proficiencies</h2>
                <ul>
                    <li><strong>Armor:</strong> Light armor, medium armor, shields</li>
                    <li><strong>Weapons:</strong> Simple weapons, martial weapons</li>
                    <li><strong>Saving Throws:</strong> Strength, Charisma</li>
                    <li><strong>Skills:</strong> Choose two from Animal Handling, Athletics,
                        Intimidation, Nature, Perception, and Survival</li>
                </ul>
                <h2>Physical and Mental Modifiers</h2>
                <ul>
                    <li><strong>Physical Modifier:</strong> Strength modifier</li>
                    <li><strong>Mental Modifier:</strong> Intelligence, Wisdom, or Charisma
                        modifier</li>
                </ul>
                <h2>Fighting Style</h2> You adopt a particular style of fighting as your specialty.
                Choose one of the following options. Each Fighting style grants you a bonus at level
                1, you must be wielding one of your fighting style’s respective item to gain this
                benefit. At level 7, your fighting style provides you with a bonus. <ul>
                    <li>Dueling: You gain a +2 health bonus at each level.</li>
                    <li>Polearm: You gain a +2 health bonus at each level.</li>
                    <li>Sage: You gain a +2 health bonus at each level.</li>
                    <li>Skirmisher: You gain a +2 health bonus at each level.</li>
                    <li>Thrown: You gain a +2 health bonus at each level.</li>
                    <li>Two-Weapon: You gain a +2 health bonus at each level.</li>
                    <li>Unarmed: You gain a +2 health bonus at each level.</li>
                    <li>Brawler: You gain a +3 health bonus at each level.</li>
                    <li>Great Weapon: You gain a +3 health bonus at each level.</li>
                    <li>Guardian: You gain a +3 health bonus at each level.</li>
                </ul>
                <p>Each style grants a health bonus at every level. The bonus is added to your hit
                    point maximum whenever you gain a level.</p>
                <h2>Rage:1</h2>
                <p>You can imbue yourself with a primal power called Rage, a force that grants you
                    extraordinary might and resilience.</p>
                <h3>Entering Rage</h3>
                <p>You can enter your Rage as an <strong>Action</strong> if you aren't wearing Heavy
                    armor.</p>
                <h3>Rage Uses</h3>
                <p>You can enter Rage as an action by spending a <strong>Feat Slot</strong>.</p>
                <h3>Active Rage</h3>
                <p>While your Rage is active, you gain the following benefits:</p>
                <p><strong>Damage Resistance.</strong> You have Resistance to Physical Damage.</p>
                <p><strong>Rage Damage.</strong> When you make an attack using Strength—with either
                    a weapon or an Unarmed Strike—and deal damage to the target, you gain a bonus to
                    the damage equal to your Rage Damage from the Barbarian Features table.</p>
                <p><strong>Strength Advantage.</strong> You have Advantage on Strength checks and
                    Strength saving throws.</p>
                <p><strong>Critical Range.</strong> Your attack rolls have a critical range. If the
                    d20 rolls a number within that range, you score a critical hit. This range
                    starts at 20 and increases in the following ways:</p>
                <ul>
                    <li>At the start of each of your turns while raging, your critical range
                        increases by 1.</li>
                    <li>Once per round, when a creature you can see within 10 feet of you takes
                        damage, your critical range increases by 1.</li>
                    <li>Your critical range cannot exceed a number lower than <strong>20 - your Rage
                            Bonus</strong> (for example, at level 9 with a +4 Rage Bonus, the
                        maximum range is 16–20).</li>
                    <li>When you score a critical hit, your critical range immediately resets to
                        20.</li>
                </ul>
                <h3>Rage Action</h3>
                <p>When you take the <strong>Attack</strong> action while raging, you can choose one
                    of the following benefits to apply to your melee attacks this turn:</p>
                <p><strong>Reckless Abandon.</strong> You gain advantage on all melee attack rolls
                    this turn, but attack rolls against you have advantage until the start of your
                    next turn.</p>
                <p><strong>Focused Fury.</strong> Once during this turn when you hit a creature with
                    a melee weapon attack, you can add a <strong>d4</strong> to the damage roll.
                    This d4 is doubled if the attack is a critical hit.</p>
                <h3>Duration</h3>
                <p>The Rage lasts <strong>10 minutes</strong>. It ends early if you are
                    incapacitated or if you choose to end it as a <strong>Free Action</strong>.</p>
                <h3>Unarmored Defense</h3>
                <p><strong>Unarmored Defense: 1.</strong> While you are not wearing any armor, your
                    Armor Class equals 10 + your Dexterity modifier + your Strength modifier.
                    Wearing a shield negates this effect.</p>
                <h2>Danger Sense: 2</h2>
                <p>You gain an uncanny sense of when things nearby aren't as they should be, giving
                    you an edge when you dodge away from danger.</p>
                <p>You have advantage on Dexterity saving throws.</p>
                <h2>Martial Feats: 2</h2>
                <p>You have trained in special techniques that give you an edge in combat and
                    beyond. You gain access to martial feats, as described in the Martial Feats
                    section. You may only use one Feat Slot per turn.</p>
                <p><strong>Primary Slots.</strong> You have 3 Primary Slots, which you expend to
                    activate your feats. You regain all expended slots when you finish a short rest.
                    Your number of Primary Slots increases as you gain levels, as shown in the Feats
                    Progression table.</p>
                <p><strong>Feats Known.</strong> You know 4 martial feats of your choice from the
                    barbarian feat list. The Feats Known column of the Feats Progression table shows
                    when you learn more feats. Additionally, when you gain a level in this class,
                    you can replace one barbarian feat you know with another feat of your choice
                    from the barbarian feat list.</p>
                <p><strong>Feat Tier.</strong> You can learn feats of Tier 1 at level 2. At higher
                    levels you gain access to higher tiers, as shown in the table.</p>

                <h2>Primal Path: 3</h2>
                <p>You choose a path that shapes the nature of your rage. Your choice grants you
                    features at 3rd level, and then again at 7th, 14th, and 20th level.</p>
                <h2>Primal Knowledge: 3</h2>
                <p>You gain proficiency in another skill of your choice from the skill list
                    available to Barbarians at 1st level.</p>
                <p>In addition, while your Rage is active, you can channel primal power when you
                    attempt certain tasks: whenever you make an ability check using one of the
                    following skills, you can make it as a Strength check even if it normally uses a
                    different ability: Acrobatics, Intimidation, Perception, Stealth, or Survival.
                    When you use this ability, your Strength represents primal power coursing
                    through you, honing your agility, bearing, and senses.</p>
                <h2>Ability Score Improvement: 4 </h2>
                <p>At 4th, 8th, 12th, 16th, and 19th level, you can increase an ability score by 1</p>
                <h2>Melee Fatigue Resistance: 5</h2>
                <p>Taking the attack action does not inflict you with the fatigued condition.</p>
                <h2>Fast Movement: 6</h2>
                <p>Your speed increases by 10 feet while you aren't wearing heavy armor.</p>
                <h2>Rage Bonus Improvement</h2>
                <p>6th, 9th, 13th, and 17th level barbarian feature. Your Rage Bonus increases as
                    shown in the Barbarian Features table. This determines the maximum critical
                    range you can achieve while raging along with bonus damage on each strike.</p>
                <h2>Brutal Critical I: 9</h2>
                <p>Beginning at 9th level, the number of dice you add with Focused Fury increases by
                    1.</p>
                <h2>Insurmountable: 10</h2>
                <p>When you are hit with an attack that also applies an effect, whether it requires
                    a saving throw or not, you may spend a Feat Slot to make a Strength saving
                    throw. The DC equals 10 or half the damage you take, whichever number is higher.
                    If you succeed, you take damage as normal, but you do not suffer the effect.</p>
                <h2>Relentless Rage: 11</h2>
                <p>Your rage can keep you fighting despite grievous wounds. If you drop to 0 hit
                    points while you're raging and don't die outright, you can make a DC 10 Strength
                    saving throw. If you succeed, you drop to 1 hit point instead.</p>
                <p>Each time you use this feature after the first, the DC increases by 5. When you
                    finish a short or long rest, the DC resets to 10.</p>
                <h2>Brutal Critical II: 13</h2>
                <p>Beginning at 13th level, the number of dice you add with Focused Fury increases
                    by 1.</p>
                <h2>Persistent Rage: 15</h2>
                <p>Your rage now only ends early if you choose to end it or if you fall
                    unconscious.</p>
                <h2>Brutal Critical III: 17</h2>
                <p>Beginning at 17th level, the number of dice you add with Focused Fury increases
                    by 1.</p>
                <h2>Indomitable Might: 18</h2>
                <p>If your total for a Strength check is less than your Strength Modifier × 3, you
                    can use that score in place of the total.</p>
