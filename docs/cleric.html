                                <h2>Fighting Style: 1</h2>
                <p><em>Your faith shapes your approach to battle.</em> You adopt a particular style of divine practice
                    as your specialty. Choose one of the following options. Each fighting style grants you a health
                    bonus at level 1. At level 7, your fighting style provides you with additional benefits as noted in
                    the Fighting Styles section.</p>
                <ul>
                    <li><strong>Priest:</strong> You gain a +2 health bonus at each level.</li>
                    <li><strong>Holy Warrior:</strong> You gain a +3 health bonus at each level.</li>
                </ul>
                <p>The health bonus is added to your hit point maximum at 1st level and whenever you gain a level in
                    this class.</p>

                <h2>Hit Points</h2>
                <p><strong>Hit Points at 1st Level:</strong> 10 + your fighting style health bonus</p>
                <p><strong>Hit Points at Higher Levels:</strong> 5 + your fighting style health bonus per cleric level
                    after 1st</p>

                <h2>Proficiencies</h2>
                <p><strong>Armor:</strong> Light armor, medium armor, shields</p>
                <p><strong>Weapons:</strong> Simple weapons</p>
                <p><strong>Tools:</strong> None</p>
                <p><strong>Saving Throws:</strong> Wisdom, Charisma</p>
                <p><strong>Skills:</strong> Choose two from History, Insight, Medicine, Persuasion, and Religion</p>

                <h2>Physical and Mental Modifiers</h2>
                <p>Some of your abilities will require your <strong>Mental Modifier</strong> or <strong>Physical
                        Modifier</strong>.</p>
                <p>Your <strong>Physical Modifier</strong> is your Strength or Dexterity modifier.</p>
                <p>Your <strong>Mental Modifier</strong> is your Intelligence, Wisdom, or Charisma modifier.</p>



                <h2>Spellcasting: 1</h2>
                <p><em>As a conduit for divine power, you can shape the world through faith.</em></p>
                <p><strong>Cantrips.</strong> At 1st level, you know three cantrips of your choice from the cleric spell
                    list. You learn additional cleric cantrips of your choice at higher levels, as shown in the Cantrips
                    Known column of the Cleric Spellcasting table.</p>
                <p><strong>Preparing and Casting Spells.</strong> The Cleric Spellcasting table shows how many spell
                    slots you have to cast your cleric spells. To cast one of your cleric spells, you must expend a slot
                    of the spell's level or higher. You regain all expended spell slots when you finish a long rest.</p>
                <p>You prepare the list of cleric spells that are available for you to cast. To do so, choose a number
                    of cleric spells from your cleric spell list equal to your <strong>Mental Modifier</strong> + your
                    cleric level (minimum of one spell). The spells must be of a level for which you have spell slots.
                </p>
                <p><strong>Spellcasting Economy.</strong> Casting a spell with a <strong>Cantrip</strong> requires one
                    action. Casting a spell with a <strong>Primary Spell Slot</strong> or <strong>Secondary Spell
                        Slot</strong> requires two actions.</p>
                <p><strong>Spellcasting Ability.</strong> Your <strong>Mental Modifier</strong> is your spellcasting
                    ability for your cleric spells. The DC for your spell saving throws equals your <strong>Mental
                        DC</strong> (8 + your <strong>Proficiency Bonus</strong> + your <strong>Mental
                        Modifier</strong>).</p>
                <p><strong>Ritual Casting.</strong> You can cast a cleric spell as a ritual if that spell has the
                    <strong>ritual</strong> tag and you have the spell prepared.</p>
                <p><strong>Spellcasting Focus.</strong> You can use a holy symbol as a <strong>spellcasting
                        focus</strong> for your cleric spells.</p>

                <h2>Channel Divinity: 2</h2>
                <p><em>You channel divine energy directly from your deity to fuel magical effects.</em> You start with
                    one such effect: Turn Undead. Some Divine Domains grant additional Channel Divinity options when you
                    reach certain levels.</p>
                <p><strong>Turn Undead.</strong> As an <strong>action</strong>, you present your holy symbol and speak a
                    prayer censuring the undead. Each undead that can see or hear you within 30 feet must make a
                    <strong>Mental DC</strong> Wisdom saving throw. If the creature fails its save, it is turned for 1
                    minute or until it takes any damage.</p>
                <p>A turned creature must spend its turns trying to move as far away from you as it can, and it can't
                    willingly move to a space within 30 feet of you. It also can't take <strong>reactions</strong>. For
                    its action, it can use only the <strong>Dash</strong> action or try to escape from an effect that
                    prevents it from moving. If there's nowhere to move, the creature can use the <strong>Dodge</strong>
                    action.</p>
                <p><strong>Using Channel Divinity.</strong> You must expend a <strong>Secondary Spell Slot</strong> to
                    use Channel Divinity.</p>

                <h2>Tertiary Slots: 3</h2>
                <p>At 3rd level, you gain access to <strong>tertiary spell slots</strong>, as shown on the Spellcasting
                    table. Refer to the Spellcasting section for the rules governing the casting of tertiary slot
                    spells.</p>

                <h2>Divine Domain: 3</h2>
                <p><em> You choose a <a href="sc_cleric.html">Divine
                        Domain</a> that shapes your connection to the divine.</em> Your choice grants you features at 3rd
                    level, and then again at 6th, 10th, 14th, and 20th level.</p>
                <p>Domains also grant you domain spells at the levels specified in your domain description. Once you
                    gain a domain spell, you always have it prepared, and it doesn't count against the number of spells
                    you can prepare each day.</p>

                <h2>Ability Score Improvement</h2>
                <p>At 4th, 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 1. You
                    can't increase an ability score above 5 using this feature.</p>

                <h2>Magic Fatigue Resistance: 5</h2>
                <p>Taking the <strong>Magic action</strong> does not inflict you with the <strong>fatigued</strong>
                    condition.</p>

                <h2>Blessed Strikes: 8</h2>
                <p><em>Divine power flows through your strikes.</em> When a creature takes damage from one of your
                    cantrips or weapon attacks, you can also deal 1d8 <strong>radiant</strong> damage to that creature.
                    You can use this feature a number of times equal to your <strong>Proficiency Bonus</strong>, and you
                    regain all expended uses when you finish a long rest. This damage increases to 2d8 at level 14.</p>

                <h2>Divine Intervention: 11</h2>
                <p><em>Your god answers your call in desperate moments.</em> As a <strong>2-action</strong> ability, you
                    summon creatures devoted to your god. You can summon a maximum of 4 creatures; their total CR must
                    be no more than your <strong>Proficiency Bonus</strong> × 2. These creatures return to your god
                    after 1 hour.</p>
                <p>This feature requires the use of a <strong>tertiary spell slot</strong>.</p>

                <h2>Divine Domain Capstone: 20</h2>
                <p>You gain the capstone feature for your Divine Domain.</p>
