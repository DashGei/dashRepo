                <h2>Hit Points</h2>
                <p><strong>Class Health Number:</strong> 5</p>
                <p><strong>Hit Points at 1st Level:</strong> 10 + your fighting style health
                    bonus</p>
                <p><strong>Hit Points at Higher Levels:</strong> 5 + your fighting style health
                    bonus per cleric level after 1st</p>

                <h2>Proficiencies</h2>
                <ul>
                    <li><strong>Armor:</strong> Light armor, medium armor, shields</li>
                    <li><strong>Weapons:</strong> Simple weapons</li>
                    <li><strong>Tools:</strong> None</li>
                    <li><strong>Saving Throws:</strong> Wisdom, Charisma</li>
                    <li><strong>Skills:</strong> Choose two from History, Insight, Medicine,
                        Persuasion, and Religion</li>
                </ul>

                <h2>Physical and Mental Modifiers</h2>
                <p>Some of your abilities will require your Mental or Physical Modifier.</p>
                <p>Your Physical Modifier is your Strength or Dexterity Modifier.</p>
                <p>Your Mental Modifier is your Intelligence, Wisdom, or Charisma Modifier.</p>

                <h2>Fighting Style</h2>
                <p>You adopt a particular style of connection to nature as your specialty. Choose
                    one of the following options. Each Fighting style grants you a health bonus at
                    level 1.</p>
                <p>At level 7, your fighting style provides you with additional benefits as noted in
                    the Fighting Styles section.</p>

                <ul>
                    <li><strong>Priest:</strong> You gain a +2 health bonus at each level.</li>
                    <li><strong>Holy Warrior:</strong> You gain a +3 health bonus at each
                        level.</li>
                </ul>

                <p>The health bonus is added to your hit point maximum at 1st level and whenever you
                    gain a level in this class.</p>

                <h2>Spellcasting: 1</h2>
                <p>As a conduit for divine power, you can cast cleric spells.</p>

                <p><strong>Cantrips.</strong> At 1st level, you know three cantrips of your choice
                    from the cleric spell list. You learn additional cleric cantrips of your choice
                    at higher levels, as shown in the Cantrips Known column of the Cleric
                    Spellcasting table.</p>

                <p><strong>Preparing and Casting Spells.</strong> The Cleric Spellcasting table
                    shows how many spell slots you have to cast your cleric spells. To cast one of
                    your cleric spells, you must expend a slot of the spell's level or higher. You
                    regain all expended spell slots when you finish a long rest.</p>

                <p>You prepare the list of cleric spells that are available for you to cast. To do
                    so, choose a number of cleric spells from your cleric spell list equal to your
                    Mental modifier + your cleric level (minimum of one spell). The spells must be
                    of a level for which you have spell slots.</p>

                <p><strong>Spellcasting Economy.</strong> Casting a spell with a Cantrip requires
                    one action. Casting a spell with a Primary or Secondary Spell Slot requires two
                    actions.</p>

                <p><strong>Spellcasting Ability.</strong> Your Mental Modifier is your spellcasting
                    ability for your cleric spells. The DC for your spell saving throws equals your
                    Mental DC (8 + your proficiency bonus + your Mental modifier).</p>

                <p><strong>Ritual Casting.</strong> You can cast a cleric spell as a ritual if that
                    spell has the ritual tag and you have the spell prepared.</p>

                <p><strong>Spellcasting Focus.</strong> You can use a holy symbol as a spellcasting
                    focus for your cleric spells.</p>

                <h2>Channel Divinity: 2</h2>
                <p>You can channel divine energy directly from your deity to fuel magical effects.
                    You start with one such effect: Turn Undead.</p>

                <p>Some Divine Domains grant additional Channel Divinity options when you reach
                    certain levels.</p>

                <p><strong>Channel Divinity: Turn Undead.</strong> As an action, you present your
                    holy symbol and speak a prayer censuring the undead. Each undead that can see or
                    hear you within 30 feet must make a Mental DC Wisdom saving throw. If the
                    creature fails its save, it is turned for 1 minute or until it takes any
                    damage.</p>

                <p>A turned creature must spend its turns trying to move as far away from you as it
                    can, and it can't willingly move to a space within 30 feet of you. It also can't
                    take reactions. For its action, it can use only the Dash action or try to escape
                    from an effect that prevents it from moving. If there's nowhere to move, the
                    creature can use the Dodge action.</p>

                <p><strong>Using Channel Divinity.</strong> You must expend a Secondary Spell Slot
                    to use Channel Divinity.</p>

                <h2>Tertiary Slots: 3</h2>
                <p>At 3rd level, you gain access to tertiary spell slots, as shown on the
                    Spellcasting table. Refer to the Spellcasting section for the rules governing
                    the casting of tertiary slot spells.</p>

                <h2>Divine Domain: 3</h2>
                <p>You choose a Divine Domain that shapes your connection to the divine. Your choice
                    grants you features at 3rd level, and then again at 6th, 10th, and 16th
                    level.</p>

                <p>Domains also grant you domain spells at the levels specified in your domain
                    description. Once you gain a domain spell, you always have it prepared, and it
                    doesn't count against the number of spells you can prepare each day.</p>

                <h2>Ability Score Improvement</h2>
                <p>At 4th, 8th, 12th, 16th, and 19th level, you can increase an ability score by
                    1</p>

                <h2>Magic Fatigue Resistance: 5</h2>
                <p>When taking the magic action you do not suffer any penalties from the fatigued
                    condition.</p>

                <h2>Blessed Strikes: 8</h2>
                <p>You are blessed with divine might in combat. When a creature takes damage from
                    one of your cantrips or weapon attacks, you can also deal 1d8 radiant damage to
                    that creature. You can use this feature a number of times equal to your
                    proficiency bonus, and you regain all expended uses when you finish a long rest.
                    This increases to 2d8 at level 14</p>

                <h2>Divine Intervention: 11</h2>
                <p>You can call on your deity to intervene on your behalf when your need is
                    great.</p>

                <p><strong>Divine Intervention.</strong> As a 2-action ability, you summon creatures
                    devoted to your God. You can summon a maximum of 4 creatures, their total CR
                    must be no more than your proficiency bonus x2. These creatures return to your
                    god after 1 hour.</p>

                <p>This feature requires the use of a tertiary spell slot.</p>

                <h2>Divine Domain Capstone: 20</h2>
                <p>You gain the capstone feature for your Divine Domain.</p>
