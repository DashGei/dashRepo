                <nav class="centered"><h2><a href="druid.html">Druid</a></h2></nav>
                <h2>Circle of the Stars</h2>
                <h3>Level 3: Weal and Woe </h3>
                <p>When you use guiding wind on a creature, you can give them a starry mote which
                    does one of the following things.</p>
                <ul>
                    <li>Weal - The mote adds a d4 to the creature’s next d20 roll</li>
                    <li>Woe - The mote subtracts a d4 from the creatures next d20 roll</li>
                </ul>
                <p>The mote disappears after a minute, and a creature cannot have more than one mote
                    at a a time.</p>

                <h3>Level 6: Circle Signature Spell</h3>
                <p>When you cast a circle spell with a Primary Spell Slot that would otherwise cost
                    2 actions, the casting time is instead one action.</p>
                <h3>Level 10: </h3>
                <p>Your mote’s die increases to a d6</p>
                <h3>Level 14: </h3>
                <p>Whenever a creature within your Guardian’s Aura takes damage, they gain a mote. </p>
                <h3>Level 20: Star Field</h3>
                <p>When an enemy creature leaves your guardian’s aura they take 4d6 radiant damage.
                    A creature can only take this damage once per turn.</p>
