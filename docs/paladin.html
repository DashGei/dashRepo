                                <h2>Physical and Mental Modifiers</h2>
                <p>Some of your abilities will require your <strong>Mental Modifier</strong> or <strong>Physical
                        Modifier</strong>.</p>
                <p>Your <strong>Physical Modifier</strong> is your Strength modifier.</p>
                <p>Your <strong>Mental Modifier</strong> is your Intelligence, Wisdom, or Charisma modifier.</p>

                <h2>Fighting Style: 1</h2>
                <p><em>Your combat training defines your approach to battle.</em> You adopt a particular style of
                    fighting as your specialty. Choose one of the following options. Each fighting style grants you a
                    bonus at level 1; you must be wielding one of your fighting style's respective items to gain this
                    benefit. At level 7, your fighting style provides you with a <strong>Martial Feat</strong>. This
                    feat does not count against your Feats Prepared, and it does not require a <strong>Feat
                        Slot</strong> when you use it. You must be wielding one of your fighting style's respective
                    items to use this feature, but you can use this feat regardless of your class.</p>
                <ul>
                    <li>Dueling: You gain a +2 health bonus at each level.</li>
                    <li>Skirmisher: You gain a +2 health bonus at each level.</li>
                    <li>Polearm: You gain a +2 health bonus at each level.</li>
                    <li>Unarmed: You gain a +2 health bonus at each level.</li>
                    <li>Two-Weapon: You gain a +2 health bonus at each level.</li>
                    <li>Priest: You gain a +2 health bonus at each level.</li>
                    <li>Brawler: You gain a +3 health bonus at each level.</li>
                    <li>Guardian: You gain a +3 health bonus at each level.</li>
                    <li>Great Weapon: You gain a +3 health bonus at each level.</li>
                </ul>
                <p>The health bonus is added to your hit point maximum at 1st level and whenever you gain a level in
                    this class.</p>

                <h2>Hit Points</h2>
                <p><strong>Hit Points at 1st Level:</strong> 12 + your fighting style health bonus</p>
                <p><strong>Hit Points at Higher Levels:</strong> 6 + your fighting style health bonus per paladin level
                    after 1st</p>

                <h2>Proficiencies</h2>
                <p><strong>Armor:</strong> All armor, shields</p>
                <p><strong>Weapons:</strong> Simple weapons, martial weapons</p>
                <p><strong>Tools:</strong> None</p>
                <p><strong>Saving Throws:</strong> Wisdom, Charisma</p>
                <p><strong>Skills:</strong> Choose two from Athletics, Insight, Intimidation, Medicine, Persuasion, and
                    Religion</p>





                <h2>Aura of Zeal: 1</h2>
                <p><em>Divine conviction radiates from you, shielding your allies.</em> You emanate a protective aura
                    that extends 10 feet from you in all directions, growing in radius as you gain levels. While your
                    aura is active (you are not incapacitated), enemies within it have a penalty to attack rolls against
                    creatures other than you equal to your <strong>Mental Modifier</strong>.</p>
                <p><strong>Zeal Dice.</strong> You have a pool of <strong>Zeal Dice</strong> that fuel your divine
                    abilities. Your <strong>Zeal Dice</strong> start as d4s, and they improve at higher levels. You can
                    hold a maximum number of <strong>Zeal Dice</strong> equal to your <strong>Proficiency
                        Bonus</strong>. They disappear when you finish a short or long rest.</p>
                <p>At the start of each of your turns, you gain one <strong>Zeal Die</strong> for each hostile creature
                    within your aura.</p>
                <p><strong>Divine Smite.</strong> When you hit a creature with a melee weapon attack, you can expend any
                    number of <strong>Zeal Dice</strong>. The attack deals additional <strong>radiant</strong> damage
                    equal to the total rolled.</p>
                <p><strong>Zealous Benediction.</strong> When you hit a creature with a melee weapon attack, you can
                    expend any number of <strong>Zeal Dice</strong> to heal a creature you can see within your aura
                    (including possibly yourself). That creature regains hit points equal to the total rolled.</p>

                <h2>Divine Sense: 1</h2>
                <p>As an <strong>action</strong>, you can detect celestials, fiends, and undead. For the next 10
                    minutes, you know the location of any creature of those types within 60 feet of you that is not
                    behind total cover. You also know if there is a place or object within 30 feet that has been
                    consecrated or desecrated.</p>
                <p>This feature requires the expenditure of a <strong>Secondary Spell Slot</strong>.</p>

                <h2>Spellcasting: 2</h2>
                <p><em>Your oath grants you the power to shape divine magic.</em></p>
                <p><strong>Spell Slots.</strong> The Paladin Spellcasting table shows how many spell slots you have to
                    cast your paladin spells. You regain all expended spell slots when you finish a long rest.</p>
                <p><strong>Spells Known.</strong> You know three paladin spells of your choice from the paladin spell
                    list. The Spells Known column of the Paladin Spellcasting table shows when you learn more paladin
                    spells. Each of these spells must be at maximum level equal to your highest level spell slot.</p>
                <p>Whenever you gain a level in this class, you can replace one paladin spell you know with another
                    spell of your choice from the paladin spell list. The new spell must be of a level for which you
                    have spell slots.</p>
                <p><strong>Spellcasting Economy.</strong> Casting a spell with a <strong>Cantrip</strong> requires one
                    action. Casting a spell with a <strong>Primary Spell Slot</strong> or <strong>Secondary Spell
                        Slot</strong> requires two actions.</p>
                <p><strong>Spellcasting Ability.</strong> Your <strong>Mental Modifier</strong> is your spellcasting
                    ability for your paladin spells. The DC for your spell saving throws equals your <strong>Mental
                        DC</strong> (8 + your <strong>Proficiency Bonus</strong> + your <strong>Mental
                        Modifier</strong>).</p>

                <h2>Sacred Oath: 3</h2>
                <p><em>You bind yourself to a sacred cause that grants you features </em> at 3rd
                    level, and then again at 7th, 14th, and 20th level. It also grants you additional <strong>Channel
                        Divinity</strong> options.</p>

                <h2>Channel Divinity: 3</h2>
                <p><em>Divine power flows through you at your command.</em> You can channel divine power by expending 3
                    <strong>Zeal Dice</strong> or by expending a <strong>Secondary Spell Slot</strong>. You have the
                    following option, plus any granted by your Sacred Oath:</p>
                <p><strong>Divine Sense.</strong> You can use the <strong>Divine Sense</strong> feature (see above)
                    without expending a <strong>Secondary Spell Slot</strong>.</p>
                <p><strong>Cleanse.</strong> As an <strong>action</strong>, you touch a creature and expend 2
                    <strong>Zeal Dice</strong> to end one of the following conditions affecting it:
                    <strong>blinded</strong>, <strong>charmed</strong>, <strong>deafened</strong>,
                    <strong>frightened</strong>, <strong>paralyzed</strong>, or <strong>poisoned</strong>.</p>

                <h2>Ability Score Improvement</h2>
                <p>At 4th, 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 1. You
                    can't increase an ability score above 5 using this feature.</p>

                <h2>Resilient Zeal: 4</h2>
                <p>Your conviction hardens as you protect others. When an ally within your aura takes damage from a
                    hostile creature, you gain one <strong>Zeal Die</strong>. This can happen only once per turn.</p>
                <p>Additionally, when you use Zealous Benediction to heal an ally, you gain hit points equal to your
                    <strong>Mental Modifier</strong> (minimum 1).</p>

                <h2>Martial Fatigue Resistance: 5</h2>
                <p>Taking the <strong>Attack action</strong> does not inflict you with the <strong>fatigued</strong>
                    condition.</p>

                <h2>Aura of Protection: 6</h2>
                <p><em>Your presence fortifies those who stand beside you.</em> While your aura is active, you and
                    friendly creatures within it add your <strong>Mental Modifier</strong> (minimum +1) to all saving
                    throws.</p>

                <h2>Abjure Foes: 9</h2>
                <p>You gain an additional <strong>Channel Divinity</strong> option:</p>
                <p><strong>Abjure Foes.</strong> As an <strong>action</strong>, you present your holy symbol and target
                    a number of creatures equal to your <strong>Mental Modifier</strong> (minimum 1) that you can see
                    within 60 feet. Each must succeed on a <strong>Mental DC</strong> Wisdom saving throw or be
                    <strong>frightened</strong> of you for 1 minute. While frightened in this way, a creature cannot
                    take <strong>reactions</strong>. A frightened creature can repeat the save at the end of each of its
                    turns, ending the effect on a success.</p>

                <h2>Aura of Courage: 10</h2>
                <p>While your aura is active, you and friendly creatures within it are immune to the
                    <strong>frightened</strong> condition.</p>

                <h2>Improved Divine Smite: 11</h2>
                <p><em>You are so suffused with divine might that your melee weapon strikes carry supernatural power.</em>
                    Whenever you hit a creature with a melee weapon, the target takes an extra 1d4
                    <strong>radiant</strong> damage. This does not require spending <strong>Zeal Dice</strong>.</p>

                <h2>Consecrated Ground: 11</h2>
                <p>As an <strong>action</strong>, you can cause your aura to emanate from a point you can see within 30
                    feet instead of from yourself. You must concentrate on this effect as if concentrating on a spell.
                    If your concentration ends, the aura returns to you immediately. While the aura is relocated, you do
                    not gain its benefits unless you are also within its radius.</p>

                <h2>Cleansing Touch: 13</h2>
                <p>Your <strong>Channel Divinity</strong> option Cleanse
                    improves. When you use Cleanse, you can end one spell affecting the creature instead of ending a
                    condition (no save, but the spell must be 5th level or lower). You can still end a condition if you
                    prefer.</p>

                <h2>Zeal Overflow: 15</h2>
                <p>When you would gain a <strong>Zeal Die</strong> and are already at your maximum, you roll that
                    <strong>Zeal Die</strong> and heal one creature of your choice within your aura.</p>

                <h2>Bulwark: 17</h2>
                <p><em>Your allies' presence fuels your divine power.</em> At the start of your turn, you gain one
                    <strong>Zeal Die</strong> for each friendly creature within your aura. Your maximum number of
                    <strong>Zeal Dice</strong> increases by your <strong>Mental Modifier</strong>.</p>

                <h2>Aura Expansion: 18</h2>
                <p>Your aura radius increases to 30 feet.</p>
