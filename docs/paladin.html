                <h2>Hit Points</h2>
                <p><strong>Class Health Number:</strong> 6</p>
                <p><strong>Hit Points at 1st Level:</strong> 12 + your fighting style health
                    bonus</p>
                <p><strong>Hit Points at Higher Levels:</strong> 6 + your fighting style health
                    bonus per paladin level after 1st</p>

                <h2>Proficiencies</h2>
                <ul>
                    <li><strong>Armor:</strong> All armor, shields</li>
                    <li><strong>Weapons:</strong> Simple weapons, martial weapons</li>
                    <li><strong>Tools:</strong> None</li>
                    <li><strong>Saving Throws:</strong> Wisdom, Charisma</li>
                    <li><strong>Skills:</strong> Choose two from Athletics, Insight, Intimidation,
                        Medicine, Persuasion, and Religion</li>
                </ul>

                <h2>Physical and Mental Modifiers</h2>
                <p>Some of your abilities will require your Mental or Physical Modifier.</p>
                <p>Your Physical Modifier is your Strength Modifier.</p>
                <p>Your Mental Modifier is your Intelligence, Wisdom, or Charisma Modifier.</p>

                <h2>Fighting Style: 1</h2>
                <p>You adopt a particular style of fighting as your specialty. Choose one of the
                    following options. Each Fighting style grants you a bonus at level 1, you must
                    be wielding one of your fighting style’s respective item to gain this benefit.
                    At level 7, your fighting style provides you with a Martial Feat, this feat does
                    not count against your Feats known, and it does not require a slot when you use
                    it. You must be wielding one of your fighting style’s respective item to use
                    this feature, but you can use this feat regardless of your class.</p>

                <ul>
                    <li>Dueling: You gain a +2 health bonus at each level.</li>
                    <li>Skirmisher: You gain a +2 health bonus at each level.</li>
                    <li>Polearm: You gain a +2 health bonus at each level.</li>
                    <li>Unarmed: You gain a +2 health bonus at each level.</li>
                    <li>Two-Weapon: You gain a +2 health bonus at each level.</li>
                    <li>Priest: You gain a +2 health bonus at each level.</li>
                    <li>Brawler: You gain a +3 health bonus at each level.</li>
                    <li>Guardian: You gain a +3 health bonus at each level.</li>
                    <li>Great Weapon: You gain a +3 health bonus at each level.</li>
                </ul>

                <p>The health bonus is added to your hit point maximum at 1st level and whenever you
                    gain a level in this class.</p>

                <h2>Aura of Zeal: 1</h2>
                <p>You emanate a protective aura of divine conviction. Your aura extends 10 feet
                    from you in all directions, growing in radius as you gain levels. While your
                    aura is active (you are not incapacitated), enemies within it have a penalty to
                    attack rolls against creatures other than you equal to your Mental Modifier.</p>

                <p><strong>Zeal Dice.</strong> You have a pool of Zeal Dice that fuel your divine
                    abilities. Your Zeal Dice start as d4s, and they improve at higher levels. You
                    can hold a maximum number of Zeal Dice equal to your proficiency bonus. They
                    disappear when you finish a short or long rest.</p>

                <p>At the start of each of your turns, you gain one Zeal Die for each hostile
                    creature within your aura.</p>

                <p><strong>Divine Smite.</strong> When you hit a creature with a melee weapon
                    attack, you can expend any number of Zeal Dice. The attack deals additional
                    radiant damage equal to the total rolled.</p>

                <p><strong>Zealous Benediction.</strong> When you hit a creature with a melee weapon
                    attack, you can expend any number of Zeal Dice to heal a creature you can see
                    within your aura (including yourself). That creature regains hit points equal to
                    the total rolled.</p>

                <h2>Divine Sense: 1</h2>
                <p>As an action, you can detect celestials, fiends, and undead. For the next 10
                    minutes, you know the location of any creature of those types within 60 feet of
                    you that is not behind total cover. You also know if there is a place or object
                    within 30 feet that has been consecrated or desecrated.</p>

                <p>This feature requires the expenditure of a Secondary Spell Slot.</p>

                <h2>Spellcasting: 2</h2>
                <p>You have sworn an oath that grants you the ability to cast spells.</p>

                <p><strong>Spell Slots.</strong> The Paladin Spellcasting table shows how many spell
                    slots you have to cast your paladin spells. You regain all expended spell slots
                    when you finish a long rest. Casting spells with a Primary Spell Slot requires
                    one action, casting a spell with a Secondary Slot requires two actions.</p>

                <p><strong>Spells Known.</strong> You know three paladin spells of your choice from
                    the paladin spell list. The Spells Known column of the Paladin Spellcasting
                    table shows when you learn more paladin spells. Each of these spells must be at
                    maximum level equal to your highest level spell slot.</p>

                <p>Whenever you gain a level in this class, you can replace one paladin spell you
                    know with another spell of your choice from the paladin spell list. The new
                    spell must be of a level for which you have spell slots.</p>

                <p><strong>Mental Modifier.</strong> Intelligence, Wisdom, or Charisma is your
                    Mental Modifier for your paladin spells. The DC for your spell saving throws
                    equals your Mental DC (8 + your proficiency bonus + your Mental Modifier).</p>

                <h2>Sacred Oath: 3</h2>
                <p>You swear an oath that binds you as a paladin. Your oath grants you features at
                    3rd level, and then again at 7th, 14th, and 20th level. It also grants you
                    additional Channel Divinity options.</p>

                <h2>Channel Divinity: 3</h2>
                <p>You can channel divine power by expending 3 Zeal Dice. You have the following
                    option, plus any granted by your Sacred Oath.</p>

                <p><strong>Divine Sense.</strong> As an action, you gain the effects of your Divine
                    Sense feature for 10 minutes without expending a use of a spell slot.</p>

                <h2>Ability Score Improvement</h2>
                <p>At 4th, 8th, 12th, 16th, and 19th level, you can increase an ability score by
                    1</p>

                <h2>Resilient Zeal: 4</h2>
                <p>Your conviction hardens as you protect others. When an ally within your aura
                    takes damage from a hostile creature, you gain one Zeal Die. This can happen
                    only once per turn.</p>

                <p>Additionally, when you use Zealous Benediction to heal an ally, you gain hit
                    points equal to your Mental Modifier (minimum 1).</p>

                <h2>Melee Fatigue Resistance: 5</h2>
                <p>When taking the attack action you do not suffer any penalties from the fatigued
                    condition.</p>

                <h2>Aura of Protection: 6</h2>
                <p>While your aura is active, you and friendly creatures within it add your Mental
                    Modifier (minimum +1) to all saving throws.</p>

                <h2>Abjure Foes: 9</h2>
                <p>You gain an additional Channel Divinity option:</p>

                <p><strong>Abjure Foes.</strong> As an action, you present your holy symbol and
                    target a number of creatures equal to your Mental Modifier (minimum 1) that you
                    can see within 60 feet. Each must succeed on a Mental DC Wisdom saving throw or
                    be frightened of you for 1 minute. While frightened in this way, a creature
                    cannot take reactions. A frightened creature can repeat the save at the end of
                    each of its turns, ending the effect on a success.</p>

                <h2>Aura of Courage: 10</h2>
                <p>While your aura is active, you and friendly creatures within it are immune to the
                    frightened condition.</p>

                <h2>Improved Divine Smite: 11</h2>
                <p>You are so suffused with divine might that your melee weapon strikes carry
                    supernatural power. Whenever you hit a creature with a melee weapon, the target
                    takes an extra 1d8 radiant damage. This does not require spending Zeal Dice.</p>

                <h2>Relocate Aura: 11</h2>
                <p>As an action, you can cause your aura to emanate from a point you can see within
                    30 feet instead of from yourself. You must concentrate on this effect as if
                    concentrating on a spell. If your concentration ends, the aura returns to you
                    immediately. While the aura is relocated, you do not gain its benefits unless
                    you are also within its radius.</p>

                <h2>Cleansing Touch: 13</h2>
                <p>Your Channel Divinity option Cleanse improves. When you expend 2 Zeal Dice to
                    touch a creature, you can end one of the following conditions: blinded, charmed,
                    deafened, frightened, paralyzed, or poisoned. Alternatively, you can end one
                    spell affecting the creature (no save, but the spell must be 5th level or
                    lower).</p>

                <h2>Zeal Overflow: 15</h2>
                <p>When you would gain a Zeal Die and are already at your maximum, you roll that
                    zeal die and heal one creature of your choice within your aura.</p>

                <h2>Aura Expansion: 18</h2>
                <p>Your aura radius increases to 30 feet.</p>

                <h2>Sacred Oath Capstone: 20</h2>
                <p>At 20th level, you gain the ultimate expression of your sworn oath, as detailed
                    in your Sacred Oath description.</p>
