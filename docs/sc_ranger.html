                <h1>Gloom Stalker</h2>

                    <h3>Level 3: Nativity in Black</h3>
                           <p>Darkvision. You gain Darkvision with a range of 60 feet. If you already have Darkvision, its
                        range
                        increases by 60 feet.</p>
                    <p>You are also adept at evading creatures that rely on Darkvision. While in darkness, you are
                        invisible
                        to any creature that relies on darkvision to see you in that darkness.</p>

                    <h3>Level 7: Into the Void</h3>
                    <p>When you reduce a marked creature to 0 hitpoints with an attack, you can immediately take the
                        hide
                        action at no cost.</p>
                    <p>A creature marked by you has disadvantage on Perception checks against you.</p>

                    <h3>Level 14: Fear of the Dark</h3>
                    <p>When you are invisible, creatures of your choice within 30 feet of you subtract 1d4 from wisdom
                        saving throws. A creature immune to the frightened condition is also immune to this effect.</p>
                    <p> When you use re-use hunters mark as part of the Mortal Reminder feature, the new marked
                        creature must make a Mental DC Wisdom save or be frightened until the end of your next turn.</p>
                    </p>

                    <h3>Level 20: Night Crawler</h3>
                    <p>A square of bright light becomes dim light, and a square which was originally dim light becomes
                        darkness when you occupy it.</p>
                    <p>When you hit a frightened creature with an attack, you deal an additonal 2d10 Psychic damage.</p>

                    <h1>Warden</h2>

                        <h3>Level 3: Wildshape:</h3>
                        <p>
                        <p>The power of nature allows you to assume the form of an animal. As an action, you
                            shape-shift into a Beast form that you have learned for this feature. You stay in that form
                            for a number of hours equal to half your
                            Ranger level or until you use Wild Shape again, have the Incapacitated condition,
                            or die. You can also leave the form early as an action.</p>
                        <p>Using Wildshape costs one Feat Slot.</p>

                        <p><strong>Known Forms.</strong> You know four Beast forms for this feature, chosen
                            from among Beast stat blocks that have a maximum Challenge Rating of 1/4 and
                            that lack a Fly Speed (see the Bestiary for stat block options). The Rat, Riding
                            Horse, Spider, and Wolf are recommended. Whenever you finish a Long Rest, you
                            can replace one of your known forms with another eligible form.</p>

                        <p><strong>Rules While Shape-Shifted:</strong>While in a form, you retain your
                            personality, memories, and ability to speak, and the following rules apply:</p>
                        <ul>
                            <li><strong>Game Statistics:</strong> Your game statistics are replaced by the
                                Beast’s stat block, but you retain your creature type; Hit Points;
                                Intelligence, Wisdom, and Charisma scores; class features; and languages.
                                You also retain your skill and saving throw proficiencies and use your
                                Proficiency Bonus for them, in addition to gaining the proficiencies of the
                                creature. If a skill or saving throw modifier in the Beast’s stat block is
                                higher than yours, use the one in the stat block.</li>
                            <li><strong>Objects:</strong>Your ability to handle objects is determined by the
                                form’s limbs rather than your own. In addition, you choose whether your
                                equipment falls in your space, merges into your new form, or is worn by it.
                                Worn equipment functions as normal, but the DM decides whether it’s
                                practical for the new form to wear a piece of equipment based on the
                                creature’s size and shape. Your equipment doesn’t change size or shape to
                                match the new form, and any equipment that the new form can’t wear must
                                either fall to the ground or merge with the form. Equipment that merges with
                                the form has no effect while you’re in that form.</li>
                        </ul>
                        </p>

                        <h3>Level 7: Beast Kin</h3>
                        <p>The maximum challenge rating for the forms you can take becomes CR 1, and you can pick a form
                            with a flying speed.</p>
                        <p>Additionally, you are always under the effects of the Speak with Animals spell while
                            transformed.</p>

                        <h3>Level 14: Beast Kin</h3>
                        <p>The maximum challenge rating for the forms you can take becomes CR 3, and you can pick a form
                            with a flying speed.</p>
                        <p>Additionally, you are always under the effects of the Speak with Animals spell even whilst
                            not transformed.</p>


                        <h3>Level 20: Path of Moss</h3>
                        <p>The maximum challenge rating for the forms you can take becomes CR 5, and you can pick a form
                            with a flying speed.</p>
                        <p>Additionally, when you are transformed you gain two additional Animal Aspects of your
                            choosing, which are lost when you dismiss Wildshape.</p>


                        <h1>Shaman</h2>

                            <h3>Level 3: Spellcasting:</h3>
                            <p>Cantrips.</p>
                            You know two cantrips of your choice from the Druid spell list. Whenever you gain a
                            Ranger
                            level,
                            you can replace one of these cantrips with another cantrip of your choice from the Druid
                            spell
                            list.
                            <h3>Level 3: Spell Slots</h3>
                            <p>The Half Mythic Spellcasting table shows how many spell slots you have to cast your
                                level 1+
                                spells. You regain all expended slots when you finish a Long Rest. Refer to the
                                spellcasting
                                rules section for casting rules.</p>

                            <p><strong>Spells Known.</strong> To start, you know three spells of your choice
                                from
                                the Druid spell list. The Spells Known column of the Druid Spellcasting
                                table shows when you learn more Druid spells. Each of these spells must be at
                                maximum level equal to your highest level spell slot.</p>

                            <p>Whenever you gain a level in this class, you can replace one Druid spell you
                                know with another spell of your choice from the Druid spell list. The new
                                spell must be of a level for which you have spell slots.</p>

                            <h3>Level 7: Primal Magicks</h3>
                            <p>When taking the magic action you do not suffer any penalties from the fatigued
                                condition</p>
                            <p>You are always under the effects of the Speak with Plants spell as if it were the
                                Speak with
                                Animals spell. In a 30 foot emenation, plants are imbued with limited sentience,
                                giving them
                                the ability to communicate with you and follow your simple commands. They lose this
                                sentience when they leave the emenation. Unlike the spell version, plants are not
                                automatically friendly to you or your party.</p>

                            <h3>Level 14: Blighted</h3>
                            <p>A creature marked by you has Disadvantage on saving throws against your spells.</p>

                            <h3>Level 20: Ancient Rites</h3>
                            <p>When you cast a spell with a Primary Slot, it only takes one action.</p>
