                <h2>Hit Points</h2>

                <p><strong>Class Health Number:</strong> 5</p>

                <p><strong>Hit Points at 1st Level:</strong> 10 + your fighting style health
                    bonus</p>

                <p><strong>Hit Points at Higher Levels:</strong> 5 + your fighting style health
                    bonus per scoundrel level after 1st</p>


                <h2>Proficiencies</h2>

                <ul>
                    <li><strong>Armor:</strong> Light armor</li>
                    <li><strong>Weapons:</strong> Simple weapons, rapiers, shortswords, scimitars,
                        whips, hand crossbows</li>
                    <li><strong>Tools:</strong> Choose one type of gaming set or a musical
                        instrument</li>
                    <li><strong>Saving Throws:</strong> Dexterity, Charisma</li>
                    <li><strong>Skills:</strong> Choose three from Acrobatics, Athletics, Deception,
                        Insight, Intimidation, Performance, Persuasion, Sleight of Hand, and
                        Stealth</li>
                </ul>


                <h2>Physical and Mental Modifiers: 1</h2>

                <p>Some of your abilities will require your Mental or Physical Modifier.</p>

                <p>Your Physical Modifier is your Strength or Dexterity Modifier.</p>

                <p>Your Mental Modifier is your Charisma Modifier.</p>


                <h2>Fighting Style: 1</h2>

                <p>You adopt a particular style of fighting as your specialty. Choose one of the
                    following options. Each Fighting style grants you a bonus at level 1, you must
                    be wielding one of your fighting style’s respective item to gain this benefit.
                    At level 7, your fighting style provides you with a Martial Feat, this feat does
                    not count against your Feats known, and it does not require a slot when you use
                    it. You must be wielding one of your fighting style’s respective item to use
                    this feature, but you can use this feat regardless of your class.</p>

                <ul>
                    <li>Archery: You gain a +1 health bonus at each level.</li>
                    <li>Dueling: You gain a +2 health bonus at each level.</li>
                    <li>Unarmed: You gain a +2 health bonus at each level.</li>
                    <li>Skirmisher: You gain a +2 health bonus at each level.</li>
                    <li>Thrown Weapon: You gain a +2 health bonus at each level.</li>
                    <li>Two-Weapon Fighting: You gain a +2 health bonus at each level.</li>
                </ul>

                <p>The health bonus is added to your hit point maximum at 1st level and whenever you
                    gain a level in this class.</p>


                <h2>Fancy Footwork: 1</h2>

                <p>Your elegant movement confounds your foes. When you make a melee attack against a
                    creature, you gain the benefits of the disengage action against that creature
                    until the start of your next turn.</p>


                <h2>Exploit Opening: 1</h2>

                <p>You excel at turning a foe's moment of weakness into a devastating opportunity.
                    When you hit a creature with a weapon attack, you can deal extra psychic damage
                    if that creature has failed a saving throw or ability check against one of your
                    features or spells since the start of your turn.</p>

                <p>A creature can take this damage once, afterwards it becomes immune to this damage
                    until the start of your next turn.</p>

                <p>The extra damage equals a number of d4 equal to your proficiency bonus.</p>


                <h2>Second Reaction: 1</h2>

                <p>Your reflexes are exceptionally sharp. You can take two reactions per round.</p>


                <h2>Panache: 2</h2>

                <p>Your charm and bravado can captivate a foe. As an action, you can make a Charisma
                    ability check using Deception, Intimidation, Performance, or Persuasion (your
                    choice) contested by a creature's Wisdom (Insight) check. The creature must be
                    within 30 feet and able to see or hear you.</p>

                <p>On a success, you have advantage on attack rolls against that creature, and it
                    has disadvantage on attack rolls against creatures other than you. This effect
                    lasts for 1 minute or until you use this feature again.</p>

                <p>You can use this feature a number of times equal to your proficiency bonus, and
                    you regain all expended uses when you finish a short or long rest.</p>


                <h2>Martial Feats: 2</h2>

                <p>You have trained in special techniques that give you an edge in combat and
                    beyond. You gain access to martial feats, as described in the Martial Feats
                    section. You may only use one Feat Slot per turn.</p>

                <p><strong>Primary Slots.</strong> You have 3 Primary Slots, which you expend to
                    activate your feats. You regain all expended slots when you finish a short rest.
                    Your number of Primary Slots increases as you gain levels, as shown in the Feats
                    Progression table.</p>

                <p><strong>Feats Known.</strong> You know 4 martial feats of your choice from the
                    scoundrel feat list. The Feats Known column of the Feats Progression table shows
                    when you learn more feats. Additionally, when you gain a level in this class,
                    you can replace one scoundrel feat you know with another feat of your choice
                    from the scoundrel feat list.</p>

                <p><strong>Feat Tier.</strong> You can learn feats of Tier 1 at level 2. At higher
                    levels you gain access to higher tiers, as shown in the table.</p>

                <h2>Scoundrel Archetype: 3</h2>

                <p>You choose an archetype that embodies your particular style of daring. Your
                    archetype grants you features at 3rd level, and then again at 7th, 14th, and
                    20th level.</p>


                <h2>Ability Score Improvement</h2>

                <p>At 4th, 8th, 12th, 16th, and 19th level, you can increase an ability score by
                    1</p>


                <h2>Martial Fatigue Resistance: 5</h2>

                <p>Taking the attack action does not inflict you with the fatigued condition.</p>


                <h2>Silver Tongue: 6</h2>

                <p>When you or an ally within 30 feet fails a Charisma skill check, you may
                    interject and attempt to save face adding a d8 to the result.</p>

                <p>This feature requires the use of a Feat Slot, when you use this feature, mark one
                    Feat Slot.</p>


                <h2>Improved Exploit: 9</h2>

                <p>You are difficult to pin down. When making strength or dexterity saving throws,
                    you can choose to use your charisma modifier instead.</p>


                <h2>Improved Panache: 10</h2>

                <p>Your Panache can now affect multiple creatures at once. When you use Panache, you
                    can choose any number of creatures within 30 feet. Make a single Charisma
                    ability check contested by the highest Wisdom (Insight) check among your
                    targets. Any creature whose Insight check is lower than your Charisma check is
                    affected as normal.</p>


                <h2>Wealth of Experience: 11</h2>

                <p>As an action, choose an object that you can see within 30 feet of you. You learn
                    its properties and how to use them, whether it requires attunement to use, and
                    how many charges it has, if any. You learn whether any spells are affecting the
                    item and what they are. If the item was created by a spell, you learn which
                    spell created it. You also immediately know the identity of any organization
                    that lead to the creation of the object if any mortal in the universe shares
                    this knowledge.</p>

                <p>Once you use this feature, may not do so again until you finish a long rest.</p>


                <h2>Improved Exploit: 13</h2>

                <p>Your Exploit Opening damage die increases to a d6 and Exploit Opening may be
                    applied twice until a creature becomes immune.</p>


                <h2>Scoundrel's Panache: 15</h2>

                <p>Your flair extends beyond combat. You gain the following benefits:</p>

                <ul>
                    <li>You can add your Charisma modifier to your initiative rolls.</li>
                    <li>You have advantage on Charisma ability checks made in social
                        situations.</li>
                </ul>


                <h2>Extra Fancy Footwork: 17</h2>

                <p>Your speed increases to 40 feet, you gain a climbing and swimming speed equal to
                    your walking speed.</p>


                <h2>Irresistible: 18</h2>

                <p>As long as a creature has made a check against your Panache, successful or not,
                    you may apply Exploit Opening.</p>


                <h2>Archetype Capstone: 20</h2>

                <p>At 20th level, you gain the ultimate expression of your chosen archetype, as
                    detailed in your scoundrel Archetype description.</p>
