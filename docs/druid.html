                <h2>Hit Points</h2>
                <p><strong>Class Health Number:</strong> 5</p>
                <p><strong>Hit Points at 1st Level:</strong> 10 + your fighting style health
                    bonus</p>
                <p><strong>Hit Points at Higher Levels:</strong> 5 + your fighting style health
                    bonus per druid level after 1st</p>

                <h2>Proficiencies</h2>
                <ul>
                    <li><strong>Armor:</strong> Light armor, medium armor, shields</li>
                    <li><strong>Weapons:</strong> Clubs, daggers, darts, javelins, maces,
                        quarterstaffs, scimitars, sickles, slings, spears</li>
                    <li><strong>Tools:</strong> Herbalism kit</li>
                    <li><strong>Saving Throws:</strong> Intelligence, Wisdom</li>
                    <li><strong>Skills:</strong> Choose two from Arcana, Animal Handling, Insight,
                        Medicine, Nature, Perception, Religion, and Survival</li>
                </ul>

                <h2>Physical and Mental Modifiers</h2>
                <ul>
                    <li><strong>Physical Modifier:</strong> Strength or Dexterity modifier</li>
                    <li><strong>Mental Modifier:</strong> Intelligence or Wisdom modifier</li>
                </ul>

                <h2>Fighting Style</h2>
                <p>You adopt a particular style of connection to nature as your specialty. Choose
                    one of the following options. Each Fighting style grants you a health bonus at
                    level 1. At level 7, your fighting style provides additional benefits as noted
                    in the Fighting Styles section.</p>
                <ul>
                    <li>Sage: You gain a +2 health bonus at each level.</li>
                    <li>Arcanist: You gain a +2 health bonus at each level.</li>
                    <li>Priest: You gain a +2 health bonus at each level.</li>
                    <li>Druidic Warrior: You gain a +3 health bonus at each level.</li>
                </ul>
                <p>The health bonus is added to your hit point maximum at 1st level and whenever you
                    gain a level in this class.</p>

                <h2>Spellcasting</h2>
                <p>Drawing on the divine essence of nature, you can cast spells to shape that
                    essence to your will.</p>
                <p><strong>Cantrips:</strong> At 1st level, you know two cantrips of your choice
                    from the druid spell list. You learn additional druid cantrips of your choice at
                    higher levels, as shown in the Cantrips Known column of the Druid Spellcasting
                    table.</p>
                <p><strong>Preparing and Casting Spells:</strong> The Druid Spellcasting table shows
                    how many spell slots you have to cast your druid spells. To cast one of your
                    druid spells, you must expend a slot of the spell's level or higher. You regain
                    all expended spell slots when you finish a long rest. When you finish a long
                    rest, you prepare the list of druid spells that are available for you to cast.
                    To do so, choose a number of druid spells from your druid spell list equal to
                    your Wisdom modifier + your druid level (minimum of one spell). The spells must
                    be of a level for which you have spell slots.</p>
                <p><strong>Spellcasting Economy.</strong> Casting a spell with a Cantrip requires
                    one action. Casting a spell with a Primary or Secondary Spell Slot requires two
                    actions.</p>
                <p><strong>Spellcasting Ability:</strong> Your Mental Modifier is your spellcasting
                    ability for your druid spells. The DC for your spell saving throws equals your
                    Mental DC (8 + your proficiency bonus + your Mental Modifier).</p>
                <p><strong>Ritual Casting:</strong> You can cast a druid spell as a ritual if that
                    spell has the ritual tag and you have the spell prepared.</p>
                <p><strong>Spellcasting Focus:</strong> You can use a druidic focus as a
                    spellcasting focus for your druid spells.</p>

                <h2>Guardian's Aura: 1</h2>
                <p>At 1st level, you emanate a protective aura of natural energy. Your aura extends
                    15 feet from you in all directions. While your aura is active (you are not
                    incapacitated), you can use the following reaction:</p>
                <p><strong>Guiding Winds.</strong> As a reaction when a creature enters your aura or
                    starts its turn there, you can attempt to shift its position. Choose one
                    creature within your aura. You move that creature up to 10 feet to an unoccupied
                    space that you can see. The destination must remain within your aura.</p>
                <ul>
                    <li>If the creature is willing, this movement succeeds automatically.</li>
                    <li>If the creature is unwilling, it must succeed on a Physical DC Strength
                        saving throw or be moved. You choose the direction of the movement.</li>
                    <li>This movement does not provoke opportunity attacks.</li>
                </ul>
                <p><strong>Aura Expansion.</strong> At 7th level, your aura radius increases to 20
                    feet. At 13th level, it increases to 25 feet.</p>

                <h2>Wildshape: 2</h2>
                <p>The power of nature allows you to assume the form of an animal. As an action, you
                    shape-shift into a Beast form that you have learned for this feature (see “Known
                    Forms” below). You stay in that form for a number of hours equal to half your
                    Druid level or until you use Wild Shape again, have the Incapacitated condition,
                    or die. You can also leave the form early as an action.</p>
                <p>Using Wildshape costs one Secondary Spell Slot.</p>

                <p><strong>Known Forms.</strong> You know four Beast forms for this feature, chosen
                    from among Beast stat blocks that have a maximum Challenge Rating of 1/4 and
                    that lack a Fly Speed (see appendix B for stat block options). The Rat, Riding
                    Horse, Spider, and Wolf are recommended. Whenever you finish a Long Rest, you
                    can replace one of your known forms with another eligible form.</p>
                <p>When you reach certain Druid levels, your number of known forms and the maximum
                    Challenge Rating for those forms increases, as shown in the Beast Shapes table.
                    In addition, starting at level 8, you can adopt a form that has a Fly Speed.</p>

                <p><strong>Rules While Shape-Shifted:</strong>While in a form, you retain your
                    personality, memories, and ability to speak, and the following rules apply:</p>
                <ul>
                    <li><strong>Temporary Hit Points:</strong> When you assume a Wild Shape form,
                        you gain a number of Temporary Hit Points equal to your Druid level.</li>
                    <li><strong>Game Statistics:</strong> Your game statistics are replaced by the
                        Beast’s stat block, but you retain your creature type; Hit Points;
                        Intelligence, Wisdom, and Charisma scores; class features; and languages.
                        You also retain your skill and saving throw proficiencies and use your
                        Proficiency Bonus for them, in addition to gaining the proficiencies of the
                        creature. If a skill or saving throw modifier in the Beast’s stat block is
                        higher than yours, use the one in the stat block.</li>
                    <li><strong>No Spellcasting:</strong>You can’t cast spells, but shape-shifting
                        doesn’t break your Concentration or otherwise interfere with a spell you’ve
                        already cast.</li>
                    <li><strong>Objects:</strong>Your ability to handle objects is determined by the
                        form’s limbs rather than your own. In addition, you choose whether your
                        equipment falls in your space, merges into your new form, or is worn by it.
                        Worn equipment functions as normal, but the DM decides whether it’s
                        practical for the new form to wear a piece of equipment based on the
                        creature’s size and shape. Your equipment doesn’t change size or shape to
                        match the new form, and any equipment that the new form can’t wear must
                        either fall to the ground or merge with the form. Equipment that merges with
                        the form has no effect while you’re in that form.</li>
                </ul>

                <h2>Nature's Sanctuary: 2</h2>
                <p>Beginning at 2nd level, when a beast or plant creature threatens you, it senses
                    your connection to nature. You gain the following benefits:</p>
                <ul>
                    <li>Beasts and plant creatures have disadvantage on attack rolls against
                        you.</li>
                    <li>You can use your action to attempt to calm a beast or plant creature within
                        30 feet that can see and hear you. The creature must make a Mental DC Wisdom
                        saving throw. On a failure, it is charmed for 1 minute or until you or your
                        allies damage it.</li>
                </ul>

                <h2>Druid Circle: 3</h2>
                <p>At 3rd level, you choose a <a href="sc_druid.html">Druid Circle</a> that shapes
                    your connection to nature. Your choice grants features at 3rd, 6th, 10th, 14th,
                    and 20th level.</p>

                <h2>Tertiary Slots: 3</h2>
                <p>At 3rd level, you gain access to tertiary spell slots, as shown on the
                    Spellcasting table. Refer to the Spellcasting section for the rules governing
                    the casting of tertiary slot spells.</p>

                <h2>Ability Score Improvement</h2>
                <p>At 4th, 8th, 12th, 16th, and 19th level, you can increase one ability score of
                    your choice by 1. You can't increase an ability score above 5 using this
                    feature.</p>

                <h2>Magic Fatigue Resistance: 5</h2>
                <p>Taking the magic action does not inflict you with the fatigued condition.</p>

                <h2>Guiding Winds II: 5</h2>
                <p>At 5th level, you can use your Guiding Winds reaction at any time without a
                    trigger.</p>

                <h2>Guardian's Aura: Soothing Breeze: 7</h2>
                <p>When a creature within your aura regains hit points from any source, you can use
                    your reaction to increase the healing by an amount equal to your Druid
                    level.</p>

                <h2>Guardian's Aura: Thorns: 13</h2>
                <p>When a creature within your aura hits you or an ally with a melee attack, you can
                    use your reaction to deal damage equal to your Wisdom modifier (piercing
                    damage).</p>

                <h2>Timeless Body: 18</h2>
                <p>At 18th level, the primal magic you wield causes you to age more slowly. For
                    every 10 years that pass, your body ages only 1 year.</p>

                <h2>Beast Spells: 20</h2>
                <p>At 20th level, you can cast druid spells while in any Wildshape form. You can
                    cast spells of a level equal to or less than the CR of your current beast form.
                    You can provide somatic and verbal components using the form's natural anatomy
                    and sounds.</p>
