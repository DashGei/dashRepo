                <h2>Physical and Mental Modifiers</h2>
                <p>Some of your abilities will require your <strong>Mental Modifier</strong> or <strong>Physical
                        Modifier</strong>.</p>
                <p>Your <strong>Physical Modifier</strong> is your Strength or Dexterity modifier.</p>
                <p>Your <strong>Mental Modifier</strong> is your Intelligence modifier.</p>

                <h2>Fighting Style: 1</h2>
                <p><em>Your combat training defines your approach to battle.</em> You adopt a particular style of
                    fighting as your specialty. Choose one of the following options. Each fighting style grants you a
                    health bonus at level 1; you must be wielding one of your fighting style's respective items to gain
                    this benefit. At level 7, your fighting style provides you with a <strong>Martial Feat</strong>.
                    This feat does not count against your Feats Prepared, and it does not require a <strong>Feat
                        Slot</strong> when you use it. You must be wielding one of your fighting style's respective
                    items to use this feature, but you can use this feat regardless of your class.</p>
                <ul>
                    <li>Arcanist: You gain a +2 health bonus at each level.</li>
                    <li>Archery: You gain a +2 health bonus at each level.</li>
                    <li>Dueling: You gain a +2 health bonus at each level.</li>
                    <li>Great Weapon: You gain a +3 health bonus at each level.</li>
                    <li>Guardian: You gain a +3 health bonus at each level.</li>
                    <li>Polearm: You gain a +2 health bonus at each level.</li>
                    <li>Skirmisher: You gain a +2 health bonus at each level.</li>
                    <li>Two-Weapon: You gain a +2 health bonus at each level.</li>
                    <li>War Mage: You gain a +3 health bonus at each level.</li>
                </ul>

                <p>The health bonus is added to your hit point maximum at 1st level and whenever you gain a level in
                    this class.</p>
                <h2>Hit Points</h2>
                <p><strong>Hit Points at 1st Level:</strong> 12 + your fighting style health bonus</p>
                <p><strong>Hit Points at Higher Levels:</strong> 6 + your fighting style health bonus per spellblade
                    level after 1st</p>

                <h2>Proficiencies</h2>
                <p><strong>Armor:</strong> Light armor, medium armor, shields</p>
                <p><strong>Weapons:</strong> Simple weapons, martial weapons</p>
                <p><strong>Tools:</strong> None</p>
                <p><strong>Saving Throws:</strong> Strength, Intelligence</p>
                <p><strong>Skills:</strong> Choose two from Acrobatics, Arcana, Athletics, History, Insight,
                    Investigation, and Perception</p>




                <h2>Cantrips: 1</h2>
                <p>You know three cantrips of your choice from the spellblade spell list. You learn one additional
                    spellblade cantrip of your choice at 4th, 8th, 12th, and 16th level.</p>

                <h2>Arcanum Charges: 1</h2>
                <p><em>You store arcane energy in your blade, building toward powerful expressions.</em> This energy is
                    represented by <strong>Arcanum Charges</strong>.</p>
                <p><strong>Gaining Charges.</strong> When you cast a spell using a spell slot, you gain <strong>Arcanum
                        Charges</strong>:</p>
                <ul>
                    <li>Casting a spell with a <strong>Primary Spell Slot</strong> grants you 1 <strong>Arcanum
                            Charge</strong>.</li>
                    <li>Casting a spell with a <strong>Secondary Spell Slot</strong> grants you 2 <strong>Arcanum
                            Charges</strong>.</li>
                </ul>
                <p>You gain these charges after resolving the spell's effects.</p>
                <p><strong>Maximum Charges.</strong> You can hold a maximum number of <strong>Arcanum Charges</strong>
                    equal to your <strong>Mental Modifier</strong> (minimum 1). Any charges gained beyond this maximum
                    are lost.</p>
                <p><strong>Losing Charges.</strong> Your <strong>Arcanum Charges</strong> fade when you finish a short
                    or long rest, as the stored energy dissipates.</p>

                <h2>Cantrip Strike: 1</h2>
                <p><em>You channel a cantrip through your weapon with every swing.</em> When you hit a creature with a
                    weapon attack, you can spend 1 <strong>Arcanum Charge</strong> or a <strong>Primary Spell
                        Slot</strong> to channel a cantrip through the strike. The cantrip manifests immediately with
                    the following modifications:</p>
                <ul>
                    <li>If the cantrip deals damage, the target takes that damage in addition to the weapon's damage.
                    </li>
                    <li>If the cantrip forces a saving throw, the target automatically fails.</li>
                    <li>If the cantrip requires an attack roll, it automatically hits.</li>
                    <li>If the cantrip has an area of effect, it is centered on the target, and you are unaffected by
                        it.</li>
                </ul>
                <p>You can use this feature only with cantrips you know. You do not need to take the <strong>Magic
                        action</strong> to use Cantrip Strike; the cantrip is unleashed as part of the attack.</p>

                <h2>Spellcasting: 2</h2>
                <p><em>You have learned to weave arcane magic through your blade.</em></p>
                <p><strong>Spell Slots.</strong> The Spellblade Spellcasting table shows how many spell slots you have
                    to cast your spells. You regain all expended spell slots when you finish a long rest.</p>
                <p><strong>Spellcasting Economy.</strong> Casting a spell with a <strong>Cantrip</strong> requires one
                    action. Casting a spell with a <strong>Primary Spell Slot</strong> or <strong>Secondary Spell
                        Slot</strong> requires two actions.</p>
                <p><strong>Spells Known.</strong> You know three spellblade spells of your choice from the spellblade
                    spell list. The Spells Known column of the Spellblade Spellcasting table shows when you learn more
                    spells. Each of these spells must be of a level for which you have spell slots.</p>
                <p>Whenever you gain a level in this class, you can replace one spellblade spell you know with another
                    spell of your choice from the spellblade spell list. The new spell must be of a level for which you
                    have spell slots.</p>
                <p><strong>Spellcasting Ability.</strong> Intelligence is your spellcasting ability for your spellblade
                    spells. The DC for your spell saving throws equals your <strong>Mental DC</strong> (8 + your
                    <strong>Proficiency Bonus</strong> + your <strong>Mental Modifier</strong>).
                </p>
                <p><strong>Spellcasting Focus.</strong> You can use a weapon with which you are proficient as a
                    <strong>spellcasting focus</strong> for your spellblade spells.
                </p>

                <h2>Arcane Order: 3</h2>
                <p><em> You choose an <a href="sc_spellblade.html">Arcane Order</a> that defines your relationship with
                        magic and steel. </em>
                    Your choice grants you features at 3rd level, and then again at 7th, 14th, and 20th level.</p>

                <h2>Ability Score Improvement</h2>
                <p>At 4th, 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 1. You
                    can't increase an ability score above 5 using this feature.</p>

                <h2>Versatile Fatigue Resistance: 5</h2>
                <p>Choose one of the following options:
                </p>
                <ul>
                    <li>Taking the <strong>Attack action</strong> does not inflict you with the
                        <strong>fatigued</strong> condition.
                    </li>
                    <li>Taking the <strong>Magic action</strong> does not inflict you with the <strong>fatigued</strong>
                        condition.</li>
                </ul>

                <h2>Arcane Reflexes: 6</h2>
                <p>When a creature within 60 feet of you casts a spell, you can use your <strong>reaction</strong> to
                    gain one <strong>Arcanum Charge</strong>.</p>

                <h2>Charge Capacity Increase: 9</h2>
                <p>Your capacity for <strong>Arcanum Charges</strong> increases. The maximum number of charges you can
                    hold now equals your <strong>Mental Modifier</strong> + your <strong>Proficiency Bonus</strong>.</p>

                <h2>Potent Cantrip Strike: 10</h2>
                <p>Whenever you hit a creature with a melee weapon, the target takes an extra 1d6 <strong>force</strong>
                    damage.</p>

                <h2>Weave Strike: 11</h2>
                <p><em>You unleash stored energy in a devastating combination of steel and sorcery.</em> As a
                    <strong>2-action</strong> ability, you can spend 3 <strong>Arcanum Charges</strong> and expend a
                    <strong>Secondary Spell Slot</strong> to make one melee weapon attack and cast a spell using that
                    slot simultaneously. The spell manifests through the strike, using its normal casting time, range,
                    and effects.
                </p>
                <p>The spell's target or area of effect originates from the creature you hit with the weapon attack. If
                    the spell would normally require an attack roll, that roll is replaced by the success of your weapon
                    attack; if your weapon attack hits, the spell hits. If the spell requires a saving throw, the
                    targets have disadvantage.</p>
                <p>You can use this feature once. You regain the ability to do so when you finish a short or long rest.
                </p>

                <h2>Versatile Fatigue Resistance II: 15</h2>
                <p>You gain the fatigue resistance option you did not choose at 5th level.</p>

                <h2>Weave Strike Mastery: 17</h2>
                <p>You can use Weave Strike twice between short or long rests. Additionally, when you use Weave Strike,
                    you can spend up to 3 additional <strong>Arcanum Charges</strong> (for a total of 6) to apply one of
                    the following enhancements:</p>
                <ul>
                    <li><strong>Empowered.</strong> Add the spent charges to one damage roll of the spell.</li>
                    <li><strong>Overwhelming.</strong> The spell's saving throws are made with disadvantage.</li>
                    <li><strong>Echoing.</strong> The spell affects an additional target within range.</li>
                </ul>

                <h2>Arcane Synthesis: 18</h2>
                <p><em>Your blade has become a permanent extension of your magical being.</em> You gain the following
                    benefits:</p>
                <ul>
                    <li>When you roll initiative, you gain 2 <strong>Arcanum Charges</strong>.</li>
                    <li>You can use Cantrip Strike without spending an <strong>Arcanum Charge</strong> once per turn.
                    </li>
                </ul>
