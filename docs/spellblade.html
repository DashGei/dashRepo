                <h2>Hit Points</h2>

                <p><strong>Class Health Number:</strong> 6</p>
                <p><strong>Hit Points at 1st Level:</strong> 12 + your fighting style health
                    bonus</p>
                <p><strong>Hit Points at Higher Levels:</strong> 6 + your fighting style health
                    bonus per spellblade level after 1st</p>

                <h2>Proficiencies</h2>

                <ul>
                    <li><strong>Armor:</strong> Light armor, medium armor, shields</li>
                    <li><strong>Weapons:</strong> Simple weapons, martial weapons</li>
                    <li><strong>Tools:</strong> None</li>
                    <li><strong>Saving Throws:</strong> Strength, Intelligence</li>
                    <li><strong>Skills:</strong> Choose two from Acrobatics, Arcana, Athletics,
                        History, Insight, Investigation, and Perception</li>
                </ul>

                <h2>Physical and Mental Modifiers</h2>

                <p>Some of your abilities will require your Mental or Physical Modifier.</p>
                <p>Your Physical Modifier is your Strength or Dexterity Modifier.</p>
                <p>Your Mental Modifier is your Intelligence Modifier.</p>

                <h2>Fighting Style</h2>

                <p>You adopt a particular style of fighting as your specialty. Choose one of the
                    following options. Each Fighting style grants you a health bonus at level 1. You
                    must be wielding one of your fighting style's respective items to gain this
                    benefit.</p>

                <p>At level 7, your fighting style provides you with a Martial Feat. This feat does
                    not count against your Feats known, and it does not require a slot when you use
                    it. You must be wielding one of your fighting style's respective items to use
                    this feature.</p>

                <ul>
                    <li>Arcanist: You gain a +2 health bonus at each level.</li>
                    <li>Archery: You gain a +2 health bonus at each level.</li>
                    <li>Dueling: You gain a +2 health bonus at each level.</li>
                    <li>Great Weapon: You gain a +3 health bonus at each level.</li>
                    <li>Guardian: You gain a +3 health bonus at each level.</li>
                    <li>Polearm: You gain a +2 health bonus at each level.</li>
                    <li>Skirmisher: You gain a +2 health bonus at each level.</li>
                    <li>Two-Weapon: You gain a +2 health bonus at each level.</li>
                    <li>War Mage: You gain a +3 health bonus at each level.</li>
                </ul>

                <p>The health bonus is added to your hit point maximum at 1st level and whenever you
                    gain a level in this class.</p>

                <h2>Cantrips: 1</h2>

                <p>You know three cantrips of your choice from the spellblade spell list. You learn
                    one additional spellblade cantrip of your choice at 4th, 8th, 12th, and 16th
                    level.</p>

                <h2>Arcanum Charges: 1</h2>

                <p>You can store arcane energy in your blade, building toward powerful expressions.
                    This energy is represented by Arcanum Charges.</p>

                <p><strong>Gaining Charges.</strong> When you cast a spell using a spell slot, you
                    gain Arcanum Charges:</p>

                <ul>
                    <li>Casting a spell with a Primary Slot grants you 1 Arcanum Charge</li>
                    <li>Casting a spell with a Secondary Slot grants you 2 Arcanum Charges</li>
                </ul>

                <p>You gain these charges after resolving the spell's effects.</p>

                <p><strong>Maximum Charges.</strong> You can hold a maximum number of Arcanum
                    Charges equal to your Intelligence modifier (minimum of 1). Any charges gained
                    beyond this maximum are lost.</p>

                <p><strong>Losing Charges.</strong> Your Arcanum Charges fade when you finish a
                    short or long rest, as the stored energy dissipates.</p>

                <h2>Cantrip Strike: 1</h2>

                <p>When you hit a creature with a weapon attack, you can spend 1 Arcanum Charge, or
                    a Primary Slot to channel a cantrip through the strike. The cantrip manifests
                    immediately with the following modifications:</p>

                <ul>
                    <li>If the cantrip deals damage, the target takes that damage in addition to the
                        weapon's damage.</li>
                    <li>If the cantrip forces a saving throw, the target automatically fails.</li>
                    <li>If the cantrip requires an attack roll, it automatically hits</li>
                    <li>If the cantrip has an area of effect, it is centered on the target, and you
                        are unaffected by it.</li>
                </ul>

                <p>You can use this feature only with cantrips you know. You do not need to take the
                    Magic action to use Cantrip Strike as the cantrip is unleashed as part of the
                    attack.</p>

                <h2>Spellcasting: 2</h2>

                <p>You have learned to weave arcane magic through your blade, casting spells as you
                    fight.</p>

                <p><strong>Spell Slots.</strong> The Spellblade Spellcasting table shows how many
                    spell slots you have to cast your spells. You regain all expended spell slots
                    when you finish a long rest.</p>

                <p><strong>Spellcasting Economy.</strong> Casting a spell with a Cantrip requires
                    one action. Casting a spell with a Primary or Secondary Spell Slot requires two
                    actions.</p>

                <p><strong>Spells Known.</strong> You know three spellblade spells of your choice from
                    the spellblade spell list. The Spells Known column of the Spellblade
                    Spellcasting table shows when you learn more spells. Each of these spells must
                    be of a level for which you have spell slots.</p>

                <p>Whenever you gain a level in this class, you can replace one spellblade spell you
                    know with another spell of your choice from the spellblade spell list. The new
                    spell must be of a level for which you have spell slots.</p>

                <p><strong>Spellcasting Ability.</strong> Intelligence is your spellcasting ability
                    for your spellblade spells. The DC for your spell saving throws equals your
                    Mental DC (8 + your proficiency bonus + your Intelligence modifier).</p>

                <p><strong>Spellcasting Focus.</strong> You can use a weapon with which you are
                    proficient as a spellcasting focus for your spellblade spells.</p>

                <h2>Stance of the Weave: 2</h2>

                <p>At the start of each of your turns, you align your magical resonance toward one
                    of three expressions. The chosen stance lasts until the start of your next
                    turn.</p>

                <ul>
                    <li><strong>Offense Stance.</strong> Your attack rolls increase by +1 for each
                        Arcanum Charge you hold.</li>
                    <li><strong>Movement Stance.</strong> Your speed increases by 5 feet for each
                        Arcanum Charge you hold.</li>
                    <li><strong>Spell Stance.</strong> Your spell save DC increases by +1 for each
                        Arcanum Charge you hold.</li>
                </ul>

                <h2>Arcane Order: 3</h2>

                <p>You choose an Arcane Order that defines your relationship with magic and steel.
                    Your choice grants you features at 3rd level, and then again at 7th, 14th, and
                    20th level.</p>

                <h2>Ability Score Improvement</h2>

                <p>At 4th, 8th, 12th, 16th, and 19th level, you can increase an ability score by
                    1</p>

                <h2>Versatile Fatigue Resistance: 5</h2>

                <p>Choose one of the following options:</p>

                <ul>
                    <li>When taking the attack action you do not suffer any penalties from the
                        fatigued condition</li>
                    <li>When taking the magic action you do not suffer any penalties from the
                        fatigued condition</li>
                </ul>

                <h2>Arcane Reflexes: 6</h2>

                <p>When a creature within 60 feet of you casts a spell, you can use your reaction to
                    gain one Arcanum Charge.</p>

                <h2>Charge Capacity Increase: 9</h2>

                <p>Your capacity for Arcanum Charges increases. The maximum number of charges you
                    can hold now equals your Intelligence modifier + your proficiency bonus.</p>

                <h2>Potent Cantrip Strike: 10</h2>

                <p>Whenever you hit a creature with a melee weapon, the target takes an extra 1d8
                    force damage.</p>

                <h2>Weave Strike: 11</h2>

                <p>You can unleash your stored energy in a devastating combination of steel and
                    sorcery.</p>

                <p><strong>Weave Strike.</strong> As a 2-action ability, you can spend 3 Arcanum
                    Charges and expend a Secondary Spell Slot to make one melee weapon attack and
                    cast a spell using that slot simultaneously. The spell manifests through the
                    strike, using its normal casting time, range, and effects.</p>

                <p>The spell's target or area of effect originates from the creature you hit with
                    the weapon attack. If the spell would normally require an attack roll, that roll
                    is replaced by the success of your weapon attack, if your weapon attack hits,
                    the spell hits. If the spell requires a saving throw, the targets have
                    disatvantage.</p>

                <p>You can use this feature once. You regain the ability to do so when you finish a
                    short or long rest.</p>

                <h2>Stance Mastery: 13</h2>

                <p>You can now change your stance as a reaction at the start of any player turn, not
                    just your own.</p>

                <h2>Versatile Fatigue Resistance II: 15</h2>

                <p>You gain the fatigue resistance option you did not choose at 5th level.</p>

                <h2>Weave Strike Mastery: 17</h2>

                <p>You can use Weave Strike twice between short or long rests. Additionally, when
                    you use Weave Strike, you can spend up to 3 additional Arcanum Charges (for a
                    total of 6) to apply one of the following enhancements:</p>

                <ul>
                    <li><strong>Empowered.</strong> Add the spent charges to one damage roll of the
                        spell.</li>
                    <li><strong>Overwhelming.</strong> The spell's saving throws are made with
                        disadvantage.</li>
                    <li><strong>Echoing.</strong> The spell affects an additional target within
                        range.</li>
                </ul>

                <h2>Arcane Synthesis: 18</h2>

                <p>Your blade has become a permanent extension of your magical being. You gain the
                    following benefits:</p>

                <ul>
                    <li>When you roll initiative, you gain 2 Arcanum Charges.</li>
                    <li>You can use Cantrip Strike without spending an Arcanum Charge once per
                        turn.</li>
                </ul>

                <h2>Arcane Order Capstone: 20</h2>

                <p>You gain the capstone feature for your Arcane Order.</p>
