                <h2>Hit Points: 1</h2>
                <p><strong>Class Health Number:</strong> 5</p>
                <p><strong>Hit Points at 1st Level:</strong> 10 + your fighting style health
                    bonus</p>
                <p><strong>Hit Points at Higher Levels:</strong> 5 + your fighting style health
                    bonus per bard level after 1st</p>

                <h2>Proficiencies: 1</h2>
                <ul>
                    <li><strong>Armor:</strong> Light armor</li>
                    <li><strong>Weapons:</strong> Simple weapons, hand crossbows, longswords,
                        rapiers, shortswords</li>
                    <li><strong>Tools:</strong> Three musical instruments of your choice</li>
                    <li><strong>Saving Throws:</strong> Dexterity, Charisma</li>
                    <li><strong>Skills:</strong> Choose any three</li>
                </ul>

                <h2>Physical and Mental Modifiers: 1</h2>
                <p>Some of your abilities will require your Mental or Physical Modifier.</p>
                <p>Your Physical Modifier is your Strength or Dexterity Modifier.</p>
                <p>Your Mental Modifier is your Intelligence, Wisdom, or Charisma Modifier.</p>

                <h2>Fighting Style: 1</h2>
                <p>You adopt a particular style of fighting as your specialty. Choose one of the
                    following options. Each Fighting style grants you a health bonus at level 1. You
                    must be wielding one of your fighting style's respective items to gain this
                    benefit.</p>
                <p>At level 7, your fighting style provides you with a Martial Feat. This feat does
                    not count against your Feats known, and it does not require a slot when you use
                    it. You must be wielding one of your fighting style's respective items to use
                    this feature.</p>
                <ul>
                    <li>Arcanist: You gain a +2 health bonus at each level.</li>
                    <li>Skirmisher: You gain a +2 health bonus at each level.</li>
                    <li>Dueling: You gain a +2 health bonus at each level.</li>
                    <li>Two-Weapon: You gain a +2 health bonus at each level.</li>
                    <li>Unarmed: You gain a +2 health bonus at each level.</li>
                    <li>War Mage: You gain a +3 health bonus at each level.</li>
                </ul>
                <p>The health bonus is added to your hit point maximum at 1st level and whenever you
                    gain a level in this class.</p>

                <h2>Verse Dice: 1</h2>
                <p>You have a pool of Verse Dice that represent moments of inspiration you have
                    gathered by witnessing the world around you. Your Verse Dice start as d6s, and
                    they improve as you gain levels in this class, as shown in the Bard Features
                    table.</p>
                <p><strong>Maximum Verse Dice.</strong> You can hold a maximum number of Verse Dice
                    equal to your proficiency bonus. Any Verse Dice gained beyond this maximum are
                    lost.</p>
                <p><strong>Gaining Verse Dice.</strong> You gain Verse Dice when you witness moments
                    of dramatic tension, discovery, or fortune. The DM has the final say on what
                    constitutes a witnessing event, but the following triggers always generate a
                    Verse Die:</p>
                <ul>
                    <li><strong>Critical Witness:</strong> You gain one Verse Die when you see a
                        creature within 60 feet of you score a critical success or failure on an
                        attack roll, saving throw, or ability check.</li>
                    <li><strong>Knowledge Unveiled:</strong> You gain one Verse Die when you see a
                        creature within 60 feet of you succeed on an Intelligence (History, Arcana,
                        Nature, or Religion) check with a DC of 15 or higher.</li>
                    <li><strong>Tertiary Magic:</strong> You gain one Verse Die when you see a
                        creature within 60 feet of you complete the casting of a spell using a
                        Tertiary Spell Slot.</li>
                    <li><strong>Despair:</strong> You gain one Verse Die when you see an allied
                        creature within 60 feet of you fall unconscious.</li>
                    <li><strong>DM's Discretion:</strong> The DM can award you a Verse Die at any
                        time for witnessing an act of particular bravery, cunning, folly, or
                        narrative significance. This is encouraged.</li>
                </ul>
                <p>You can gain no more than one Verse Die from a single triggering event, and you
                    cannot gain Verse Dice from your own actions or from observing yourself.</p>
                <p><strong>Using Verse Dice.</strong> As an action, you can inspire a creature
                    within 60 feet who can see or hear you. You give that creature one of your Verse
                    Dice. Once within the next 10 minutes, the creature can roll the die and add the
                    number rolled to one ability check, attack roll, or saving throw it makes. The
                    creature can wait until after it rolls the d20 before deciding to use the Verse
                    Die, but must decide before the DM says whether the roll succeeds or fails. A
                    creature can have only one Verse Die at a time.</p>
                <p><strong>Losing Verse Dice.</strong> Your Verse Dice are ephemeral moments of
                    inspiration. They fade when you finish a long rest, as the stories of the day
                    settle into memory and make room for new tales.</p>

                <h2>Spellcasting: 2</h2>
                <p>You have learned to weave music, words, and magic into a single art.</p>
                <p><strong>Cantrips</strong> You know two cantrips of your choice from the bard
                    spell list. You learn one additional bard cantrip of your choice at 4th, 8th,
                    12th, and 16th level</p>
                <p><strong>Spell Slots.</strong> The Bard Spellcasting table shows how many spell
                    slots you have to cast your bard spells. You regain all expended spell slots
                    when you finish a long rest. Casting a spell with a Primary Spell Slot requires
                    one action; casting a spell with a Secondary Slot requires two actions.</p>
                <p><strong>Spellcasting Economy.</strong> Casting a spell with a Primary Spell Slot
                    or Cantrip requires one action. Casting a spell with a Secondary Spell Slot
                    requires two actions.</p>
                <p><strong>Spells Known.</strong> You know two bard spells of your choice from the
                    bard spell list. The Spells Known column of the Bard Spellcasting table shows
                    when you learn more bard spells. Each of these spells must be of a level for
                    which you have spell slots.</p>
                <p>Whenever you gain a level in this class, you can replace one bard spell you know
                    with another spell of your choice from the bard spell list. The new spell must
                    be of a level for which you have spell slots.</p>
                <p><strong>Mental Modifier.</strong> Your Mental Modifier (Intelligence, Wisdom, or
                    Charisma, chosen at character creation) is your spellcasting ability for your
                    bard spells. The DC for your spell saving throws equals your Mental DC (8 + your
                    proficiency bonus + your Mental Modifier).</p>

                <h2>Song of Rest: 2</h2>
                <p>At 2nd level, you can use soothing music or oration to help revitalize your
                    wounded allies during a short rest. If you or any friendly creatures who can
                    hear your performance regain hit points at the end of the short rest by spending
                    healing resources (such as potions or class features), each of those creatures
                    gains an extra 1d6 hit points.</p>
                <p>The extra hit points increase when you reach certain levels in this class: to 1d8
                    at 9th level, to 1d10 at 13th level, and to 1d12 at 17th level.</p>

                <h2>Bard College: 3</h2>
                <p>At 3rd level, you choose a Bard College that shapes your artistic identity. Your
                    choice grants you features at 3rd level, and then again at 6th, 14th, and 20th
                    level.</p>

                <h2>Expertise: 3</h2>
                <p>At 3rd level, choose two of your skill proficiencies. Your proficiency bonus is
                    doubled for any ability check you make that uses either of the chosen
                    proficiencies.</p>
                <p>At 10th level, you can choose two more of your skill proficiencies to gain this
                    benefit.</p>

                <h2>Ability Score Improvement</h2>
                <p>At 4th, 8th, 12th, 16th, and 19th level, you can increase an ability score by
                    1</p>

                <h2>Versatile Fatigue Resistance: 5</h2>
                <p>When you reach 5th level in this class choose one of the following options.</p>
                <ul>
                    <li>When taking the attack action you do not suffer any penalties from the
                        fatigued condition.</li>
                    <li>When taking the magic action you do not suffer any penalties from the
                        fatigued condition.</li>
                </ul>

                <h2>Magical Inspiration: 5</h2>
                <p>At 5th level, when a creature adds one of your Verse Dice to a saving throw,
                    ability check, or attack roll, and that roll still fails, the creature gains
                    temporary hit points equal to your Mental Modifier + the number rolled on the
                    Verse Die.</p>

                <h2>Countercharm: 6</h2>
                <p>At 6th level, you gain the ability to use musical notes or words of power to
                    disrupt mind-influencing effects. As an action, you can start a performance that
                    lasts until the end of your next turn. During that time, you and any friendly
                    creatures within 30 feet of you have advantage on saving throws against being
                    frightened or charmed. A creature must be able to hear you to gain this benefit.
                    The performance ends early if you are incapacitated or silenced, or if you
                    voluntarily end it (no action required).</p>

                <h2>Verse Dice Improvement: 7</h2>
                <p>At 7th level, your Verse Dice become d8s. At 11th level, they become d10s. At
                    15th level, they become d12s.</p>

                <h2>Discord Aura: 9</h2>
                <p>At level 9 you radiate a discordant aura out to 30 feet. Enemies in this aura
                    roll a critical failure if they roll a 1, 2, or 3 on any D20 roll. If an enemy
                    rolls a critical failure on an attack roll, as a reaction you can choose a new
                    target for this attack who is automatically hit.</p>

                <h2>Magical Secrets: 10</h2>
                <p>At 10th level, you have plundered magical knowledge from a wide spectrum of
                    disciplines. Choose two spells from any classes, including this one. A spell you
                    choose must be of a level you can cast, as shown on the Bard table, or a
                    cantrip.</p>
                <p>The chosen spells count as bard spells for you and are included in the number in
                    the Spells Known column of the Bard Spellcasting table.</p>
                <p>You learn two additional spells from any classes at 14th level and again at 18th
                    level.</p>

                <h2>Reliable Talent: 13</h2>
                <p>At 11th level, you have refined your chosen skills until they approach
                    perfection. Whenever you make an ability check that lets you add your
                    proficiency bonus, if the roll doesn't have advantage or disadvantage, roll two
                    d20s and use whichever roll is closer to 11. If there is a tie (for example, 9
                    and 13), you take the higher roll.</p>

                <h2>Versatile Fatigue Resistance: 15</h2>
                <p>When you reach 15th level in this class you gain whichever fatigue resistance you
                    did not choose at level 5.</p>

                <h2>Puppet Master: 17</h2>
                <p>When you cast a spell that has reduced effectiveness in combat (such as granting
                    advantage on saving throws against it), you ignore that penalty.</p>

                <h2>Masterpiece</h2>
                <p>At 20th level, you gain the capstone feature for your subclass</p>
