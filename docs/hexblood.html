                <h2>Hit Points</h2>

                <p><strong>Class Health Number:</strong> 6</p>

                <p><strong>Hit Points at 1st Level:</strong> 12 + your fighting style health
                    bonus</p>

                <p><strong>Hit Points at Higher Levels:</strong> 6 + your fighting style health
                    bonus per Hexblood level after 1st</p>

                <h2>Proficiencies</h2>

                <ul>
                    <li><strong>Armor:</strong> Light armor, medium armor, shields</li>
                    <li><strong>Weapons:</strong> Simple weapons, martial weapons</li>
                    <li><strong>Tools:</strong> None</li>
                    <li><strong>Saving Throws:</strong> Strength, Intelligence</li>
                    <li><strong>Skills:</strong> Choose two from Acrobatics, Athletics, Insight,
                        Intimidation, Investigation, Medicine, Perception, and Survival</li>
                </ul>

                <h2>Physical and Mental Modifiers: 1</h2>

                <p>Some of your abilities will require your Mental or Physical Modifier.</p>

                <p>Your Physical Modifier is your Strength or Dexterity Modifier.</p>

                <p>Your Mental Modifier is your Intelligence, Wisdom, or Charisma Modifier.</p>

                <h2>Fighting Style: 1</h2>

                <p>You adopt a particular style of fighting as your specialty. Choose one of the
                    following options. Each Fighting style grants you a bonus at level 1, you must
                    be wielding one of your fighting style’s respective item to gain this benefit.
                    At level 7, your fighting style provides you with a Martial Feat, this feat does
                    not count against your Feats known, and it does not require a slot when you use
                    it. You must be wielding one of your fighting style’s respective item to use
                    this feature, but you can use this feat regardless of your class.</p>

                <ul>
                    <li>Dueling: You gain a +2 health bonus at each level.</li>
                    <li>Skirmisher: You gain a +2 health bonus at each level.</li>
                    <li>Unarmed: You gain a +2 health bonus at each level.</li>
                    <li>Two-Weapon: You gain a +2 health bonus at each level.</li>
                    <li>Brawler: You gain a +3 health bonus at each level.</li>
                    <li>Guardian: You gain a +3 health bonus at each level.</li>
                    <li>Great Weapon: You gain a +3 health bonus at each level.</li>
                </ul>

                <p>The health bonus is added to your hit point maximum at 1st level and whenever you
                    gain a level in this class.</p>

                <h2>Hemorrhage Dice: 1</h2>

                <p>You have a pool of d6 Hemorrhage Dice equal to your proficiency bonus. You regain
                    all expended dice when you finish a short or long rest.</p>

                <p><strong>Regeneration.</strong> When a friendly creature within 10 feet of you
                    takes damage, you regain one expended Hemorrhage Die. You can regain no more
                    than one die per round this way, and you cannot exceed your maximum.</p>

                <p>Your Hemorrhage Dice are used to fuel various class features. Some features
                    require a saving throw, which is called your Hexblood DC. It is calculated
                    as:</p>

                <p>8 + your proficiency bonus + your Wisdom or Intelligence modifier (chosen when
                    you gain this feature)</p>

                <h2>Brand with Blood: 1</h2>

                <p>You sacrifice your own vitality to place a curse on a foe. As an action, target
                    one creature you can see within 30 feet. You expend one Hemorrhage Die and roll
                    it. You take damage equal to the number rolled (this damage cannot be reduced in
                    any way). The target is afflicted with one of your Blood Curses for 1
                    minute.</p>

                <p>A creature can be afflicted by only one of your Blood Curses at a time. If you
                    apply another curse, the previous one ends. The curse ends early if the creature
                    is reduced to 0 hit points or if the curse is exploited.</p>

                <p><strong>Exploiting a Curse.</strong> Each curse has an exploitation trigger. When
                    that trigger occurs, roll a Hemorrhage Die without expending it. You regain hit
                    points equal to the number rolled, and a creature you choose within 30 feet of
                    you regains hit points equal to the number rolled + your Wisdom or Intelligence
                    modifier. The curse then ends.</p>

                <h2>Blood Curses: 1</h2>

                <p>You know all five Blood Curses. They cannot be unlearned—your blood remembers
                    every way it can be spilled.</p>

                <p><strong>Curse of the Fumbling Hand</strong></p>
                <p>You hamper the target's precision. While cursed, the target subtracts your
                    Hemorrhage Die from any ability check it makes (roll the die when the check is
                    made).</p>
                <p>Exploitation Trigger: The target fails an ability check.</p>
                <p>Exploitation Effect: As described in Brand with Blood.</p>

                <p><strong>Curse of the Wavering Blade</strong></p>
                <p>You disrupt the target's attacks. While cursed, the target subtracts your
                    Hemorrhage Die from any attack roll it makes (roll the die when the attack is
                    made).</p>
                <p>Exploitation Trigger: The target misses an attack roll by more than its
                    proficiency bonus. (If it misses by less than its proficiency bonus, the curse
                    ends with no effect—no healing for anyone.)</p>
                <p>Exploitation Effect: As described in Brand with Blood.</p>

                <p><strong>Curse of the Trembling Body</strong></p>
                <p>You weaken the target's physical resistance. While cursed, the target subtracts
                    your Hemorrhage Die from any Strength or Dexterity saving throw it makes (roll
                    the die when the save is made).</p>
                <p>Exploitation Trigger: The target fails a Strength or Dexterity saving throw.</p>
                <p>Exploitation Effect: As described in Brand with Blood.</p>

                <p><strong>Curse of the Silenced Voice</strong></p>
                <p>You interfere with the target's magical capabilities. While cursed, when the
                    target attempts to cast a spell, roll your Hemorrhage Die. If the roll is higher
                    than the target's proficiency bonus, the spell fails and has no effect.</p>
                <p>Exploitation Trigger: The spell fails due to this curse.</p>
                <p>Exploitation Effect: As described in Brand with Blood.</p>

                <p><strong>Curse of the Heavy Foot</strong></p>
                <p>You weigh down the target's movement. While cursed, the target's movement is
                    hindered.</p>
                <p>Exploitation Trigger: The target moves more than 15 feet during its turn.</p>
                <p>Exploitation Effect: As described in Brand with Blood.</p>

                <h2>Blood Sense: 1</h2>

                <p>You have an innate awareness of the life force of wounded creatures. As an
                    action, you can sense the location of any creatures that are not at their
                    maximum hit points within 30 feet of you. You know their general direction but
                    not their exact location. This awareness lasts for 1 minute, and you can use it
                    a number of times equal to your proficiency bonus per long rest.</p>

                <h2>Blood Mending: 2</h2>

                <p>You can use your Hemorrhage Dice to heal yourself. As an action, you can expend
                    one Hemorrhage Die and roll it. You regain hit points equal to the roll + your
                    Wisdom or Intelligence modifier (chosen when you gained Hemorrhage Dice). You
                    cannot use this feature on allies.</p>

                <h2>Martial Feats: 2</h2>

                <p>You have trained in special techniques that give you an edge in combat and
                    beyond. You gain access to martial feats, as described in the Martial Feats
                    section. You may only use one Feat Slot per turn.</p>

                <p><strong>Primary Slots.</strong> You have 2 Primary Slots, which you expend to
                    activate your feats. You regain all expended slots when you finish a short rest.
                    Your number of Primary Slots increases as you gain levels, as shown in the Feats
                    Progression table.</p>

                <p><strong>Feats Known.</strong> You know 2 martial feats of your choice from your
                    feat list. The Feats Known column of the Feats Progression table shows when you
                    learn more feats. Additionally, when you gain a level in this class, you can
                    replace one feat you know with another feat of your choice from your class feat
                    list.</p>

                <p><strong>Feat Tier.</strong> You can learn feats of Tier 1 at level 2. At higher
                    levels you gain access to higher tiers, as shown in the table.</p>

                <h2>Ability Score Improvement</h2>
                <p>At 4th, 8th, 12th, 16th, and 19th level, you can increase one ability score of
                    your choice by 1. You can't increase an ability score above 5 using this
                    feature.</p>

                <h2>Martial Fatigue Resistance: 5</h2>
                <p>When taking the attack action you do not suffer any penalties from the fatigued
                    condition.</p>

                <h2>Heightened Curses I: 5</h2>

                <p>Your curses grow more potent. The first time each round that a creature fails a
                    save or check against one of your curses, you regain one expended Hemorrhage
                    Die.</p>

                <p>Additionally, Curse of the Wavering Blade now triggers exploitation if the target
                    misses by any amount (no proficiency bonus comparison).</p>

                <h2>Blood Bond: 7</h2>

                <p>Your curses strengthen. The Hemorrhage Die used for your curses increases to
                    d8.</p>

                <h2>Heightened Curses II: 9</h2>

                <p>Whenever exploitation occurs, the target takes damage equal to the roll on your
                    Hemorrhage Die or dice.</p>

                <h2>Shared Vitality: 11</h2>

                <p>Your blood connection to allies deepens. When you use Blood Mending on yourself,
                    you can also heal one ally within 30 feet for half the amount (rounded up).</p>

                <p>Additionally, whenever you roll your Hemorrhage Die, you may spend an additional
                    die to roll another Hemorrhage Die and add it to the roll.</p>

                <h2>Heightened Curses III: 13</h2>

                <p>Your curses become severe. When you apply a curse, you can choose to expend two
                    Hemorrhage Dice instead of one. If you do, the target has disadvantage on the
                    first check, attack, or save affected by the curse.</p>

                <h2>Blood Ward: 15</h2>

                <p>When you or a bonded ally within 30 feet takes damage, you can expend one
                    Hemorrhage Die. Roll the die and reduce the damage by the result + your Hexblood
                    level.</p>

                <h2>Heightened Curses IV: 17</h2>

                <p>Your curses approach their final form. The Hemorrhage Die used for your curses
                    increases to d10.</p>
