                <h2>Hit Points</h2>

                <p><strong>Class Health Number:</strong> 6</p>

                <p><strong>Hit Points at 1st Level:</strong> 12 + your fighting style health
                    bonus</p>

                <p><strong>Hit Points at Higher Levels:</strong> 6 + your fighting style health
                    bonus per Hexblood level after 1st</p>

                <h2>Proficiencies</h2>

                <ul>
                    <li><strong>Armor:</strong> Light armor, medium armor, shields</li>
                    <li><strong>Weapons:</strong> Simple weapons, martial weapons</li>
                    <li><strong>Tools:</strong> None</li>
                    <li><strong>Saving Throws:</strong> Strength, Intelligence</li>
                    <li><strong>Skills:</strong> Choose two from Acrobatics, Athletics, Insight,
                        Intimidation, Investigation, Medicine, Perception, and Survival</li>
                </ul>

                <h2>Physical and Mental Modifiers: 1</h2>

                <p>Some of your abilities will require your Mental or Physical Modifier.</p>

                <p>Your Physical Modifier is your Strength or Dexterity Modifier.</p>

                <p>Your Mental Modifier is your Intelligence, Wisdom, or Charisma Modifier.</p>

                <h2>Fighting Style: 1</h2>

                <p>You adopt a particular style of fighting as your specialty. Choose one of the
                    following options. Each Fighting style grants you a bonus at level 1, you must
                    be wielding one of your fighting style’s respective item to gain this benefit.
                    At level 7, your fighting style provides you with a Martial Feat, this feat does
                    not count against your Feats known, and it does not require a slot when you use
                    it. You must be wielding one of your fighting style’s respective item to use
                    this feature, but you can use this feat regardless of your class.</p>

                <ul>
                    <li>Dueling: You gain a +2 health bonus at each level.</li>
                    <li>Skirmisher: You gain a +2 health bonus at each level.</li>
                    <li>Unarmed: You gain a +2 health bonus at each level.</li>
                    <li>Two-Weapon: You gain a +2 health bonus at each level.</li>
                    <li>Brawler: You gain a +3 health bonus at each level.</li>
                    <li>Guardian: You gain a +3 health bonus at each level.</li>
                    <li>Great Weapon: You gain a +3 health bonus at each level.</li>
                </ul>

                <p>The health bonus is added to your hit point maximum at 1st level and whenever you
                    gain a level in this class.</p>

                <h2>Hemo Dice: 1</h2>

                <p>You possess a pool of Hemo Dice, representing the vital power you sacrifice to fuel your
                    curses. You have a number of Hemo Dice equal to your proficiency bonus + your Mental
                    Modifier (minimum 3). All expended Hemo Dice are regained when you finish a short or long
                    rest.

                    Your Hemo Die is a d6. This die changes as you gain hexblood levels, becoming a d8 at 9th
                    level and a d10 at 17th level.</p>

                <h2>Pact of Doom: 1</h2>

                <p>As an action, choose a creature you can see within 30 feet. Expend one Hemo Die and roll it.
                    You take damage equal to the number rolled (this damage cannot be reduced or prevented in
                    any way), and the target is Doomed for 10 minutes.</p>

                <p>The next time a creature deals damage to the Doomed target, one Hemo Die is added to the damage
                    roll (the attacker rolls an additional Hemo Die and adds it to the damage). The attacker and
                    you each regain hit points equal to the extra damage dealt. If the damage was dealt by you, you
                    regain hit points only once. The Doom then ends on that target.</p>



                <h2>Bloodhound</h2>

                The scent of spilled blood sharpens your senses. You have advantage on Wisdom (Perception) and Wisdom
                (Survival) checks made to track a creature that is below its hit point maximum.


                <h2>Martial Feats: 2</h2>

                <p>You have trained in special techniques that give you an edge in combat and
                    beyond. You gain access to martial feats, as described in the Martial Feats
                    section. You may only use one Feat Slot per turn.</p>

                <p><strong>Primary Slots.</strong> You have 2 Primary Slots, which you expend to
                    activate your feats. You regain all expended slots when you finish a short rest.
                    Your number of Primary Slots increases as you gain levels, as shown in the Feats
                    Progression table.</p>

                <p><strong>Feats Known.</strong> You know 2 martial feats of your choice from your
                    feat list. The Feats Known column of the Feats Progression table shows when you
                    learn more feats. Additionally, when you gain a level in this class, you can
                    replace one feat you know with another feat of your choice from your class feat
                    list.</p>

                <p><strong>Feat Tier.</strong> You can learn feats of Tier 1 at level 2. At higher
                    levels you gain access to higher tiers, as shown in the table.</p>

                <h2>Monstrous Adaptation</h2>
                <p>You choose a <a href="sc_hexblood.html">Monstrous Adaptation</a> that defines how you channel your vitality. Your choice grants you features at
                    3rd, 7th, 14th, and 20th level. The available paths are: The Lycan, The Vampire, The Mummy, and The
                    Spectre</p>

                <h2>Ability Score Improvement</h2>
                <p>At 4th, 8th, 12th, 16th, and 19th level, you can increase one ability score of
                    your choice by 1. You can't increase an ability score above 5 using this
                    feature.</p>
                <h2>Pain Bank: 4</h2>
                As an action, you can spend one Feat Slot to enter a Pain Bank. Determine your Fury magnitude based on
                your current hit points:

                <ul>
                    <li>1 if you are at or below three‑quarters of your hit point maximum.

                    <li></li>2 if you are at or below half your hit point maximum.</li>

                    <li></li>3 if you are at or below one‑quarter of your hit point maximum.</li>

                    When you enter the surge, you gain temporary hit points equal to the total rolled on a number of
                    Hemo Dice equal to your Fury magnitude + your Charisma modifier (minimum 1 die).
                </ul>

                <ul>
                    <li>While you have these temporary hit points, the following effects apply:

                    <li>Bleeding Shield. At the start of each of your turns, you lose temporary hit points equal to one
                        roll of your Hemo Die. This loss cannot be reduced or prevented. If this reduces your
                        temporary hit points to 0, the Pain Bank ends immediately.</li>

                    <li>Sanguine Strikes. Once per turn when you hit a creature with a melee attack, you deal extra
                        necrotic damage equal to one roll of your Hemo Die. You regain hit points equal to the
                        necrotic damage dealt. This healing cannot exceed your hit point maximum.</li>
                </ul>

                The Pain Bank ends early if you are incapacitated or if you choose to end it (no action required).

                <h2>Martial Fatigue Resistance: 5</h2>
                <p>When taking the attack action you do not suffer any penalties from the fatigued
                    condition.</p>

                <h2>Shadowfell Magicks: 6</h2>
                <p>If you consume a drop of a creature’s blood, you forge a temporary supernatural bond. The creature
                    makes a Physical DC Charisma save. If they fail, then for 1 hour, you know the cardinal direction to
                    that creature, and you know when it is lying to you. After the hour ends, that creature becomes
                    immune to this effect until you finish a long rest.</p>

                <h2>Crimson Chain: 6</h2>
                <p>Once per turn, when an allied creature you can see within 10 feet of you takes damage, you can regain
                    one expended Hemo Die.</p>


                <h2>Hand of Doom: 7  </h2>
                    <p>A creature effected by Pact of Doom takes 1d4 Necrotic damage when they take the attack action against a creature that is not you.</p>
              

                <p>Once per turn, when you hit a creature with a melee weapon attack, you can apply your Pact of Doom to
                    that target as part of the same attack (no additional action required). You still expend a
                    Hemo Die and take the damage as normal.</p>
                <h2>Deepend Bond: 9</h2>
                <p>Your Hemo Die becomes a d8. In addition, when you roll a Hemo Die for self‑damage from
                    your class features, you can roll it twice and take the lower or higher result.</p>
                <h2>Comfortably Numb: 10</h2>

                <p>When you start your turn with temporary hit points from your Pain Bank, you can choose to gain
                    resistance to all damage except psychic and radiant until the start of your next turn. If you do,
                    the Bleeding Shield loss at the start of your turn is doubled (roll two Hemo Dice and lose
                    that many temporary hit points). You can use this feature a number of times equal to your Charisma
                    modifier (minimum once), and you regain all expended uses when you finish a long rest.</p>


                <h2>Shared Vitality: 11</h2>

                <p>Additionally, whenever you roll your Hemo Die, you may spend an additional
                    die to roll another Hemo Die and add it to the roll.</p>

                <h2>Double the Pain: 13</h2>

                <p>When you use Pact of Doom, you can expend two Hemo Dice instead of one. If you do, you take
                    necrotic damage equal to the sum of both dice, and the bonus damage added to the next attack against
                    the Doomed creature equals the sum of both dice. Both the attacker and you regain hit points equal
                    to this total.</p>

                <h2>Font of Vitality: 15</h2>

                <p>When you enter your Pain Bank all creatures of your choice within 30 feet of you regain hit points
                    equal to one roll of your Hemo Die.</p>

                <h2>Deepend Bond II: 17</h2>

                <p>Your Hemo Die becomes a d10.</p>

                <h2>Die Another Day: 18</h2>

                <p>As a reaction when an allied creature is reduced to 0 hitpoints, you can flood their body with
                    necromantic energy and revive them.

                    The target immediately regains 1 hit point, then gains the following benefits as if they had entered
                    a Pain Bank using your Hemo Dice and Charisma modifier:

                    Bleeding Shield. They gain temporary hit points equal to the total rolled on a number of your
                    Hemo Dice equal to your Mental Modifier (minimum 1). At the start of each of their turns,
                    they lose temporary hit points equal to one roll of your Hemo Die. This loss cannot be reduced
                    or prevented. If this reduces their temporary hit points to 0, the effect ends immediately.

                    Sanguine Strikes. Once per turn when they hit a creature with a melee attack, they deal extra
                    necrotic damage equal to one roll of your Hemo Die. They regain hit points equal to the
                    necrotic damage dealt. This healing cannot exceed their hit point maximum.

                    The effect also ends early if they are incapacitated.

                    Once you use this feature, you must finish a long rest before you can use it again.</p>
