                                <h2>Physical and Mental Modifiers</h2>
                <p>Some of your abilities will require your <strong>Mental Modifier</strong> or <strong>Physical
                        Modifier</strong>.</p>
                <p>Your <strong>Physical Modifier</strong> is your Strength or Dexterity modifier.</p>
                <p>Your <strong>Mental Modifier</strong> is your Intelligence, Wisdom, or Charisma modifier.</p>

               <h2>Fighting Style: 1</h2>
                <p><em>Your combat training defines your approach to battle.</em> You adopt a particular style of
                    fighting as your specialty. Choose one of the following options. Each fighting style grants you a
                    bonus at level 1; you must be wielding one of your fighting style's respective items to gain this
                    benefit. At level 7, your fighting style provides you with a <strong>Martial Feat</strong>. This
                    feat does not count against your Feats Prepared, and it does not require a <strong>Feat
                        Slot</strong> when you use it. You must be wielding one of your fighting style's respective
                    items to use this feature, but you can use this feat regardless of your class.</p>
                <ul>
                    <li>Dueling: You gain a +2 health bonus at each level.</li>
                    <li>Skirmisher: You gain a +2 health bonus at each level.</li>
                    <li>Unarmed: You gain a +2 health bonus at each level.</li>
                    <li>Two-Weapon: You gain a +2 health bonus at each level.</li>
                    <li>Brawler: You gain a +3 health bonus at each level.</li>
                    <li>Guardian: You gain a +3 health bonus at each level.</li>
                    <li>Great Weapon: You gain a +3 health bonus at each level.</li>
                </ul>
                <p>The health bonus is added to your hit point maximum at 1st level and whenever you gain a level in
                    this class.</p>

                <h2>Hit Points</h2>
                <p><strong>Hit Points at 1st Level:</strong> 12 + your fighting style health bonus</p>
                <p><strong>Hit Points at Higher Levels:</strong> 6 + your fighting style health bonus per Hexblood level
                    after 1st</p>

                <h2>Proficiencies</h2>
                <p><strong>Armor:</strong> Light armor, medium armor, shields</p>
                <p><strong>Weapons:</strong> Simple weapons, martial weapons</p>
                <p><strong>Tools:</strong> None</p>
                <p><strong>Saving Throws:</strong> Strength, Intelligence</p>
                <p><strong>Skills:</strong> Choose two from Acrobatics, Athletics, Insight, Intimidation, Investigation,
                    Medicine, Perception, and Survival</p>



 

                <h2>Hemo Dice: 1</h2>
                <p><em>Your cursed blood is both weapon and shield.</em> You possess a pool of <strong>Hemo
                        Dice</strong>, representing the vital power you sacrifice to fuel your curses. You have a number
                    of <strong>Hemo Dice</strong> equal to your <strong>Proficiency Bonus</strong> + your <strong>Mental
                        Modifier</strong> (minimum 3). All expended <strong>Hemo Dice</strong> are regained when you
                    finish a short or long rest.</p>
                <p>Your <strong>Hemo Die</strong> is a d6. This die changes as you gain hexblood levels, becoming a d8
                    at 9th level and a d10 at 17th level.</p>

                <h2>Pact of Doom: 1</h2>
                <p><em>You mark a foe for suffering, paying in your own blood.</em> As an <strong>action</strong>,
                    choose a creature you can see within 30 feet. Expend one <strong>Hemo Die</strong> and roll it. You
                    take damage equal to the number rolled (this damage cannot be reduced or prevented in any way), and
                    the target is Doomed for 10 minutes.</p>
                <p>The next time a creature deals damage to the Doomed target, one <strong>Hemo Die</strong> is added to
                    the damage roll (the attacker rolls an additional <strong>Hemo Die</strong> and adds it to the
                    damage). The attacker and you each regain hit points equal to the extra damage dealt. If the damage
                    was dealt by you, you regain hit points only once. The Doom then ends on that target.</p>

                <h2>Bloodhound: 2</h2>
                <p><em>The scent of spilled blood sharpens your senses.</em> You have advantage on Wisdom (Perception)
                    and Wisdom (Survival) checks made to track a creature that is below its hit point maximum.</p>

               <h2>Martial Feats: 2</h2>
                <p>You have trained in special techniques that give you an edge in combat and beyond. You gain access to
                    martial feats, as described in the <strong>Martial Feats</strong> section. You may only use one
                    <strong>Feat Slot</strong> per turn.</p>
                <p><strong>Feat Slots.</strong> You have 2 <strong>Feat Slots</strong>, which you expend to
                    activate your feats. You regain all expended slots when you finish a short rest. Your number of
                    <strong>Feat Slots</strong> increases as you gain levels, as shown in the Feats Progression
                    table.</p>
                <p><strong>Feats Prepared.</strong> You prepare 2 martial feats of your choice from your feat list. The
                    Feats Prepared column of the Feats Progression table shows when you learn more feats. Additionally,
                    when you gain a level in this class, you can replace one feat you have prepared with another feat of
                    your choice from your class feat list.</p>
                <p><strong>Feat Tier.</strong> You can learn feats of Tier 1 at level 2. At higher levels you gain
                    access to higher tiers, as shown in the table.</p>

                <h2>Monstrous Adaptation: 3</h2>
                <p><em> You choose a <a
                        href="sc_hexblood.html">Monstrous Adaptation</a> that defines how you channel your vitality.</em>
                    Your choice grants you features at 3rd, 7th, 14th, and 20th level.</p>

                <h2>Ability Score Improvement</h2>
                <p>At 4th, 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 1. You
                    can't increase an ability score above 5 using this feature.</p>

                <h2>Pain Bank: 4</h2>
                <p><em>You convert your agony into supernatural resilience.</em> As an <strong>action</strong>, you can
                    spend one <strong>Feat Slot</strong> to enter a Pain Bank. Determine your Fury magnitude based on
                    your current hit points:</p>
                <ul>
                    <li><strong>Fury 1:</strong> You are at or below three-quarters of your hit point maximum.</li>
                    <li><strong>Fury 2:</strong> You are at or below half your hit point maximum.</li>
                    <li><strong>Fury 3:</strong> You are at or below one-quarter of your hit point maximum.</li>
                </ul>
                <p>When you enter the surge, you gain <strong>temporary hit points</strong> equal to the total rolled on
                    a number of <strong>Hemo Dice</strong> equal to your Fury magnitude + your <strong>Mental
                        Modifier</strong> (minimum 1 die).</p>
                <p>While you have these temporary hit points, the following effects apply:</p>
                <ul>
                    <li><strong>Bleeding Shield.</strong> At the start of each of your turns, you lose temporary hit
                        points equal to one roll of your <strong>Hemo Die</strong>. This loss cannot be reduced or
                        prevented. If this reduces your temporary hit points to 0, the Pain Bank ends immediately.</li>
                    <li><strong>Sanguine Strikes.</strong> Once per turn when you hit a creature with a melee attack,
                        you deal extra <strong>necrotic</strong> damage equal to one roll of your <strong>Hemo
                            Die</strong>. You regain hit points equal to the necrotic damage dealt. This healing cannot
                        exceed your hit point maximum.</li>
                </ul>
                <p>The Pain Bank ends early if you are incapacitated or if you choose to end it (no action required).
                </p>

                <h2>Martial Fatigue Resistance: 5</h2>
                <p>Taking the <strong>Attack action</strong> does not inflict you with the <strong>fatigued</strong>
                    condition.</p>

                <h2>Shadowfell Magicks: 6</h2>
                <p>If you consume a drop of a creature's blood, you forge a temporary supernatural bond. The creature
                    makes a <strong>Physical DC</strong> Charisma saving throw. On a failure, for 1 hour you know the
                    cardinal direction to that creature, and you know when it is lying to you. After the hour ends, that
                    creature becomes immune to this effect until you finish a long rest.</p>

                <h2>Crimson Chain: 6</h2>
                <p>Once per turn, when an allied creature you can see within 10 feet of you takes damage, you can regain
                    one expended <strong>Hemo Die</strong>.</p>

                <h2>Hand of Doom: 7</h2>
                <p>A creature affected by <strong>Pact of Doom</strong> takes 1d4 <strong>necrotic</strong> damage when
                    they take the <strong>Attack action</strong> against a creature that is not you.</p>
                <p>Once per turn, when you hit a creature with a melee weapon attack, you can apply your <strong>Pact of
                        Doom</strong> to that target as part of the same attack (no additional action required). You
                    still expend a <strong>Hemo Die</strong> and take the damage as normal.</p>

                <h2>Deepened Bond: 9</h2>
                <p>Your <strong>Hemo Die</strong> becomes a d8. In addition, when you roll a <strong>Hemo Die</strong>
                    for self-damage from your class features, you can roll it twice and take the lower or higher result.
                </p>

                <h2>Comfortably Numb: 10</h2>
                <p>When you start your turn with temporary hit points from your Pain Bank, you can choose to gain
                    resistance to all damage except psychic and radiant until the start of your next turn. If you do,
                    the Bleeding Shield loss at the start of your turn is doubled (roll two <strong>Hemo Dice</strong>
                    and lose that many temporary hit points). You can use this feature a number of times equal to your
                    <strong>Mental Modifier</strong> (minimum once), and you regain all expended uses when you finish a
                    long rest.</p>

                <h2>Shared Vitality: 11</h2>
                <p>Whenever you roll your <strong>Hemo Die</strong>, you may spend an additional <strong>Hemo
                        Die</strong> to roll another <strong>Hemo Die</strong> and add it to the roll.</p>

                <h2>Double the Pain: 13</h2>
                <p>When you use <strong>Pact of Doom</strong>, you can expend two <strong>Hemo Dice</strong> instead of
                    one. If you do, you take <strong>necrotic</strong> damage equal to the sum of both dice, and the
                    bonus damage added to the next attack against the Doomed creature equals the sum of both dice. Both
                    the attacker and you regain hit points equal to this total.</p>

                <h2>Font of Vitality: 15</h2>
                <p>When you enter your Pain Bank, all creatures of your choice within 30 feet of you regain hit points
                    equal to one roll of your <strong>Hemo Die</strong>.</p>

                <h2>Deepened Bond II: 17</h2>
                <p>Your <strong>Hemo Die</strong> becomes a d10.</p>

                <h2>Die Another Day: 18</h2>
                <p><em>You flood a dying ally with necromantic energy, snatching them from death's door.</em> As a
                    <strong>reaction</strong> when an allied creature is reduced to 0 hit points, you can revive them.
                    The target immediately regains 1 hit point, then gains the following benefits as if they had entered
                    a Pain Bank using your <strong>Hemo Dice</strong> and <strong>Mental Modifier</strong>:</p>
                <ul>
                    <li><strong>Bleeding Shield.</strong> They gain temporary hit points equal to the total rolled on a
                        number of your <strong>Hemo Dice</strong> equal to your <strong>Mental Modifier</strong>
                        (minimum 1). At the start of each of their turns, they lose temporary hit points equal to one
                        roll of your <strong>Hemo Die</strong>. This loss cannot be reduced or prevented. If this
                        reduces their temporary hit points to 0, the effect ends immediately.</li>
                    <li><strong>Sanguine Strikes.</strong> Once per turn when they hit a creature with a melee attack,
                        they deal extra <strong>necrotic</strong> damage equal to one roll of your <strong>Hemo
                            Die</strong>. They regain hit points equal to the necrotic damage dealt. This healing cannot
                        exceed their hit point maximum.</li>
                </ul>
                <p>The effect also ends early if they are incapacitated. Once you use this feature, you must finish a
                    long rest before you can use it again.</p>
