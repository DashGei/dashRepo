                <h2>Hit Points</h2>
                <p><strong>Class Health Number:</strong> 4</p>
                <p><strong>Hit Points at 1st Level:</strong> 8 + your fighting style health bonus</p>
                <p><strong>Hit Points at Higher Levels:</strong> 4 + your fighting style health bonus per wizard level after 1st</p>
                
                <h2>Proficiencies</h2>
                <ul>
                    <li><strong>Armor:</strong> None</li>
                    <li><strong>Weapons:</strong> Daggers, quarterstaffs</li>
                    <li><strong>Tools:</strong> None</li>
                    <li><strong>Saving Throws:</strong> Intelligence, Wisdom</li>
                    <li><strong>Skills:</strong> Choose two from Arcana, History, Insight, Investigation, Medicine, and Religion</li>
                </ul>
                
                <h2>Physical and Mental Modifiers</h2>
                <p>Some of your abilities will require your Mental or Physical Modifier.</p>
                <p>Your Physical Modifier is your Dexterity Modifier.</p>
                <p>Your Mental Modifier is your Intelligence Modifier.</p>
                
                <h2>Fighting Style</h2>
                <p>You adopt a particular style of connection to nature as your specialty. Choose one of the following options. Each Fighting style grants you a health bonus at level 1.</p>
                <p>At level 7, your fighting style provides you with additional benefits as noted in the Fighting Styles section.</p>
                
                <ul>
                    <li>Arcanist: You gain a +2 health bonus at each level.</li>
                    <li>War Mage: You gain a +3 health bonus at each level.</li>
                </ul>
                
                <p>The health bonus is added to your hit point maximum at 1st level and whenever you gain a level in this class.</p>
                
                <h2>Spellcasting: 1</h2>
                
                <p><strong>Cantrips.</strong> At 1st level, you know three cantrips of your choice from the wizard spell list. You learn one additional wizard cantrip of your choice at levels 4, 8, 12, and 16.</p>
                
                <p><strong>Spellbook.</strong> At 1st level, you have a spellbook containing six 1st-level wizard spells of your choice. Your spellbook is the repository of the wizard spells you know, except your cantrips, which are fixed in your mind.</p>
                
                <p><strong>Preparing and Casting Spells.</strong> The Wizard Spellcasting table shows how many spell slots you have to cast your wizard spells. To cast one of your wizard spells, you must expend a slot of the spell's level or higher. You regain all expended spell slots when you finish a long rest.</p>
                
                <p>You prepare the list of wizard spells that are available for you to cast. To do so, choose a number of wizard spells from your spellbook equal to your Intelligence modifier + your wizard level (minimum of one spell). The spells must be of a level for which you have spell slots.</p>
                
                <p><strong>Spellcasting Economy.</strong> Casting a spell with a Primary Spell Slot or Cantrip requires one action. Casting a spell with a Secondary Spell Slot requires two actions.</p>
                
                <p><strong>Learning Spells of 1st Level and Higher.</strong> Each time you gain a wizard level, you can add two wizard spells of your choice to your spellbook. Each of these spells must be of a level for which you have spell slots, as shown on the Wizard table. On your adventures, you might find other spells that you can add to your spellbook.</p>
                
                <p><strong>Spellcasting Ability.</strong> Intelligence is your spellcasting ability for your wizard spells. The DC for your spell saving throws equals your Mental DC (8 + your proficiency bonus + your Intelligence modifier).</p>
                
                <p><strong>Ritual Casting.</strong> You can cast a wizard spell as a ritual if that spell has the ritual tag and you have the spell in your spellbook. You don't need to have the spell prepared.</p>
                
                <p><strong>Spellcasting Focus.</strong> You can use an arcane focus as a spellcasting focus for your wizard spells.</p>

                <h2>Arcane Recovery: 2</h2>
                <p>You have learned to regain some of your magical energy by studying your spellbook. You have a number of Arcane Charges equal to your proficiency bonus. You regain all expended charges when you finish a long rest.</p>
                
                <p>You can expend these charges to cast spells without using spell slots, reflecting your ability to recover and refocus your magic.</p>
                
                <p><strong>Primary Slot Recovery.</strong> You can expend 1 Arcane Charge to cast a spell using a Primary Spell Slot without expending the slot.</p>
                
                <p><strong>Secondary Slot Recovery.</strong> You can expend 2 Arcane Charges to cast a spell using a Secondary Spell Slot without expending the slot.</p>
                
                <p>You can use this feature multiple times, expending charges as available.</p>
                
                <h2>Scholarly Insight: 2</h2>
                <p>Beginning at 2nd level, your extensive study has sharpened your mind. You gain the following benefits:</p>
                
                <ul>
                    <li>You have advantage on Intelligence checks made to recall information about arcane, historical, or magical topics.</li>
                    <li>You can read and write in three additional languages of your choice.</li>
                </ul>
                
                <h2>Arcane Tradition: 3</h2>
                <p>At 3rd level, you choose an Arcane Tradition that shapes your magical practice. Your choice grants you features at 3rd level, and then again at 6th, 10th, 14th, and 20th level.</p>
                
                <h2>Tertiary Slots: 3</h2>
                <p>Beginning at 3rd level, you gain access to tertiary spell slots. To cast your most powerful spells, those which require a tertiary slot, you must spend an action on your turn to charge the spell. At the start of your next turn, you may spend two actions to cast the spell and expend the spell slot. Any time you take damage until you cast the spell, you must make a concentration check. You may hold the spell for a number of turns equal to your Intelligence modifier, and each turn you hold the spell, you upcast it by one level.</p>
                
                <h2>Ability Score Improvement</h2>
                <p>At 4th, 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 2, or you can increase two ability scores of your choice by 1. You can't increase an ability score above 20 using this feature.</p>
                
                <h2>Magic Fatigue Resistance: 5</h2>
                <p>At 5th level, when you take the Magic action, you ignore the penalty for sequential spells.</p>
                
                <h2>Cantrip Formulas: 5</h2>
                <p>At 5th level, you have scribed a set of arcane formulas in your spellbook that you can use to formulate a cantrip in your mind. Whenever you finish a long rest and consult those formulas in your spellbook, you can replace one wizard cantrip you know with another cantrip from the wizard spell list.</p>
                
                <h2>Spell Mastery: 17</h2>
                <p>At 17th level, you have achieved such mastery over certain spells that you can cast them at will. Choose a 1st-level wizard spell and a 2nd-level wizard spell that are in your spellbook. You can cast those spells at their lowest level without expending a spell slot. If you want to cast either spell at a higher level, you must expend a spell slot as normal.</p>
                
                <p>By spending 8 hours of study, you can exchange one or both of the spells you chose for different spells of the same levels.</p>
                
                <h2>Signature Spells: 18</h2>
                <p>At 18th level, you have mastered two powerful spells and can cast them with little effort. Choose two 3rd-level wizard spells in your spellbook as your signature spells. You always have these spells prepared, and you can cast each of them once at 3rd level without expending a spell slot. When you do so, you cannot do so again until you finish a short or long rest.</p>
                
                <p>If you want to cast either spell at a higher level, you must expend a spell slot as normal.</p>
