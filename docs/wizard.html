                <h2>Physical and Mental Modifiers</h2>
                <p>Some of your abilities will require your <strong>Mental Modifier</strong> or <strong>Physical
                        Modifier</strong>.</p>
                <p>Your <strong>Physical Modifier</strong> is your Dexterity modifier.</p>
                <p>Your <strong>Mental Modifier</strong> is your Intelligence modifier.</p>

                <h2>Fighting Style: 1</h2>
                <p><em>Your arcane training defines your approach to battle.</em> You adopt a particular style of arcane
                    practice as your specialty. Choose one of the following options. Each fighting style grants you a
                    health bonus at level 1. At level 7, your fighting style provides you with additional benefits as
                    noted in the Fighting Styles section.</p>
                <ul>
                    <li><strong>Arcanist:</strong> You gain a +2 health bonus at each level.</li>
                    <li><strong>War Mage:</strong> You gain a +3 health bonus at each level.</li>
                </ul>
                <p>The health bonus is added to your hit point maximum at 1st level and whenever you gain a level in
                    this class.</p>

                <h2>Hit Points</h2>
                <p><strong>Hit Points at 1st Level:</strong> 8 + your fighting style health bonus</p>
                <p><strong>Hit Points at Higher Levels:</strong> 4 + your fighting style health bonus per wizard level
                    after 1st</p>

                <h2>Proficiencies</h2>
                <p><strong>Armor:</strong> None</p>
                <p><strong>Weapons:</strong> Daggers, quarterstaffs</p>
                <p><strong>Tools:</strong> None</p>
                <p><strong>Saving Throws:</strong> Intelligence, Wisdom</p>
                <p><strong>Skills:</strong> Choose two from Arcana, History, Insight, Investigation, Medicine, and
                    Religion</p>



                <h2>Spellcasting: 1</h2>
                <p><em>You are a meticulous student of the arcane, wielding spells with precision.</em></p>
                <p><strong>Cantrips.</strong> At 1st level, you know three cantrips of your choice from the wizard spell
                    list. You learn one additional wizard cantrip of your choice at levels 4, 8, 12, and 16.</p>
                <p><strong>Spellbook.</strong> At 1st level, you have a spellbook containing six 1st-level wizard spells
                    of your choice. Your spellbook is the repository of the wizard spells you know, except your
                    cantrips, which are fixed in your mind.</p>
                <p><strong>Preparing and Casting Spells.</strong> The Wizard Spellcasting table shows how many spell
                    slots you have to cast your wizard spells. To cast one of your wizard spells, you must expend a slot
                    of the spell's level or higher. You regain all expended spell slots when you finish a long rest.</p>
                <p>You prepare the list of wizard spells that are available for you to cast. To do so, choose a number
                    of wizard spells from your spellbook equal to your <strong>Mental Modifier</strong> + your wizard
                    level (minimum of one spell). The spells must be of a level for which you have spell slots.</p>
                <p><strong>Spellcasting Economy.</strong> Casting a spell with a <strong>Cantrip</strong> requires one
                    action. Casting a spell with a <strong>Primary Spell Slot</strong> or <strong>Secondary Spell
                        Slot</strong> requires two actions.</p>
                <p><strong>Learning Spells of 1st Level and Higher.</strong> Each time you gain a wizard level, you can
                    add two wizard spells of your choice to your spellbook. Each of these spells must be of a level for
                    which you have spell slots, as shown on the Wizard table. On your adventures, you might find other
                    spells that you can add to your spellbook.</p>
                <p><strong>Spellcasting Ability.</strong> Intelligence is your spellcasting ability for your wizard
                    spells. The DC for your spell saving throws equals your <strong>Mental DC</strong> (8 + your
                    <strong>Proficiency Bonus</strong> + your <strong>Mental Modifier</strong>).
                </p>
                <p><strong>Ritual Casting.</strong> You can cast a wizard spell as a ritual if that spell has the
                    <strong>ritual</strong> tag and you have the spell in your spellbook. You don't need to have the
                    spell prepared.
                </p>
                <p><strong>Spellcasting Focus.</strong> You can use an arcane focus as a <strong>spellcasting
                        focus</strong> for your wizard spells.</p>

                <h2>Arcane Recovery: 2</h2>
                <p><em>A quick study of your spellbook restores a measure of magical energy.</em> You have a number of
                    <strong>Arcane Charges</strong> equal to your <strong>Proficiency Bonus</strong>. You regain all
                    expended charges when you finish a long rest.
                </p>
                <p>When you finish a short rest, you can expend these charges to recover spell slots. Recovering a
                    <strong>Primary Spell Slot</strong> costs 1 charge; recovering a <strong>Secondary Spell
                        Slot</strong> costs 2 charges. You may do this multiple times, expending charges as available.
                </p>

                <h2>Scholarly Insight: 2</h2>
                <p><em>Your extensive study has sharpened your mind.</em> You gain the following benefits:</p>
                <ul>
                    <li>You have advantage on Intelligence checks made to recall information about arcane, historical,
                        or magical topics.</li>
                    <li>You can read and write in three additional languages of your choice.</li>
                </ul>

                <h2>Arcane Tradition: 3</h2>
                <p><em> You choose an <a href="sc_wizard.html">Arcane Tradition</a> that shapes your magical
                        practice.</em> Your choice grants you features at 3rd level, and then again at 6th, 10th, 14th,
                    and 20th level.</p>

                <h2>Tertiary Slots: 3</h2>
                <p>You gain access to <strong>tertiary spell slots</strong>, as shown on the Spellcasting table. Refer
                    to the Spellcasting section for the rules governing the casting of tertiary slot spells.</p>

                <h2>Ability Score Improvement</h2>
                <p>At 4th, 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 1. You
                    can't increase an ability score above 5 using this feature.</p>

                <h2>Magic Fatigue Resistance: 5</h2>
                <p>Taking the <strong>Magic action</strong> does not inflict you with the <strong>fatigued</strong>
                    condition.</p>

                <h2>Cantrip Formulas: 5</h2>
                <p><em>Your spellbook holds ever-evolving arcane formulas.</em> Whenever you finish a long rest and
                    consult your spellbook, you can replace one wizard cantrip you know with another cantrip from the
                    wizard spell list.</p>

                <h2>Spell Mastery: 17</h2>
                <p><em>You achieve such mastery over certain spells that you can cast them at will.</em> Choose a
                    1st-level wizard spell and a 2nd-level wizard spell that are in your spellbook. You can cast those
                    spells at their lowest level without expending a spell slot. If you want to cast either spell at a
                    higher level, you must expend a spell slot as normal.</p>
                <p>By spending 8 hours of study, you can exchange one or both of the spells you chose for different
                    spells of the same levels.</p>

                <h2>Signature Spells: 18</h2>
                <p><em>You have mastered two powerful spells and can cast them with little effort.</em> Choose two
                    3rd-level wizard spells in your spellbook as your signature spells. You always have these spells
                    prepared, and you can cast each of them once at 3rd level without expending a spell slot. When you
                    do so, you cannot do so again until you finish a short or long rest.</p>
                <p>If you want to cast either spell at a higher level, you must expend a spell slot as normal.</p>
