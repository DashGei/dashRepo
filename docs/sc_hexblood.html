                <h1>The Vampire</h1>
                
                <h2>Level 3: A Vampire's Bite</h2>
                <p>When you take the attack action, you can spend a Feat Slot to bite the target instead of making an attack with a weapon or unarmed strike. Make a melee attack with the finesse property against the target, on a hit the target takes 1d4 Necrotic damage and is effected by your Pact of Doom without you needing to take damage.</p>
                <p>While effected by Pact of Doom in this way the creature subtracts 1d4 from the first attack roll or ability check they make on their turn.</p>
                <h2>Level 7: Vampiric Aspects</h2>
                <p>While Pain Bank is active you have resistance to Necrotic damage, the effects of the Spider Climb spell, and your speed increases by 10 feet.</p>
                <h2>Level 14: Vampiric Aspects II</h2>
                <p>When you use A Vampire's Bite, the next attack roll you make adds 1d4 to the result.</p>
                                <p>Additionally you may spend a Feat Slot and two actions to cast the spell Polymorph on yourself. The only form you may take is that of a bat, but you retain your mental statistics and can dismiss the form as an action.</p>
