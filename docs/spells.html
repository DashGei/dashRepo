                <strong>Reap</strong>
                <i>2nd-level Necromancy (Cleric, Warlock, Wizard)</i>
                <p>Casting Time: Instantaneous</p>
                <p>Range: 60 feet</p>
                <p>Components: V,S,M (a vial of ashes from a humanoid)</p>
                <p>An arcane symbol appears and saps the life from a point of your choice in range.
                    Each creature in a 10-foot-radius sphere centered on that point must make a
                    Constitution saving throw. A creature takes 2d12 necrotic damage on a failed
                    save, or half as much damage on a successful one. If a creature is reduced to 0
                    hit points by this spell it dies, and the caster regains 1d4 hit points for each
                    dead creature. A creature with no soul is unaffected by this spell. At Higher
                    Levels. When you cast this spell using a spell slot of 3rd level or higher, the
                    damage increases by 1d12 and 1d4 respectively for each slot level above 2nd.</p>
                <strong>Counter Spell</strong>
                <i>Level 3 Abjuration (Spellblade, Warlock, Wizard)</i>
                <p>Casting Time: Instantanious</p>
                <p>Range: 10 feet</p>
                <p>Components: V,S</p>
                <p>Duration: Concentration, 1 minute</p>
                <p>You prepare an arcane ward which hangs in the air in a point up to 10 feet from
                    you. When a creature you can see casts a spell with verbal or somatic components
                    within 60 feet of the ward, you can use your reaction to cause the ward to lash
                    out. If the creature is casting a spell of 3rd level or lower, its spell fails
                    and has no effect. If it is casting a spell of 4th level or higher, make an
                    ability check using your spellcasting ability. The DC equals 10 + the spell's
                    level. On a success, the creature's spell fails and has no effect.</p>
                <strong>Greater Curse</strong>
                <i>Level 6 Necromancy (Bard, Cleric, Druid, Warlock, Wizard)</i>
                <p>Casting Time: 1 Minute</p>
                <p>Range: 10 foot</p>
                <p>Components: V,S</p>
                <p>Duration: 24 hours</p>
                <p>You touch a creature who's CR is equal or lower to one third the level you cast
                    this spell at. That creature is now cursed and suffers an effect of your
                    choosing. When you cast the spell you may designate a break condition which you
                    may set, such as killing another creature, bringing you an object, or doing a
                    good deed, if this condition is met the curse is broken early. the nature of the
                    curse from the following options:</p>
                <ul>
                    <li> Choose one ability score. While cursed the target has their modifier for
                        this score set to -1 if it was not already lower, you can decide the
                        physical effects of this curse, such as a charismatic creature's emitting a
                        foul smell, or a dexterous creature's hands becoming swollen.</li>
                    <li> While cursed, the target is under the effects of a polymorph spell.</li>
                    <li> While cursed, a humanoid target assumes a new humanoid race of your
                        choice.</li>
                    <li> While cursed, the creature is charmed by you.</li>
                    <li> While cursed, the creature is blinded or deafened</li>
                    <li> While cursed, all beasts of your choice are hostile to the target and
                        attack on sight</li>
                </ul>
                <p>A remove curse spell ends this effect. At the DM's option, you may choose an
                    alternative curse effect, but it should be no more powerful than those described
                    above. The DM has final say on such a curse's effect.</p>
                <p>Using a Higher-Level Spell Slot. If you use a level 7 spell slot the duration
                    becomes 1 year. If you use a level 8 spell slot, the spell lasts 10 years. If
                    you use a level 9 spell slot, the spell lasts until dispelled.</p>
