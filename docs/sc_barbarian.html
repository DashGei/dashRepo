                <h3>Berserker - Barbarian</h3>
                <p>Berserkers embrace the mindless fury at the heart of rage, becoming immune to fear and resistance to
                    mental intrusion as they fight. Their rage burns so hot that even poison and psychic assaults cannot
                    slow them.</p>
                <h2>Level 3: Mindless Rage</h2>
                <p>Your mindless rage makes you impervious to mental manipulation. While raging, have advantage on
                    saving throws against the Frightened and Charmed conditions.</p>
                Level 7: Toxin Tolerance
                <p>Your body purges foreign agents through sheer fury. You gain resistance to Poison damage, and a the
                    Poisoned condition.</p>
                <h3>Level 14: Unstoppable Frenzy</h3>
                <p>Your mind truly blanks. You gain resistance to Psychic damage.</p>
                <p>Critical Overload: When you score a critical hit while raging, each creature of your choice within
                    your aura must make a Mental DC Wisdom save or be Frightened of you until the end of your next turn.
                    While Frightened in this way, they cannot willingly move closer to you.</p>
                Additionally, you ignore the Frightened and Charmed conditions entirely (even outside rage), and your
                mind cannot be read or probed against your will.
                <h3>Level 20: World-Breaker's Rage</h3>
                <p>Once per long rest, you can enter a World-Breaker's Rage as an action. This functions as your normal
                    Rage but with the following enhancements for its duration (1 minute):</p>
                <ul>
                    <li>Your Building Rage critical range increases by 2 at the start of each turn (instead of 1)</li>
                    <li>Your aura expands to 30 feet</li>
                    <li> You gain the effects of the Mind Blank Spell</li>
                    <li>When you use Relentless Rage, you automatically succeed on the saving throw</li>
                    <li>Your Indomitable Might threshold doubles (Strength Modifier × 6)</li>
                    <li>While in this state, your mind cannot be affected by any effect that would control your actions
                        or alter your perception of reality.</li>
                </ul>

                <h1>The Zealot</h2>

                    <h3>Level 3: Divine Retribution:</h3>
                    <p>While raging you become resistant to Radiant damage. Additionally when your critical range
                        increases because a friendly creature in your aura was harmed, you cause up to one creature of
                        your choice within your aura to take PB x 1d2 Radiant or Necrotic damage (you choose when you
                        gain this feature)</p>


                    <h3>Level 7: Guardian Angel</h3>
                    <p>When you score a critical hit, allies within your aura regain hitpoints equal to one roll of your
                        rage bonus die</p>

                    <h3>Level 14: Zaealous Presence</h3>
                    <p>When you are invisible, creatures of your choice within 30 feet of you subtract 1d4 from wisdom
                        saving throws. A creature immune to the frightened condition is also immune to this effect.</p>
                    <p> When you use re-use hunters mark as part of the Mortal Reminder feature, the new marked
                        creature must make a Mental DC Wisdom save or be frightened until the end of your next turn.</p>

                    <h3>Level 20: Night Crawler</h3>
                    <p>Once per long rest, when you enter rage you may shape-shift into a Deva. You also gain all of the
                        benefits of your own rage and may use your own weapons or armor.</p>
