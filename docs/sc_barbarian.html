                <h3>Berserker - Barbarian</h3>
                <p>Berserkers embrace the mindless fury at the heart of rage, becoming immune to fear and resistance to mental intrusion as they fight. Their rage burns so hot that even poison and psychic assaults cannot slow them.</p>
                <h2>Level 3: Mindless Rage</h2>
                <p>Your mindless rage makes you impervious to mental manipulation. While raging, have advantage on saving throws against the Frightened and Charmed conditions.</p>
                Level 7: Toxin Tolerance
                <p>Your body purges foreign agents through sheer fury. You gain resistance to Poison damage, and you automatically succeed on saving throws against the Poisoned condition.</p>
                    <p>Additionally, when an allied creature within your aura makes an attack, they can add 1d4 to the damage roll. This damage is psychic damage.</p>
                <h3>Level 14: Unstoppable Frenzy</h3>
                        <p>Your mind truly blanks. You gain resistance to Psychic damage.</p>
                            <p>Critical Overload: When you score a critical hit while raging, you unleash a burst of psychic static. Each creature of your choice within your aura must make a Mental DC Wisdom save  or be Frightened of you until the end of your next turn. While Frightened in this way, they cannot willingly move closer to you.</p>
                Additionally, you ignore the Frightened and Charmed conditions entirely (even outside rage), and your mind cannot be read or probed against your will.
                <h3>Level 20: World-Breaker's Rage</h3>
                                <p>Once per long rest, you can enter a World-Breaker's Rage as an action. This functions as your normal Rage but with the following enhancements for its duration (1 minute):</p>
                                    <ul>
                                   <li>Your Building Rage critical range increases by 2 at the start of each turn (instead of 1)</li>
                                       <li>Your aura expands to 30 feet</li>
                                       <li> You gain the effects of the Mind Blank Spell</li>
                                        <li>When you use Relentless Rage, you automatically succeed on the saving throw</li>
                                       <li>Your Indomitable Might threshold doubles (Strength Modifier × 6)</li>
                                        <li>While in this state, your mind cannot be affected by any effect that would control your actions or alter your perception of reality.</li>
                                    </ul>
