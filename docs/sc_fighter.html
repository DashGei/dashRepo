        <figure><div class="text-frame">

                <h2>Battle Master</h2>
                
                <h3>Level 3: Feat Expansion:</h3>
                <p>You know an extra three feats, and you can choose these feats from any class list. You also gain three extra Feat Slots.</p>
                
                <h3>Level 3: Superior Feats</h3>
                <p>Whenever you use a feat as part of an attack, the creature you hit takes an additional 1d4 physical damage. When you are below half health, this increases to 1d6.</p>
                <p>You ignore the Martial Feat limit of one per turn, you can use as many as you have feat slots.</p>
                
                <h3>Level 7: Superior Feat II</h3>
                <p>The damage you deal when using Superior Feat increases to 1d6 and 1d8.</p>
                <p>Once per long rest, when you drop below half health you gain one feat slot.</p>
                
                <h3>Level 14: Superior Feat III</h3>
                <p>The damage you deal when using Superior Feat increases to 1d8 and 1d10.</p>
                <p>In combat, you can subtract 3d10 from a damage roll when taking the attack action to use a feat which requires the attack action, when you do this you do not expend or require a feat slot.</p>
                
                <h3>Level 20: Tireless</h3>
                <p>The damage you deal when using Superior Feat increases to 1d10 and 1d12.</p>
                <p>When you use action surge, you regain all feat slots. You deal double the dice from Superior Feats when using feats and taking the attack action on actions gained from action surge.</p>
                
        </div></figure>
