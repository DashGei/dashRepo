                <h1>Battle Master</h1>

                <h3>Level 3: Feat Expansion:</h3>
                <p>You know an extra three feats, and you can choose these feats from any class list. You also gain
                    three extra Feat Slots.</p>

                <h3>Level 3: Superior Feats</h3>
                <p>Whenever you use a feat as part of an attack, the creature you hit takes an additional 1d4 physical
                    damage.</p>
                <p>You ignore the Martial Feat limit of one per turn, you can use as many as you have feat slots.</p>

                <h3>Level 7: Superior Feat II</h3>
                <p>The damage you deal when using Superior Feat increases to 1d6 and 1d8.</p>
                <p>Once per long rest, when you drop below half health you gain one feat slot.</p>

                <h3>Level 14: Superior Feat III</h3>
                <p>The damage you deal when using Superior Feat increases to 1d8 and 1d10.</p>
                <p>In combat, you can subtract 3d10 from a damage roll when taking the attack action to use a feat which
                    requires the attack action, when you do this you do not expend or require a feat slot.</p>

                <h3>Level 20: Tireless</h3>
                <p>The damage you deal when using Superior Feat increases to 1d10 and 1d12.</p>
                <p>When you use action surge, you regain all feat slots. You deal double the dice from Superior Feats
                    when using feats and taking the attack action on actions gained from action surge.</p>

                <h1>Man at Arms</h2>

                    <h3>Level 3: Trained in Combat:</h3>
                    <p>When you spend a stamina die, one ally within 10 feet of you gains a stamina die themselves,
                        which they can use in same way you used it for the Stamina feature. This stamina die is lost on
                        the end of that ally's next turn. Ex: If you used the stamina die for a saving throw, that ally
                        can only use the given stamina die to guard against saving throws.</p>

                    <h3>Level 7: Charge!</h3>
                    <p></p>

                    <h3>Level 14: Mortal's Resolve</h3>
                    <p>Once per long rest, when you are reduced to 0 hitpoints you immediately take your turn and use
                        Action Surge. After this you fall back to one hitpoint and your next turn is skipped.
                        Additionally when you make a Death Saving Thow, you can choose to have disadvantage in order to
                        ignore the effects of dying and exhaustion until the start of your next turn.</p>

                    <h3>Level 20: Unstoppable Force</h3>
                    <p>You gain greater magic resistance. You have advantage on saving throws against all spells, and
                        you suffer no negative effects from spells of 3rd level or lower.</p>

                    <h1>Cavalier</h2>

                        <h3>Level 3: Noble Pursuits:</h3>
                        <p>You gain proficiency in two Intelligence or Charisma skills of your choice. You also learn
                            one extra language and gain proficiency in one Artisan's Tool of your choice.</p>

                        <h3>Level 7: Good Day!</h3>
                        <p>Once per long rest, the first Charisma check you make against a creature has advantage.</p>
                        <p>When
                            you use Action Surge, allies within 15 feet of you can immediately move up to half of their
                            speed. If an ally uses this movement to get within 5 feet of an enemy, they can make a weapon attack as a reaction.</p>

                        <h3>Level 14: Good Day!</h3>
                        <p>Once per long rest, when you are reduced to 0 hitpoints you immediately take your turn and
                            use
                            Action Surge. After this you fall back to one hitpoint and your next turn is skipped.
                            Additionally when you make a Death Saving Thow, you can choose to have disadvantage in order
                            to
                            ignore the effects of dying and exhaustion until the start of your next turn.</p>

                        <h3>Level 20: Unstoppable Force</h3>
                        <p>You gain greater magic resistance. You have advantage on saving throws against all spells,
                            and
                            you suffer no negative effects from spells of 3rd level or lower.</p>

                        <h1>Eldritch Knight</h2>

                            <h3>Level 3: Spellcasting</h3>
                            <h4> Choose any class's spell list, whenever this subclass refers to a spellcasting list you
                                pick
                                spells from that list and only that list. You may not change this list at any point.
                            </h4>
                            <p>Cantrips.</p>
                            You know two cantrips of your choice from your spell list. Whenever you gain a
                            Fighter
                            level,
                            you can replace one of these cantrips with another cantrip of your choice from your
                            spell
                            list.
                            <h3>Level 3: Spell Slots</h3>
                            <p>The Spellcasting Progression table shows how many spell slots you have to cast your
                                level 1+
                                spells. You regain all expended slots when you finish a Long Rest. Refer to the
                                spellcasting
                                rules section for casting rules.</p>

                            <p><strong>Spells Known.</strong> To start, you know three spells of your choice
                                from
                                your spell list. The Spells Known column of the Spellcasting
                                table shows when you learn more spells. Each of these spells must be at
                                maximum level equal to your highest level spell slot.</p>

                            <p>Whenever you gain a level in this class, you can replace one spell you
                                know with another spell of your choice from your spell list. The new
                                spell must be of a level for which you have spell slots.</p>

                            <h3>Level 7: Magical Fatigue Resistance</h3>
                            <p>When taking the magic action you do not suffer any penalties from the fatigued
                                condition</p>
                            <h3>Level 7: Invoke Weapon</h3>
                            <p>When you take a Long Rest you can bind up to two weapons to you. You can have a maximum
                                of
                                two weapons bound at any time, and binding more weapons unbinds previous weapons.
                                You can summon a bound weapon to your hands as part of the attack action, and those
                                weapons
                                become magical.
                            </p>

                            <h3>Level 14: Arcane Rending</h3>
                            <p>A creature you hit with a weapon attack has Disadvantage on saving throws against your
                                spells
                                until the end of your next turn..</p>

                            <h3>Level 20: Ancient Rites</h3>
                            <p>When you cast a spell with a Primary Slot, it only takes one action.</p>
