                <h2>Physical and Mental Modifiers</h2>
                <p>Some of your abilities will require your <strong>Mental Modifier</strong> or <strong>Physical
                        Modifier</strong>.</p>
                <p>Your <strong>Physical Modifier</strong> is your Strength or Dexterity modifier.</p>
                <p>Your <strong>Mental Modifier</strong> is your Intelligence, Wisdom, or Charisma modifier.</p>

                                <h2>Fighting Style: 1</h2>
                <p><em>Your combat training defines your approach to battle.</em> You adopt a particular style of
                    fighting as your specialty. Choose one of the following options. Each fighting style grants you a
                    bonus at level 1; you must be wielding one of your fighting style's respective items to gain this
                    benefit. At level 7, your fighting style provides you with a <strong>Martial Feat</strong>. This
                    feat does not count against your Feats Prepared, and it does not require a <strong>Feat
                        Slot</strong> when you use it. You must be wielding one of your fighting style's respective
                    items to use this feature, but you can use this feat regardless of your class.</p>
                <ul>
                    <li>Dueling: You gain a +2 health bonus at each level.</li>
                    <li>Unarmed: You gain a +2 health bonus at each level.</li>
                    <li>Skirmisher: You gain a +2 health bonus at each level.</li>
                    <li>Thrown Weapon: You gain a +2 health bonus at each level.</li>
                    <li>Two-Weapon: You gain a +2 health bonus at each level.</li>
                    <li>Brawler: You gain a +3 health bonus at each level.</li>
                    <li>Guardian: You gain a +3 health bonus at each level.</li>
                </ul>
                <p>The health bonus is added to your hit point maximum at 1st level and whenever you gain a level in
                    this class.</p>

                <h2>Hit Points</h2>
                <p><strong>Hit Points at 1st Level:</strong> 10 + your fighting style health bonus</p>
                <p><strong>Hit Points at Higher Levels:</strong> 5 + your fighting style health bonus per vigilante
                    level after 1st</p>

                <h2>Proficiencies</h2>
                <p><strong>Armor:</strong> Light armor</p>
                <p><strong>Weapons:</strong> Simple weapons, rapiers, shortswords, scimitars, whips, hand crossbows</p>
                <p><strong>Tools:</strong> Choose one type of gaming set or a musical instrument</p>
                <p><strong>Saving Throws:</strong> Dexterity, Charisma</p>
                <p><strong>Skills:</strong> Choose three from Acrobatics, Athletics, Deception, Insight, Intimidation,
                    Perception, Performance, Sleight of Hand, and Stealth</p>





                <h2>Impeccable Defense: 1</h2>
                <p>While you are not wearing any armor, your base Armor Class equals 10 + your Dexterity modifier + your
                    <strong>Mental Modifier</strong>.</p>

                <h2>Combo: 1</h2>
                <p><em>A flurry of strikes that keeps your foe on the back foot.</em> When you take the <strong>Attack
                        action</strong>, you can forgo your normal attacks to initiate a combo. Make a melee attack roll
                    against a creature within your reach. On a hit, you deal 1d4 + your <strong>Physical
                        Modifier</strong> damage (regardless of the weapon used). If the d4 does not show a 1, you can
                    immediately make another attack as part of the same combo. You can continue this chain until you
                    miss, roll a 1 on the damage die, or have made a number of attacks equal to your <strong>Proficiency
                        Bonus</strong>.</p>
                <p>On a critical hit, you roll double the damage dice (2d4 + modifier), but you still check the base d4
                    (the first die rolled) to determine if the combo continues. If that die shows a 1, the combo ends.
                </p>

                <h2>Swift Stride: 2</h2>
                <p>Your speed increases by 10 feet while you aren't wearing armor.</p>

                <h2>Martial Feats: 2</h2>
                <p>You have trained in special techniques that give you an edge in combat and beyond. You gain access to
                    martial feats, as described in the <strong>Martial Feats</strong> section. You may only use one
                    <strong>Feat Slot</strong> per turn.</p>
                <p><strong>Feat Slots.</strong> You have 2 <strong>Feat Slots</strong>, which you expend to
                    activate your feats. You regain all expended slots when you finish a short rest. Your number of
                    <strong>Feat Slots</strong> increases as you gain levels, as shown in the Feats Progression
                    table.</p>
                <p><strong>Feats Prepared.</strong> You prepare 2 martial feats of your choice from your feat list. The
                    Feats Prepared column of the Feats Progression table shows when you learn more feats. Additionally,
                    when you gain a level in this class, you can replace one feat you have prepared with another feat of
                    your choice from your class feat list.</p>
                <p><strong>Feat Tier.</strong> You can learn feats of Tier 1 at level 2. At higher levels you gain
                    access to higher tiers, as shown in the table.</p>

                <h2>Vigilante Persona: 3</h2>
                <p><em>You adopt a <a href="sc_vigilante">Vigilante Persona</a> that defines how you show off, fight, and
                    survive.</em> Your choice grants you features at 3rd level, and then again at 7th, 14th, and 20th level.
                </p>

                <h2>Ability Score Improvement</h2>
                <p>At 4th, 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 1. You
                    can't increase an ability score above 5 using this feature.</p>

                <h2>Martial Fatigue Resistance: 5</h2>
                <p>Taking the <strong>Attack action</strong> does not inflict you with the <strong>fatigued</strong>
                    condition.</p>

                <h2>Daring Flourish: 5</h2>
                <p><em>You throw caution aside and commit fully to the assault.</em> When you take the action to
                    initiate a combo, you can declare that you are going all in. Your combo damage die increases to 1d8,
                    but the combo fails if you roll a 1–4 on the damage die. This effect lasts until the end of the
                    combo.</p>

                <h2>Acrobatic Movement: 6</h2>
                <p>Your dazzling movement reaches new heights. When you take the <strong>Dash action</strong>, you can
                    move along walls and calm liquid surfaces as if they were standard terrain for the rest of your
                    turn. If you end your turn on a wall or liquid surface, you fall.</p>
                <p>You also ignore the negative effects (such as damage, required checks or saving throws, or difficult
                    terrain) of the following surfaces as long as you do not end your turn on them with 0 movement
                    remaining or with no movement spent for the round:</p>
                <ul>
                    <li>Burning surfaces</li>
                    <li>Sharp surfaces, like broken glass or caltrops</li>
                    <li>Slick surfaces</li>
                    <li>Acidic surfaces</li>
                    <li>Thin terrain, such as tightropes</li>
                </ul>

                <h2>Deflect Attacks: 9</h2>
                <p><em>With a flick of your blade, you turn an enemy's strike aside.</em> When an attack roll hits you
                    and its damage includes <strong>Physical</strong> damage, you can take a <strong>Reaction</strong>
                    to reduce the damage by 1d10 + your <strong>Physical Modifier</strong> + your level.</p>
                <p>If you reduce the damage to 0, you can expend a <strong>Feat Slot</strong> to redirect the attack's
                    force. Choose a creature you can see within 5 feet (if the attack was melee) or within 60 feet that
                    isn't behind total cover (if the attack was ranged). That creature must succeed on a
                    <strong>Physical DC</strong> Dexterity saving throw or take <strong>Physical</strong> damage equal
                    to your <strong>Proficiency Bonus</strong> × 1d6 + your <strong>Physical Modifier</strong>.</p>

                <h2>Dazzling Evasion: 10</h2>
                <p>When a creature misses you with a melee attack, you can use your <strong>reaction</strong> to move up
                    to 10 feet without provoking reactions and impose disadvantage on that creature's next attack roll.
                </p>

                <h2>Fluid Rhythm: 11</h2>
                <p>Once per turn, when you roll a 1 on a combo damage die, you can reroll it.</p>

                <h2>Graceful Landing: 13</h2>
                <p>You have advantage on saving throws against being knocked prone. Additionally, when you fall, you can
                    use your <strong>reaction</strong> to reduce any falling damage by an amount equal to five times
                    your vigilante level.</p>

                <h2>Deflect Energy: 15</h2>
                <p>You can now use Deflect Attacks against any damage type, not just <strong>Physical</strong>.</p>

                <h2>Perfect Rhythm: 17</h2>
                <p><em>Your strikes flow in an unbreakable chain.</em> When you roll a 1 on a <strong>combo</strong>
                    damage die, you can instead treat it as a 2. Your combo still ends if you miss.</p>

                <h2>Unfaltering Ego: 18</h2>
                <p>You have advantage on saving throws against being <strong>charmed</strong> or
                    <strong>frightened</strong>. Additionally, if you fail a saving throw, you can use your
                    <strong>reaction</strong> to reroll it with advantage. You must use the new result.</p>
