                <h2>Hit Points</h2>
                <p><strong>Class Health Number:</strong> 6</p>
                <p><strong>Hit Points at 1st Level:</strong> 12 + your fighting style health
                    bonus</p>
                <p><strong>Hit Points at Higher Levels:</strong> 6 + your fighting style health
                    bonus per fighter level after 1st</p>

                <h2>Proficiencies</h2>
                <ul>
                    <li><strong>Armor:</strong> All armor, shields</li>
                    <li><strong>Weapons:</strong> Simple weapons, martial weapons</li>
                    <li><strong>Tools:</strong> One type of artisan's tools or a gaming set of your
                        choice</li>
                    <li><strong>Saving Throws:</strong> Strength, Constitution (now uses
                        Strength)</li>
                    <li><strong>Skills:</strong> Choose two skills from Acrobatics, Animal Handling,
                        Athletics, History, Insight, Intimidation, Perception, and Survival</li>
                </ul>

                <h2>Physical and Mental Modifiers: 1</h2>
                <p>Some of your abilities will require your Mental or Physical Modifier.</p>
                <p>Your Physical Modifier is your Strength or Dexterity Modifier.</p>
                <p>Your Mental Modifier is your Intelligence, Wisdom, or Charisma Modifier.</p>

                <h2>Fighting Style: 1</h2>
                <p>You adopt a particular style of fighting as your specialty. Choose one of the
                    following options. Each Fighting style grants you a bonus at level 1, you must
                    be wielding one of your fighting style’s respective item to gain this benefit.
                    At level 7, your fighting style provides you with a Martial Feat, this feat does
                    not count against your Feats known, and it does not require a slot when you use
                    it. You must be wielding one of your fighting style’s respective item to use
                    this feature, but you can use this feat regardless of your class.</p>

                <ul>
                    <li>Archery: You gain a +2 health bonus at each level.</li>
                    <li>Dueling: You gain a +2 health bonus at each level.</li>
                    <li>Skirmisher: You gain a +2 health bonus at each level.</li>
                    <li>Polearm: You gain a +2 health bonus at each level.</li>
                    <li>Thrown Weapon: You gain a +2 health bonus at each level.</li>
                    <li>Unarmed: You gain a +2 health bonus at each level.</li>
                    <li>Two-Weapon: You gain a +2 health bonus at each level.</li>
                    <li>Priest: You gain a +2 health bonus at each level.</li>
                    <li>Sage: You gain a +2 health bonus at each level.</li>
                    <li>Arcanist: You gain a +2 health bonus at each level.</li>
                    <li>Brawler: You gain a +3 health bonus at each level.</li>
                    <li>Guardian: You gain a +3 health bonus at each level.</li>
                    <li>Great Weapon: You gain a +3 health bonus at each level.</li>
                </ul>

                <p>The health bonus is added to your hit point maximum at 1st level and whenever you
                    gain a level in this class.</p>

                <h2>Bloodied: 1</h2>
                <p>Once per turn while below half hit points, When you take the Attack action and
                    hit, you gain one of the following benefits of your choice:</p>
                <ul>
                    <li>Second Wind: You regain 1d4 hit points.</li>
                    <li>Pressure: The creature you hit cannot take reactions until the start of your
                        next turn.</li>
                </ul>

                <h2>Martial Feats: 2</h2>
                <p>You have trained in special techniques that give you an edge in combat and
                    beyond. You gain access to martial feats, as described in the Martial Feats
                    section. You may only use one Feat Slot per turn.</p>

                <h2>Martial Feats: 2</h2>

                <p>You have trained in special techniques that give you an edge in combat and
                    beyond. You gain access to martial feats, as described in the Martial Feats
                    section. You may only use one Feat Slot per turn.</p>

                <p><strong>Primary Slots.</strong> You have 3 Primary Slots, which you expend to
                    activate your feats. You regain all expended slots when you finish a short rest.
                    Your number of Primary Slots increases as you gain levels, as shown in the Feats
                    Progression table.</p>

                <p><strong>Feats Known.</strong> You know 4 martial feats of your choice from your
                    feat list. The Feats Known column of the Feats Progression table shows when you
                    learn more feats. Additionally, when you gain a level in this class, you can
                    replace one feat you know with another feat of your choice from your class feat
                    list.</p>

                <p><strong>Feat Tier.</strong> You can learn feats of Tier 1 at level 2. At higher
                    levels you gain access to higher tiers, as shown in the table.</p>

                <h2>Action Surge: 2</h2>
                <p>You can push yourself beyond your normal limits for a moment. On your turn, you
                    can take additional actions equal to your proficiency bonus on top of your
                    regular two actions. You can use this feature once. You regain the use when you
                    finish a short or long rest.</p>

                <a href="sc_fighter.html"><h2>Martial Archetype: 3</h2></a>
                <p>You choose an archetype that epitomizes your fighting style. Your choice grants
                    you features at 3rd level and then again at 7th, 14th, and 20th level.</p>

                <h2>Ability Score Improvement</h2>
                <p>At 4th, 8th, 12th, 16th, and 19th level, you can increase one ability score of
                    your choice by 1. You can't increase an ability score above 5 using this
                    feature.</p>

                <h2>Martial Fatigue Resistance: 5</h2>
                <p>When taking the attack action you do not suffer any penalties from the fatigued
                    condition.</p>

                <h2>Overpowering Strike: 6</h2>
                <p>When you make a weapon attack, you can choose to replace the attack roll with
                    forcing the target to make a Physical DC Dexterity save. On a failure the attack
                    hits.</p>

                <h2>Surging Stamina: 7</h2>
                <p>When you use your Action Surge, you regain one expended Primary Slot for your
                    Martial Feats.</p>
                <p>At 15th level, this increases to two expended Primary slots.</p>

                <h2>Indomitable: 9</h2>
                <p>You can reroll a saving throw that you fail. If you do so, you must use the new
                    roll, and you can't use this feature again until you finish a long rest. You can
                    use this feature twice between long rests starting at 13th level and three times
                    starting at 17th level.</p>

                <h2>Bloodied II: 10</h2>
                <p>When you start your turn while below half hit points, you gain one of the
                    following benefits until the start of your next turn:</p>
                <ul>
                    <li>Mobile Warrior. Your speed increases by 10 feet, and moving through
                        non-hostile creatures' spaces doesn't cost extra movement.</li>
                    <li>Defensive Stance. You gain a +2 bonus to AC.</li>
                    <li>Aggressive Posture. Your weapon attacks score a critical hit on a roll of
                        19-20.</li>
                </ul>

                <p>You can change which benefit you receive at the start of each of your turns.</p>


                <h2>Finishing Blow: 11</h2>
                <p>When you damage a creature with an attack, you can add extra damage equal to
                    twice your proficiency bonus. You can only use this feature if the extra damage
                    would be enough to reduce the creature to 0 hit points.</p>
                <h2>Momentum: 13</h2>
                <p>When you hit a creature with an attack, you deal an additional 1d4 damage, (same
                    type as the attack's damage) everytime you take the attack action from now until
                    the end of your turn, you add an additional 1d4 from this feature.</p>

                <h2>Overpowering Strike II: 14</h2>
                <p>Your Overpowering Strike becomes more devastating. When a creature succeeds its
                    saving throw against your Overpowering Strike, it takes half damage.
                    Additionally, if the creature rolls a 1 on its saving throw, the attack is
                    considered a critical hit for damage.</p>

                <h2>Bloodied III: 18</h2>


                <ul>
                    <li>Mobile Warrior. Your speed increases by 20 feet instead of 10, and moving
                        through hostile creatures' spaces doesn't cost extra movement.</li>
                    <li>Defensive Stance. You gain a +4 bonus to AC instead of +2.</li>
                    <li>Aggressive Posture. Your weapon attacks score a critical hit on a roll of
                        18-20.</li>
                </ul>
