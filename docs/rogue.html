                <h2>Hit Points</h2>
                <p><strong>Class Health Number:5</strong>
                </p>
                <p><strong>Hit Points at 1st Level:</strong> 10 + your fighting style health
                    bonus</p>
                <p><strong>Hit Points at Higher Levels:</strong> 5 + your fighting style health
                    bonus per level after 1st</p>
                <h2>Proficiencies</h2>
                <ul>
                    <li><strong>Armor:</strong> Light armor</li>
                    <li><strong>Weapons:</strong> Simple weapons, hand crossbows, light crossbows,
                        scimitars, rapiers, shortswords</li>
                    <li><strong>Saving Throws:</strong> Dexterity, Intelligence</li>
                    <li><strong>Skills:</strong> Choose four from Acrobatics, Athletics, Deception,
                        Insight, Intimidation, Investigation, Perception, Performance, Persuasion,
                        Sleight of Hand, and Stealth</li>
                </ul>
                <h2>Physical and Mental Modifiers</h2>
                <ul>
                    <li><strong>Physical Modifier:</strong> Strength or Dexterity modifier</li>
                    <li><strong>Mental Modifier:</strong> Intelligence or Wisdom modifier</li>
                </ul>
                <h2>Fighting Style</h2> You adopt a particular style of fighting as your specialty.
                Choose one of the following options. Each Fighting style grants you a bonus at level
                1, you must be wielding one of your fighting style’s respective item to gain this
                benefit. At level 7, your fighting style provides you with a bonus. <ul>
                    <li>Archery: You gain a +2 health bonus at each level.</li>
                    <li>Arcanist: You gain a +2 health bonus at each level.</li>
                    <li>Dueling: You gain a +2 health bonus at each level.</li>
                    <li>Skirmisher: You gain a +2 health bonus at each level.</li>
                    <li>Thrown: You gain a +2 health bonus at each level.</li>
                    <li>Two-Weapon: You gain a +2 health bonus at each level.</li>
                </ul>
                <p>Each style grants a health bonus at every level. The bonus is added to your hit
                    point maximum whenever you gain a level.</p>
                <h2>Sneak Attack: 1</h2>
                <p>You know how to strike subtly and exploit a foe's distraction. Once per turn, you
                    can deal an extra 1d6 damage to one creature you hit with an attack if you have
                    advantage on the attack roll. The attack must use a finesse or ranged
                    weapon.</p>
                <p>You don't need advantage on the attack roll if another enemy of the target is
                    within 5 feet of it, that enemy isn't incapacitated, and you don't have
                    disadvantage on the attack roll.</p>
                <p>The amount of the extra damage increases as you gain rogue levels, as shown in
                    the Sneak Attack column of the rogue table. The extra damage's type is the same
                    as the weapon's type.</p>
                <h2>Thieves' Cant: 1</h2>
                <p>During your rogue training, you learned thieves' cant, a secret mix of dialect,
                    jargon, and code that allows you to hide messages in seemingly normal
                    conversation. Only another creature that knows thieves' cant understands such
                    messages. It takes four times longer to convey such a message than it does to
                    speak the same idea plainly.</p>
                <p>In addition, you understand a set of secret signs and symbols used to convey
                    short, simple messages.</p>
                <h2>Jack of All Trades: 2</h2>
                <p>You can add half your proficiency bonus, rounded down, to any ability check you
                    make that doesn't already include your proficiency bonus.</p>
                <h2>Cunning Action: 2</h2>
                <p>Your quick thinking and agility allow you to move and act with efficiency. On
                    your turn, you can perform one of the following actions as a single action
                    instead of their normal cost:</p>
                <p>Disengage (normally 2 actions)</p>
                <p>Hide (normally 2 actions)</p>
                <p>Search (normally 2 actions)</p>
                <p>You have trained in special techniques that give you an edge in combat and
                    beyond. You gain access to martial feats, as described in the Martial Feats
                    section. You may only use one Feat Slot per turn.</p>
                <p><strong>Primary Slots.</strong> You have 3 Primary Slots, which you expend to
                    activate your feats. You regain all expended slots when you finish a short rest.
                    Your number of Primary Slots increases as you gain levels, as shown in the Feats
                    Progression table.</p>
                <p><strong>Feats Known.</strong> You know 4 martial feats of your choice from the
                    barbarian feat list. The Feats Known column of the Feats Progression table shows
                    when you learn more feats. Additionally, when you gain a level in this class,
                    you can replace one barbarian feat you know with another feat of your choice
                    from the barbarian feat list.</p>
                <p><strong>Feat Tier.</strong> You can learn feats of Tier 1 at level 2. At higher
                    levels you gain access to higher tiers, as shown in the table.</p>

                <h2>Roguish Archetype: 3</h2>
                <p>At 3rd level, you choose an archetype that emulates your approach to roguery.
                    Your choice grants you features at 3rd level, and then again at 7th, 14th, and
                    20th level.</p>
                <h2>Quick Feet: 3</h2>
                <p>At 3rd level, your agility in pursuit is unmatched. When you take the Dash
                    action, you gain an additional 30 feet of movement for that turn.</p>
                <h2>Ability Score Improvement</h2>
                <p>At 4th, 8th, 12th, 16th, and 19th level, you can increase one ability score of
                    your choice by 1. You can't increase an ability score above 5 using this
                    feature.</p>
                <h2>Uncanny Dodge: 5</h2>
                <p>At 5th level, when an attacker that you can see hits you with an attack, you can
                    use your reaction to halve the attack's damage against you.</p>
                <h2>Expertise: 6</h2>
                <p>At 6th level, choose two of your skill proficiencies, or one of your skill
                    proficiencies and your proficiency with thieves' tools. Your proficiency bonus
                    is doubled for any ability check you make that uses either of the chosen
                    proficiencies.</p>
                <h2>Evasion: 9</h2>
                <p>At 9th level, when you are subjected to an effect that allows you to make a
                    Dexterity saving throw to take only half damage, you instead take no damage if
                    you succeed on the saving throw, and only half damage if you fail.</p>
                <h2>Opportunistic Strike</h2>
                <p>At 10th level, you have an eye for capitalizing on even the smallest mistakes.
                    When a creature you can see within 30 feet of you rolls a natural 1 on an attack
                    roll, you can use your reaction and expend a Feat Slot to activate this feature.
                    Choose one of the following effects:</p>
                <p>Move up to half your speed toward that creature and make one melee weapon attack
                    against it.</p>
                <p>Make one ranged weapon attack against that creature.</p>
                <p>This attack is automatically a Sneak Attack, dealing your full Sneak Attack
                    damage dice even if you wouldn't normally qualify for it. You do not need
                    advantage, nor does an ally need to be within 5 feet of the target.</p>
                <h2>Reliable Talent</h2>
                <p>At 11th level, you have refined your chosen skills until they approach
                    perfection. Whenever you make an ability check that lets you add your
                    proficiency bonus, if the roll doesn't have advantage or disadvantage, roll two
                    d20s and use whichever roll is closer to 11. If there is a tie (for example, 9
                    and 13), you take the higher roll.</p>
                <h2>Skill Specialization</h2>
                <p>At 13th level, you hone your skills to an exceptional degree. Choose one skill or
                    tool proficiency that you are proficient in. Your proficiency bonus is doubled
                    for any ability check you make that uses that skill or tool. This stacks with
                    Expertise (you can choose a skill you already have Expertise in, but the bonus
                    does not double again; instead you gain advantage on checks with that
                    skill).</p>
                <p>Alternatively, you can choose to gain proficiency in two additional skills of
                    your choice.</p>
                <h2>Blindsense</h2>
                <p>At 15th level, if you are able to hear, you are aware of the location of any
                    hidden or invisible creature within 10 feet of you.</p>
                <h2>Slippery Mind</h2>
                <p>At 17th level, your cunning mind is difficult to assault. You gain proficiency in
                    Wisdom saving throws.</p>
                <h2>Elusive</h2>
                <p>At 18th level, you are so evasive that attackers rarely gain the upper hand
                    against you. No attack roll has advantage against you while you aren't
                    incapacitated.</p>
                <h2>Stroke of Luck</h2>
                <p>At 20th level, you have an uncanny knack for succeeding when you need to most. If
                    you fail an ability check or attack roll, you can choose to succeed instead.
                    Once you use this feature, you can't use it again until you finish a short or
                    long rest.</p>
                <h2>Roguish Archetype Capstone</h2>
                <p>At 20th level, you gain the ultimate expression of your chosen Roguish
                    Archetype.</p>
