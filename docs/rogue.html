                                <h2>Physical and Mental Modifiers</h2>
                <p>Some of your abilities will require your <strong>Mental Modifier</strong> or <strong>Physical
                        Modifier</strong>.</p>
                <p>Your <strong>Physical Modifier</strong> is your Strength or Dexterity modifier.</p>
                <p>Your <strong>Mental Modifier</strong> is your Intelligence, Wisdom, or Charisma modifier.</p>

                <h2>Fighting Style: 1</h2>
                <p><em>Your combat training defines your approach to battle.</em> You adopt a particular style of
                    fighting as your specialty. Choose one of the following options. Each fighting style grants you a
                    bonus at level 1; you must be wielding one of your fighting style's respective items to gain this
                    benefit. At level 7, your fighting style provides you with a bonus.</p>
                <ul>
                    <li>Archery: You gain a +2 health bonus at each level.</li>
                    <li>Arcanist: You gain a +2 health bonus at each level.</li>
                    <li>Dueling: You gain a +2 health bonus at each level.</li>
                    <li>Skirmisher: You gain a +2 health bonus at each level.</li>
                    <li>Thrown Weapon: You gain a +2 health bonus at each level.</li>
                    <li>Two-Weapon: You gain a +2 health bonus at each level.</li>
                </ul>
                <p>The health bonus is added to your hit point maximum at 1st level and whenever you gain a level in
                    this class.</p>

                <h2>Hit Points</h2>
                <p><strong>Hit Points at 1st Level:</strong> 10 + your fighting style health bonus</p>
                <p><strong>Hit Points at Higher Levels:</strong> 5 + your fighting style health bonus per rogue level
                    after 1st</p>

                <h2>Proficiencies</h2>
                <p><strong>Armor:</strong> Light armor</p>
                <p><strong>Weapons:</strong> Simple weapons, hand crossbows, light crossbows, scimitars, rapiers,
                    shortswords</p>
                <p><strong>Tools:</strong> Thieves' tools</p>
                <p><strong>Saving Throws:</strong> Dexterity, Intelligence</p>
                <p><strong>Skills:</strong> Choose four from Acrobatics, Athletics, Deception, Insight, Intimidation,
                    Investigation, Perception, Performance, Persuasion, Sleight of Hand, and Stealth</p>





                <h2>Sneak Attack: 1</h2>
                <p><em>You know how to strike subtly and exploit a foe’s distraction.</em> Once per turn, you can deal
                    extra damage to one creature you
                    hit with an attack if you have advantage on the attack roll. The attack must use a finesse or ranged
                    weapon. You don't need advantage if another enemy of the target is within 5 feet of it, that enemy
                    isn't incapacitated, and you don't have disadvantage on the attack roll.</p>
                <p>The extra damage starts at 1d6 and increases as shown in the Sneak Attack column of the Rogue table.
                    The damage type is the same as the weapon's type.</p>

                <h2>Jack of all Trades: 1</h2>
                <p>You can add half your <strong>Proficiency Bonus</strong> to any ability check you make
                    that doesn't already include your <strong>Proficiency Bonus</strong>. Additionally, choose two of
                    your skill proficiencies to gain expertise in.</p>


                <h2>Cunning Action: 2</h2>
                <p><em>Your quick thinking and agility let you move and act with unparalleled efficiency.</em> On your
                    turn, you can perform one of the following actions as a single action instead of their normal cost:
                    <strong>Disengage</strong> (normally 2 actions), <strong>Hide</strong> (normally 2 actions), or
                    <strong>Search</strong> (normally 2 actions).
                </p>

                <h2>Martial Feats: 2</h2>
                <p>You have trained in special techniques that give you an edge in combat and beyond. You gain access to
                    martial feats, as described in the <strong>Martial Feats</strong> section. You may only use one
                    <strong>Feat Slot</strong> per turn.
                </p>
                <p><strong>Feat Slots.</strong> You have 2 <strong>Feat Slots</strong>, which you expend to activate
                    your feats. You regain all expended slots when you finish a short rest. Your number of <strong>Feat
                        Slots</strong> increases as you gain levels, as shown in the Feats Progression table.</p>
                <p><strong>Feats Prepared.</strong> You prepare 2 martial feats of your choice from your feat list. The
                    Feats Prepared column of the Feats Progression table shows when you learn more feats. Additionally,
                    when you gain a level in this class, you can replace one feat you have prepared with another feat of
                    your choice from your class feat list.</p>
                <p><strong>Feat Tier.</strong> You can learn feats of Tier 1 at level 2. At higher levels you gain
                    access to higher tiers, as shown in the table.</p>

                <h2>Roguish Archetype: 3</h2>
                <p><em>You choose a <a href="sc_rogue.html">Roguish Archetype</a> that emulates your approach to
                        roguery.</em>
                    Your choice grants you features at 3rd level, and then again at 7th, 14th, and 20th level.</p>

                <h2>Quick Feet: 3</h2>
                <p>When you take the <strong>Dash action</strong>, you gain an additional 15 feet of movement for that
                    turn.</p>

                <h2>Ability Score Improvement</h2>
                <p>At 4th, 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 1. You
                    can't increase an ability score above 5 using this feature.</p>

                <h2>Uncanny Dodge: 5</h2>
                <p><em>Your reflexes let you slip away from danger.</em> When an attacker that you can see hits you with
                    an attack, you can use your <strong>reaction</strong> to halve the attack's damage against you.</p>

                <h2>Expertise: 6</h2>
                <p>Choose two of your skill proficiencies, or one skill proficiency and your proficiency with thieves'
                    tools. Your <strong>Proficiency Bonus</strong> is doubled for any ability check you make that uses
                    either of the chosen proficiencies.</p>

                <h2>Evasion: 9</h2>
                <p>When you are subjected to an effect that allows you to make a <strong>Dexterity saving throw</strong>
                    to take only half damage, you instead take no damage if you succeed, and only half damage if you
                    fail.</p>

                <h2>Opportunistic Strike: 10</h2>
                <p><em>You have an eye for capitalizing on even the smallest mistakes.</em> When a creature you can see
                    within 30 feet of you rolls a natural 1 on an attack roll, you can use your
                    <strong>reaction</strong> to make an attack against that creature. If the attack hits, it is
                    automatically a <strong>Sneak Attack</strong>.
                </p>

                <h2>Quick Feet II: 10</h2>
                <p>When you take any <strong>reaction</strong>, you can move up to your speed as part of that reaction.
                </p>

                <h2>Reliable Talent: 11</h2>
                <p><em>You have refined your chosen skills until they approach perfection.</em> Whenever you make an
                    ability check that lets you add your <strong>Proficiency Bonus</strong>, if the roll doesn't have
                    advantage or disadvantage, roll two d20s and use whichever roll is closer to 11. If there is a tie
                    (for example, 9 and 13), you take the higher roll.</p>

                <h2>Skill Specialization: 13</h2>
                <p>Choose one skill or tool proficiency that you are proficient in. Your <strong>Proficiency
                        Bonus</strong> is doubled for any ability check you make that uses that skill or tool. This
                    stacks with Expertise (you can choose a skill you already have Expertise in, but the bonus does not
                    double again; instead you gain advantage on checks with that skill).</p>
                <p>Alternatively, you can choose to gain proficiency in two additional skills of your choice.</p>

                <h2>Blindsense: 15</h2>
                <p>If you are able to hear, you are aware of the location of any hidden or invisible creature within 10
                    feet of you.</p>

                <h2>Dirty Tactics: 15</h2>
                <p>Whenever you roll with <strong>advantage</strong>, you roll three d20s and take the highest result.
                </p>

                <h2>Slippery Mind: 17</h2>
                <p>Your cunning mind is difficult to assault. You gain proficiency in <strong>Wisdom saving
                        throws</strong>.</p>

                <h2>Elusive: 18</h2>
                <p><em>You are so evasive that attackers rarely gain the upper hand against you.</em> No attack roll has
                    <strong>advantage</strong> against you while you aren't <strong>incapacitated</strong>.
                </p>

                <h2>Stroke of Luck: 20</h2>
                <p><em>You have an uncanny knack for succeeding when it matters most.</em> If you fail an ability check
                    or attack roll, you can choose to succeed instead. Once you use this feature, you can't use it again
                    until you finish a short or long rest.</p>
