                <h2>Physical and Mental Modifiers</h2>
                <p>Some of your abilities will require your <strong>Mental Modifier</strong> or <strong>Physical
                        Modifier</strong>.</p>
                <p>Your <strong>Physical Modifier</strong> is your Strength or Dexterity modifier.</p>
                <p>Your <strong>Mental Modifier</strong> is your Wisdom modifier.</p>

                <h2>Fighting Style: 1</h2>
                <p><em>Your combat training defines your approach to battle.</em> You adopt a particular style of
                    fighting as your specialty. Choose one of the following options. Each fighting style grants you a
                    bonus at level 1; you must be wielding one of your fighting style’s respective items to gain this
                    benefit. At level 7, your fighting style provides you with a <strong>Martial Feat</strong>. This
                    feat does not count against your Feats Prepared, and it does not require a <strong>Feat
                        Slot</strong> when you use it. You must be wielding one of your fighting style’s respective
                    items to use this feature, but you can use this feat regardless of your class.</p>
                <ul>
                    <li>Archery: You gain a +2 health bonus at each level.</li>
                    <li>Dueling: You gain a +2 health bonus at each level.</li>
                    <li>Hunter: You gain a +2 health bonus at each level.</li>
                    <li>Sage: You gain a +2 health bonus at each level.</li>
                    <li>Skirmisher: You gain a +2 health bonus at each level.</li>
                    <li>Thrown Weapon: You gain a +2 health bonus at each level.</li>
                    <li>Two-Weapon: You gain a +2 health bonus at each level.</li>
                    <li>Unarmed: You gain a +2 health bonus at each level.</li>
                    <li>Druidic Warrior: You gain a +3 health bonus at each level.</li>
                    <li>Guardian: You gain a +3 health bonus at each level.</li>
                    <li>Great Weapon: You gain a +3 health bonus at each level.</li>
                </ul>
                <p>The health bonus is added to your hit point maximum at 1st level and whenever you gain a level in
                    this class.</p>

                <h2>Hit Points</h2>
                <p><strong>Hit Points at 1st Level:</strong> 12 + your fighting style health bonus</p>
                <p><strong>Hit Points at Higher Levels:</strong> 6 + your fighting style health bonus per ranger level
                    after 1st</p>

                <h2>Proficiencies</h2>
                <p><strong>Armor:</strong> Light armor, medium armor, shields</p>
                <p><strong>Weapons:</strong> Simple weapons, martial weapons</p>
                <p><strong>Tools:</strong> None</p>
                <p><strong>Saving Throws:</strong> Strength, Dexterity</p>
                <p><strong>Skills:</strong> Choose three from Animal Handling, Athletics, Insight, Investigation,
                    Nature, Perception, Stealth, and Survival</p>



                <h2>Hunter's Mark: 1</h2>
                <p><em>Your prey cannot escape you.</em> As an <strong>Attack action</strong>, designate an enemy you
                    can see within 90 feet as your quarry. While marked, you have advantage on Wisdom (Perception or
                    Survival) checks to find or track it. When you hit the marked creature with an attack, you may roll
                    a number of d2s equal to your <strong>Proficiency Bonus</strong> and add them to the damage.</p>
                <p>The mark lasts until you finish a long rest, the creature dies, or you expend a <strong>Feat
                        Slot</strong> as a free action to end it. The creature has no way of knowing it’s marked.</p>

                <h2>Aspect Bond: 1</h2>
                <p><em>You have learned to bond with the natural creatures of the world, channeling their traits to
                        enhance your own abilities.</em> You gain access to animal aspects, which are grouped into tiers
                    representing their power and complexity.</p>
                <p><strong>Aspects Known.</strong> You know 3 aspects of your choice from the Tier 1 aspect list. You
                    learn additional aspects as shown in the Aspects Known column of the Ranger Features table. When you
                    gain a level in this class, you can replace one aspect you know with another aspect of the same
                    tier.</p>
                <p><strong>Aspect Tiers.</strong> Aspects are organized into three tiers of power. You gain access to
                    higher tiers at levels 1, 8, and 14, as shown in the Aspect Tier column.</p>
                <p><strong>Preparing Aspects.</strong> You can have 2 aspects active simultaneously. During a short or
                    long rest, you can meditate and commune with nature to swap out any or all of your active aspects
                    for other aspects you know.</p>
                <p><strong>Aspect Categories.</strong> Aspects are grouped into categories based on the type of benefit
                    they provide. You cannot have more than one active aspect from the same category at one time. The
                    categories are: Offense, Proficiency, Movement, and Resistance.</p>

                <h2>Martial Feats: 2</h2>
                <p>You have trained in special techniques that give you an edge in combat and beyond. You gain access to
                    martial feats, as described in the <strong>Martial Feats</strong> section. You may only use one
                    <strong>Feat Slot</strong> per turn.</p>
                <p><strong>Feat Slots.</strong> You have 2 <strong>Feat Slots</strong>, which you expend to
                    activate your feats. You regain all expended slots when you finish a short rest. Your number of
                    <strong>Feat Slots</strong> increases as you gain levels, as shown in the Feats Progression
                    table.</p>
                <p><strong>Feats Prepared.</strong> You prepare 2 martial feats of your choice from your feat list. The
                    Feats Prepared column of the Feats Progression table shows when you learn more feats. Additionally,
                    when you gain a level in this class, you can replace one feat you have prepared with another feat of
                    your choice from your class feat list.</p>
                <p><strong>Feat Tier.</strong> You can learn feats of Tier 1 at level 2. At higher levels you gain
                    access to higher tiers, as shown in the table.</p>

                <h2>Natural Explorer: 2</h2>
                <p>You are a master of navigating the natural world. You gain the following benefits:</p>
                <ul>
                    <li>Once per long rest, you may use a feat with the <strong>Exploration</strong> tag without
                        expending a <strong>Feat Slot</strong>.</li>
                    <li>You and your group can't become lost except by magical means.</li>
                    <li>Even when you are engaged in another activity while traveling (such as foraging, navigating, or
                        tracking), you remain alert to danger.</li>
                    <li>When you forage, you find twice as much food as normal.</li>
                    <li>While tracking other creatures, you also learn their exact number, their sizes, and how long ago
                        they passed through the area.</li>
                </ul>

                <h2>Ranger Conclave: 3</h2>
                <p><em>You choose a <a href="sc_ranger.html">Ranger Conclave</a> that embodies your hunting philosophy.</em> Your
                    choice grants you features at 3rd level and then again at 7th, 14th, and 20th level.</p>

                <h2>Analyzed: 3</h2>
                <p>When you deal damage to a marked creature, you know if they have any resistances, immunities, or
                    vulnerabilities.</p>

                <h2>Ability Score Improvement</h2>
                <p>At 4th, 8th, 12th, 16th, and 19th level, you can increase one ability score of your choice by 1. You
                    can't increase an ability score above 5 using this feature.</p>

                <h2>Martial Fatigue Resistance: 5</h2>
                <p>Taking the <strong>Attack action</strong> does not inflict you with the <strong>fatigued</strong>
                    condition.</p>

                <h2>Tireless: 5</h2>
                <p>You don't gain <strong>exhaustion</strong> levels when skipping long rests.</p>

                <h2>Mortal Reminder: 6</h2>
                <p><em>You've dealt with the dangers of this world for quite some time, and you know how to seize the
                        moment.</em> When you reduce a creature to 0 hit points with a weapon attack, you may
                    immediately apply <strong>Hunter's Mark</strong> to a new creature without using an action.</p>
                <p>When your <strong>Hunter's Mark</strong> has persisted on the same creature for a minute, the extra
                    d2s of damage you deal become d4s.</p>

                <h2>Aspect Expansion: 6</h2>
                <p>You can have up to two active aspects from the same category at one time.</p>

                <h2>Nature's Veil: 10</h2>
                <p>As an action, you can become invisible until the end of your next turn. While invisible in this way,
                    a creature affected by <strong>Hunter's Mark</strong> has disadvantage on Initiative rolls.</p>
                <p>This feature requires the use of a <strong>Feat Slot</strong>; when you use this feature, mark one
                    <strong>Feat Slot</strong>.</p>

                <h2>Analyzed II: 13</h2>
                <p>When you hit a marked creature with an attack, instead of dealing extra damage from your
                    <strong>Hunter's Mark</strong> feature, you can instead choose to remove one damage resistance it
                    has until the start of your next turn.</p>
                <p>Additionally, once per turn when you miss a marked creature with an attack roll, you may make another
                    with disadvantage.</p>

                <h2>Traversal Master: 15</h2>
                <p>You learn all feats with the <strong>Exploration</strong> tag, and you no longer have to expend
                    <strong>Feat Slots</strong> to use them.</p>

                <h2>Evasion: 17</h2>
                <p>When you are subjected to an effect that allows you to make a Dexterity saving throw to take only
                    half damage, you instead take no damage if you succeed on the saving throw, and only half damage if
                    you fail.</p>

                <h2>Feral Senses: 18</h2>
                <p><em>You gain preternatural senses that
                    help you fight creatures you can't see.</em> You have Blindsight, you see invisible creatures and objects
                    as if they were visible, and you can see into the Ethereal Plane out to 30 feet.</p>
