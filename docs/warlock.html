                <h2>Hit Points</h2>

                <p><strong>Class Health Number:</strong> 5</p>
                <p><strong>Hit Points at 1st Level:</strong> 10 + your fighting style health
                    bonus</p>
                <p><strong>Hit Points at Higher Levels:</strong> 5 + your fighting style health
                    bonus per warlock level after 1st</p>

                <h2>Proficiencies</h2>

                <p><strong>Armor:</strong> Light armor, shields</p>
                <p><strong>Weapons:</strong> Simple weapons</p>
                <p><strong>Tools:</strong> None</p>
                <p><strong>Saving Throws:</strong> Wisdom, Charisma</p>
                <p><strong>Skills:</strong> Choose two from Arcana, Deception, History,
                    Intimidation, Investigation, Nature, and Religion</p>

                <h2>Physical and Mental Modifiers</h2>

                <p>Some of your abilities will require your Mental or Physical Modifier.</p>
                <p>Your Physical Modifier is your Strength or Dexterity Modifier.</p>
                <p>Your Mental Modifier is your Intelligence, Wisdom, or Charisma Modifier.</p>

                <h2>Fighting Style</h2>

                <p>You adopt a particular style of connection to your patron as your specialty.
                    Choose one of the following options. Each Fighting style grants you a health
                    bonus at level 1.</p>

                <p>At level 7, your fighting style provides you with additional benefits as noted in
                    the Fighting Styles section.</p>

                <ul>
                    <li><strong>Archery:</strong> You gain a +2 health bonus at each level.</li>
                    <li><strong>Dueling:</strong> You gain a +2 health bonus at each level.</li>
                    <li><strong>Skirmisher:</strong> You gain a +2 health bonus at each level.</li>
                    <li><strong>Polearm:</strong> You gain a +2 health bonus at each level.</li>
                    <li><strong>Thrown Weapon:</strong> You gain a +2 health bonus at each
                        level.</li>
                    <li><strong>Unarmed:</strong> You gain a +2 health bonus at each level.</li>
                    <li><strong>Two-Weapon:</strong> You gain a +2 health bonus at each level.</li>
                    <li><strong>Priest:</strong> You gain a +2 health bonus at each level.</li>
                    <li><strong>Sage:</strong> You gain a +2 health bonus at each level.</li>
                    <li><strong>Arcanist:</strong> You gain a +2 health bonus at each level.</li>
                    <li><strong>Brawler:</strong> You gain a +3 health bonus at each level.</li>
                    <li><strong>Guardian:</strong> You gain a +3 health bonus at each level.</li>
                    <li><strong>Great Weapon:</strong> You gain a +3 health bonus at each
                        level.</li>
                    <li><strong>Holy Warrior:</strong> You gain a +3 health bonus at each
                        level.</li>
                    <li><strong>Druidic Warrior:</strong> You gain a +3 health bonus at each
                        level.</li>
                    <li><strong>War Mage:</strong> You gain a +3 health bonus at each level.</li>
                </ul>

                <p>The health bonus is added to your hit point maximum at 1st level and whenever you
                    gain a level in this class.</p>
                <h2>Spellcasting: 1</h2>

                <p>Your eldritch research and the boon of your patron have granted you the ability
                    to cast spells.</p>

                <p><strong>Spell Slots.</strong> The Warlock Spellcasting table (determined by your
                    Pact Boon) shows how many spell slots you have to cast your warlock spells of
                    1st level and higher. To cast one of these spells, you must expend a slot of the
                    spell's level or higher. You regain all expended spell slots when you finish a
                    long rest.</p>

                <p><strong>Spells Prepared.</strong> You prepare the list of warlock spells that are
                    available for you to cast. To do so, choose a number of warlock spells from your
                    warlock spell list equal to your Charisma modifier + your warlock level (minimum
                    of one spell). The spells must be of a level for which you have spell slots.</p>

                <p><strong>Spellcasting Economy.</strong> Casting a spell with a Cantrip requires
                    one action. Casting a spell with a Primary or Secondary Spell Slot requires two
                    actions.</p>
                <p>Casting a spell with a Tertiary Spell Slot requires the charging ritual described
                    in the core rules.</p>

                <p><strong>Spellcasting Ability.</strong> Charisma is your spellcasting ability for
                    your warlock spells. The DC for your spell saving throws equals your Mental DC
                    (8 + your proficiency bonus + your Charisma modifier).</p>

                <p><strong>Spellcasting Focus.</strong> You can use an arcane focus as a
                    spellcasting focus for your warlock spells.</p>

                <h2>Pact Boon</h2>

                <p>At 1st level, you strike a bargain with an otherworldly being that grants you
                    power on your own terms. You choose the nature of your pact, which determines
                    the fundamental expression of your warlock abilities.</p>

                <p><strong>Spellcasting.</strong> You use the Mystic Spell Slot Progression table.
                    You prepare spells as a mystic, drawing from the warlock spell list.</p>

                <h2>Invocations: 2</h2>

                <p>At 2nd level, you learn invocations that customize your warlock abilities. You
                    learn additional invocations at higher levels, as shown in the Invocations Known
                    table.</p>

                <p><strong>Invocations Known.</strong> You learn 2 invocations of your choice at 2nd
                    level. The Invocations Known column shows when you learn more invocations. At
                    7th, 11th, and 17th level, you gain two more invocations.</p>

                <p>When you gain a level in this class, you can replace one invocation you know with
                    another invocation of your choice.</p>

                <p><strong>Using Invocations.</strong> Invocations are divided into three
                    categories:</p>

                <ul>
                    <li>Meta-Magic Invocations (Sorcerer Boon only) modify your spells and require
                        spending Invocation Charges.</li>
                    <li>Mystic Invocations (Mystic Boon only) are martial feats. You may select any
                        martial feat for which you meet the tier requirement. Using them requires
                        spending Invocation Charges as normal for martial feats.</li>
                    <li>Eldritch Invocations are available to both pacts and provide passive
                        benefits or new capabilities. Some Eldritch Invocations require spending
                        Invocation Charges.</li>
                </ul>

                <p><strong>Invocation Charges.</strong> You can store invocative energy channeled
                    through your spellcasting. This energy is represented by Invocation Charges.</p>

                <p><strong>Gaining Charges.</strong> When you cast a spell using a spell slot, you
                    gain Invocation Charges:</p>

                <ul>
                    <li>Casting a spell with a Primary Slot grants you 1 Invocation Charge</li>
                    <li>Casting a spell with a Secondary Slot grants you 2 Invocation Charges</li>
                    <li>Casting a spell with a Tertiary Slot grants you 3 Invocation Charges</li>
                </ul>

                <p>You gain these charges after resolving the spell's effects</p>

                <p><strong>Maximum Charges.</strong> You can hold a maximum number of Invocation
                    Charges equal to your Charisma modifier (minimum of 1). Any charges gained
                    beyond this maximum are lost.</p>

                <p><strong>Losing Charges.</strong> Your Invocation Charges fade when you finish a
                    short or long rest.</p>

                <h2>Meta-Magic Invocations</h2>

                <p>
                    <em>Sorcerer Boon only</em>
                </p>

                <ul>
                    <li><strong>Careful Spell.</strong> When you cast a spell that forces other
                        creatures to make a saving throw, you can spend 2 Invocation Charges to
                        select a number of creatures equal to your Charisma modifier (minimum of
                        one). Selected creatures automatically succeed on their saving throws
                        against the spell.</li>
                    <li><strong>Distant Spell.</strong> When you cast a spell that has a range of 5
                        feet or greater, you can spend 1 Invocation Charge to double the range. When
                        you cast a spell that has a range of touch, you can spend 1 Invocation
                        Charge to make the range 30 feet.</li>
                    <li><strong>Empowered Spell.</strong> When you roll damage for a spell, you can
                        spend 1 Invocation Charge to reroll a number of the damage dice up to your
                        Charisma modifier (minimum of one). You must use the new rolls.</li>
                    <li><strong>Extended Spell.</strong> When you cast a spell that has a duration
                        of 1 minute or longer, you can spend 1 Invocation Charge to double the
                        duration, up to a maximum duration of 24 hours.</li>
                    <li><strong>Heightened Spell.</strong> When you cast a spell that forces a
                        creature to make a saving throw, you can spend 3 Invocation Charges to give
                        one target of the spell disadvantage on its first saving throw against the
                        spell.</li>
                    <li><strong>Quickened Spell.</strong> When you cast a spell with a Primary spell slot,
                        you can spend 2 Invocation Charges to change the casting time to 1 action
                        for this casting.</li>
                    <li><strong>Sculpt Spells.</strong> When you cast a spell that affects an area,
                        you can spend 2 Invocation Charges to choose a number of creatures equal to
                        your Charisma modifier in that area. Those creatures automatically succeed
                        on their saving throws against the spell and take no damage if they would
                        normally take half damage on a successful save.</li>
                    <li><strong>Seeking Spell.</strong> When you cast a spell that requires an
                        attack roll, and you miss with that attack, you can spend 2 Invocation
                        Charges to reroll the attack roll. You must use the new roll.</li>
                    <li><strong>Subtle Spell.</strong> When you cast a spell, you can spend 1
                        Invocation Charge to cast it without any somatic or verbal components.</li>
                    <li><strong>Transmuted Spell.</strong> When you cast a spell that deals acid,
                        cold, fire, lightning, or thunder damage, you can spend 1 Invocation Charge
                        to change the damage type to another type from that list.</li>
                    <li><strong>Twinned Spell.</strong> When you cast a spell that targets only one
                        creature and doesn't have a range of self, you can spend Invocation Charges
                        equal the Slot Tier (1,2,3) to target a second creature in range
                        with the same spell.</li>
                </ul>

                <h2>Eldritch Invocations</h2>

                <ul>
                    <li><strong>Agonizing.</strong> When you cast a cantrip, add your Charisma
                        modifier to the damage it deals on a hit.</li>
                    <li><strong>Beguiling Influence.</strong> You gain proficiency in a skill.</li>
                    <li><strong>Devil's Sight.</strong> You can see normally in darkness, both
                        magical and nonmagical, to a distance of 120 feet.</li>
                    <li><strong>Eldritch Mind.</strong> You can spend a Primary Spell Slot have
                        advantage on Saving throws to maintain concentration on spells.</li>
                    <li><strong>Eyes of the Rune Keeper.</strong> You can read all writing.</li>
                    <li><strong>Lifedrinker.</strong> When you hit a creature with a weapon attack,
                        the creature takes extra necrotic damage equal to your Charisma
                        modifier.</li>
                    <li><strong>One with Shadows.</strong> When you are in an area of dim light or
                        darkness, you can spend 1 Invocation Charge to become invisible until you
                        move, take an action, or take damage.</li>
                    <li><strong>Otherworldly Leap.</strong> You can cast jump on yourself at will,
                        without expending a spell slot.</li>
                    <li><strong>Repel.</strong> When you hit a creature with a cantrip, you can push
                        the creature up to 10 feet away from you in a straight line.</li>
                </ul>

                <h2>Otherworldly Patron: 3</h2>

                <p>At 3rd level, you choose a specific entity that empowers your pact. Your choice
                    grants you features at 3rd level, and then again at 6th, 10th, 14th, and 20th
                    level.</p>

                <h2>Tertiary Slots: 3</h2>

                <p>
                    <em>Boon of Sorcerer only</em>
                </p>

                <p>Beginning at 3rd level, you gain access to tertiary spell slots. To cast your
                    most powerful spells, those which require a tertiary slot, you must spend an
                    action on your turn to charge the spell. At the start of your next turn, you may
                    spend two actions to cast the spell and expend the spell slot. Any time you take
                    damage until you cast the spell, you must make a concentration check. You may
                    hold the spell for a number of turns equal to your Intelligence modifier, and
                    each turn you hold the spell, you upcast it by one level.</p>
